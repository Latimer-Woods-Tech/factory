# Service Registry
#
# PURPOSE:
#   This file is the authoritative map of every Cloudflare Worker in the system:
#   - What its canonical name is (the value of `name` in wrangler.jsonc)
#   - What its public URL is (used in logs, docs, and consumer configs)
#   - Which repos or files hardcode that URL
#
# RULE:
#   Before changing the `name` field in ANY wrangler.jsonc, you MUST:
#   1. Find this worker in the registry below
#   2. Search every `consumers` file listed for the old URL
#   3. Update all consumers FIRST
#   4. Commit and deploy consumers
#   5. THEN change the worker name and deploy
#
#   Skipping this order = ERR_NAME_NOT_RESOLVED in production.
#
# HOW TO KEEP THIS UPDATED:
#   When you add a new worker: add an entry here.
#   When you add a new hardcoded URL in a frontend: add it to the consumers list.
#   When you rename a worker: update both the name and the url here after the migration.

workers:
  - id: prime-self
    name: prime-self                                       # matches wrangler.jsonc `name`
    repo: adrper79-dot/prime-self
    url: https://prime-self.adrper79.workers.dev           # canonical workers.dev URL
    custom_domain: null                                    # custom domain if any
    health_endpoint: /health
    critical_endpoints:
      - /auth/login
      - /api/practitioners
    consumers:
      # Files that hardcode this worker's URL — must be updated before any rename
      - repo: adrper79-dot/prime-self-ui
        file: public/landing.html
        line: ~537
        pattern: "fetch('https://prime-self.adrper79.workers.dev/auth/login'"
      - repo: adrper79-dot/prime-self-ui
        file: public/index.html
        line: ~537
        pattern: "fetch('https://prime-self.adrper79.workers.dev/auth/login'"

  - id: schedule-worker
    name: schedule-worker                                  # matches apps/schedule-worker/wrangler.jsonc `name`
    repo: adrper79-dot/factory
    url: https://schedule-worker.adrper79.workers.dev      # canonical workers.dev URL
    custom_domain: null
    health_endpoint: /health
    deployment_status: live_health_verified_2026-04-29
    critical_endpoints:
      - /jobs
      - /jobs/pending
      - /api/admin/health
      - /api/admin/metrics
    required_bindings:
      - DB
    required_secrets:
      - WORKER_API_TOKEN
    optional_secrets:
      - APP_SERVICE_TOKENS
    required_vars:
      - ENVIRONMENT
    consumers:
      - repo: adrper79-dot/factory
        file: apps/admin-studio/src/lib/app-registry.ts
        line: ~42
        pattern: "productionWorkerName: 'schedule-worker'"
      - repo: adrper79-dot/factory
        file: apps/video-cron/src/env.ts
        line: ~27
        pattern: "SCHEDULE_WORKER_URL"
      - repo: adrper79-dot/factory
        file: docs/SELFPRIME_VIDEOKING_SYNERGY_DEVELOPMENT_PLAN.md
        line: ~141
        pattern: "Factory schedule-worker"

  - id: video-cron
    name: video-cron                                       # matches apps/video-cron/wrangler.jsonc `name`
    repo: adrper79-dot/factory
    url: https://video-cron.adrper79.workers.dev           # canonical workers.dev URL
    custom_domain: null
    health_endpoint: /health
    deployment_status: live_health_verified_2026-04-29
    critical_endpoints:
      - /health
      - /trigger
    required_bindings:
      - DB
    required_secrets:
      - WORKER_API_TOKEN
      - GITHUB_TOKEN
    required_vars:
      - APP_ID
      - GITHUB_REPO
      - SCHEDULE_WORKER_URL
      - DEFAULT_COMPOSITION_ID
      - ENVIRONMENT
    consumers:
      - repo: adrper79-dot/factory
        file: apps/admin-studio/src/lib/app-registry.ts
        line: ~48
        pattern: "productionWorkerName: 'video-cron'"
      - repo: adrper79-dot/factory
        file: docs/SELFPRIME_VIDEOKING_SYNERGY_DEVELOPMENT_PLAN.md
        line: ~143
        pattern: "D[video-cron]"

  - id: videoking
    name: videoking                                        # NOT a deployed worker — architecture reference only
    repo: adrper79-dot/factory
    url: null                                              # No workers.dev URL — never deployed
    custom_domain: null
    health_endpoint: null
    deployment_status: not_deployed                        # VideoKing is a docs/patterns source, not a live worker
    notes: >
      VideoKing is the Factory video monetization architecture reference.
      Its patterns (Hyperdrive, Remotion, Stream, R2) are reused by schedule-worker
      and video-cron. There is no `videoking.adrper79.workers.dev` endpoint.
      Do NOT attempt to curl this URL — it returns 404 by design.
      Hyperdrive ID for VideoKing DB: 72697ebbf0d44419850743679390acf1 (videoking-hyperdrive).
    consumers: []

pages:
  - id: prime-self-ui
    repo: adrper79-dot/prime-self-ui
    project_name: prime-self-ui                            # Cloudflare Pages project name
    custom_domain: selfprime.net
    root_file: public/index.html                          # must exist for root URL to serve
    deploy_dir: public
    worker_dependencies:
      - prime-self                                        # must be deployed and healthy first
    required_secrets:
      - CF_API_TOKEN
      - CF_ACCOUNT_ID
