## Datadog Dashboard (Alternative)

For Datadog users:

```python
# dashboard.py
from datadog import initialize, api

options = {
    'api_key': os.getenv('DD_API_KEY'),
    'app_key': os.getenv('DD_APP_KEY')
}

initialize(**options)

dashboard = {
    "title": "Factory SLO Dashboard",
    "layout_type": "grid",
    "widgets": [
        {
            "type": "gauge",
            "queries": [
                {
                    "query": "avg:custom.slo.monthly_consumption{service:auth}",
                }
            ],
            "title": "Auth — Monthly Budget Consumption"
        },
        # ... additional widgets ...
    ]
}

api.Dashboard.create(**dashboard)
```

