## Section 2: Tier 2 Important Services

### Panel 2.1: Video Streaming — Availability & Latency

```yaml
panel_2_1:
  title: "Video Streaming — Availability & p95 Latency"
  type: "graph"
  targets:
    - name: "Availability % (right axis)"
      datasource: "CloudflareAnalytics"
      expr: "stream_availability_percentage[30d]"
      yaxes: [left: "availability", right: "availability"]
      color: "green"
    
    - name: "p95 Latency ms (left axis)"
      datasource: "CloudflareAnalytics"
      expr: "stream_p95_latency_ms[30d]"
      yaxes: [left: "latency"]
      color: "blue"
  
  slo_lines:
    - value: 99.9
      axis: "right"
      color: "green"
      label: "SLO: 99.9%"
    - value: 2000
      axis: "left"
      color: "blue"
      label: "SLO: 2s"
  
  span: 6
```

---

### Panel 2.2: Discovery Feed — Error Rate & Cache Freshness

```yaml
panel_2_2:
  title: "Discovery Feed — Error Rate & Cache Age"
  type: "graph"
  targets:
    - name: "5xx Error Rate %"
      datasource: "Prometheus"
      expr: |
        100 * (
          sum(rate(http_requests_errors_5xx{service="discovery"}[5m])) /
          sum(rate(http_requests_total{service="discovery"}[5m]))
        )
      color: "red"
    
    - name: "Cache Age (seconds)"
      datasource: "Neon"
      expr: "EXTRACT(EPOCH FROM NOW() - last_feed_update) / 60"
      color: "orange"
  
  alert_lines:
    - value: 1
      color: "red"
      label: "SLO: 1% error"
    - value: 5
      color: "orange"
      label: "Stale: 5min"
```

---

### Panel 2.3: Notifications — Delivery Success Rate

```yaml
panel_2_3:
  title: "Notifications — Delivery Success Rate"
  type: "gauge"
  targets:
    - name: "7-day Delivery Success %"
      datasource: "Resend"
      expr: |
        100 * (
          (resend_delivered_count + resend_bounced_count + resend_spam_count) 
          / (resend_total_sent)
        )
  
  thresholds:
    green: [99, 100]
    yellow: [95, 99]
    red: [0, 95]
```

