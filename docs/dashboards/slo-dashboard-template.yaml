# SLO Dashboard Template

**For:** Grafana / Datadog / CloudWatch  
**Version:** 1.0  
**Last Updated:** April 28, 2026

---

## Dashboard Configuration

This template defines panels for monitoring SLO health, error budget consumption, and incident correlation.

### Dashboard Metadata

```yaml
dashboard:
  title: "Factory SLO Dashboard"
  uid: "factory-slo-dashboard"
  timezone: "UTC"
  refresh: "30s"
  panels:
    # SECTION 1: Tier 1 Critical Services
    # SECTION 2: Tier 2 Important Services
    # SECTION 3: Tier 3 Best-Effort Services
    # SECTION 4: Monthly Trends
    # SECTION 5: Incident Correlation
    # SECTION 6: Alert Status
```

---

## Section 1: Tier 1 Critical Services

### Panel 1.1: Auth SLO Status (Gauge + Trend)

**Purpose:** Quick visual of monthly error budget consumption

```yaml
panel_1_1:
  title: "Auth — Monthly Budget Consumption"
  type: "gauge"
  targets:
    - name: "Monthly Consumption %"
      datasource: "Prometheus"
      expr: |
        100 * (
          sum(increase(http_requests_errors_5xx{service="auth", job="videoking"}[30d])) /
          sum(increase(http_requests_total{service="auth", job="videoking"}[30d]))
        )
      
  thresholds:
    green: [0, 50]
    yellow: [50, 80]
    red: [80, 100]
  unit: "Percent (0-100)"
  decimals: 1
  
  # Sparkline: 30-day trend
  sparkline:
    type: "full"
    interpolation: "linear"
```

**Visual behavior:**
- **Green (0–50%):** Healthy; no action
- **Yellow (50–80%):** At risk; track daily
- **Red (80–100%):** Code freeze; escalate
- **Red > 100%:** SLO breached; postmortem

---

### Panel 1.2: Auth — Burn Rate (5-min window, current hour)

**Purpose:** Detect imminent SLO breaches in real-time

```yaml
panel_1_2:
  title: "Auth — Error Budget Burn Rate"
  type: "graph"
  targets:
    - name: "Hourly Burn Rate (5min samples, rolling)"
      datasource: "Prometheus"
      expr: |
        # Errors in last 5 minutes / (monthly budget / 720 hours)
        (sum(increase(http_requests_errors_5xx{service="auth"}[5m])) / 0.015) 
      legend: "Burn Rate (multiples of monthly rate)"
  
  alert_lines:
    - value: 1
      color: "green"
      label: "1× (on track)"
    - value: 2
      color: "yellow"
      label: "2× (warning)"
    - value: 5
      color: "orange"
      label: "5× (alert)"
    - value: 10
      color: "red"
      label: "10× (critical)"
  
  span: 6
```

**Alert thresholds:**
- 5× burn rate for 5 minutes → Page on-call
- 10× burn rate for 1 minute → Page tech lead + on-call

---

### Panel 1.3: Payments & Payouts — Combined Status

```yaml
panel_1_3:
  title: "Tier 1 Services — All Metrics"
  type: "table"
  targets:
    - name: "Tier 1 SLO Status"
      datasource: "Prometheus"
      expr: |
        # Multi-metric table
        SELECT 
          service,
          SUM(monthly_consumption_pct) as consumption,
          SUM(burn_rate) as burn_rate,
          SUM(incident_count_this_week) as incidents
        FROM slo_metrics
        WHERE tier = 1
  
  columns:
    - name: "Service"
      type: "string"
    - name: "Monthly %"
      type: "number"
      thresholds:
        - value: 50
          color: "green"
        - value: 80
          color: "yellow"
        - value: 100
          color: "red"
    - name: "Burn Rate (×)"
      type: "number"
    - name: "Incidents (7d)"
      type: "number"
    - name: "On-Call"
      type: "string"
```

