## Grafana JSON Export

To import this dashboard into Grafana:

```bash
# Save as dashboard.json
cat > docs/dashboards/slo-dashboard-grafana.json << 'EOF'
{
  "dashboard": {
    "title": "Factory SLO Dashboard",
    "timezone": "UTC",
    "panels": [
      { /* Panel 1.1: Auth Gauge */ },
      { /* Panel 1.2: Burn Rate */ },
      { /* Panel 2.1: Video Streaming */ },
      { /* ... all other panels ... */ }
    ]
  }
}
EOF

# Via Grafana UI:
# Home → Dashboards → New → Import → Upload JSON File
```

