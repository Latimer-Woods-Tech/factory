## Section 3: Tier 3 Best-Effort Services

### Panel 3.1: Analytics, ML, Admin — Status Summary

```yaml
panel_3_1:
  title: "Tier 3 Services — Status"
  type: "stat"
  targets:
    - name: "Analytics API Availability"
      datasource: "PostHog"
      expr: "posthog_api_success_rate"
    
    - name: "ML Batch Success Rate"
      datasource: "Neon"
      expr: "batch_job_success_rate[7d]"
    
    - name: "Admin UI Errors"
      datasource: "Sentry"
      expr: "sentry_errors_admin_ui_count[24h]"
```

---

## Section 4: Monthly Trends

### Panel 4.1: Quarterly Error Budget Consumption Trend

**Purpose:** Long-term visibility into whether SLOs are sustainable

```yaml
panel_4_1:
  title: "Quarterly SLO Consumption Trend (3 years)"
  type: "graph"
  targets:
    - name: "Auth Monthly %"
      datasource: "Prometheus"
      expr: "slo_monthly_consumption_pct{service='auth'}"
      legend: "Auth (Target: <20% avg)"
    
    - name: "Payments Monthly %"
      datasource: "Prometheus"
      expr: "slo_monthly_consumption_pct{service='payments'}"
      legend: "Payments (Target: <20% avg)"
    
    - name: "Video Monthly %"
      datasource: "Prometheus"
      expr: "slo_monthly_consumption_pct{service='video'}"
      legend: "Video (Target: <30% avg)"
  
  avg_line: 50
  color: "green"
  label: "Healthy target (50% or less)"
  
  span: 12
```

---

### Panel 4.2: Incidents vs SLO Dips — Correlation View

**Purpose:** Visually link incidents to SLO degradation

```yaml
panel_4_2:
  title: "Incidents vs. SLO Dips (Last 90 Days)"
  type: "heatmap"
  targets:
    - name: "SLO consumption by hour"
      datasource: "Prometheus"
      expr: "slo_hourly_consumption_pct"
  
  annotations:
    - source: "Sentry"
      title: "Incidents"
      tags: ["incident"]
      color: "red"
      example_markers:
        - time: "2026-05-15 14:00"
          label: "Auth index corruption (P1)"
          value: 5x_burn_rate
```

---

## Section 5: Alert Status

### Panel 5.1: Active Alerts (this week)

```yaml
panel_5_1:
  title: "Active & Recent Alerts (7 days)"
  type: "table"
  datasource: "Prometheus Alertmanager"
  columns:
    - name: "Alert"
      type: "string"
    - name: "Service"
      type: "string"
    - name: "Severity"
      type: "string"
      mapping: { firing: "red", resolved: "green" }
    - name: "Triggered"
      type: "date"
    - name: "Duration"
      type: "string"
```

---

### Panel 5.2: On-Call Schedule

```yaml
panel_5_2:
  title: "On-Call Roster (Next 7 Days)"
  type: "table"
  datasource: "PagerDuty"
  columns:
    - name: "Service/Tier"
      type: "string"
    - name: "Primary"
      type: "string"
    - name: "Backup"
      type: "string"
    - name: "Schedule"
      type: "date"
    - name: "Incident Count (30d)"
      type: "number"
```

