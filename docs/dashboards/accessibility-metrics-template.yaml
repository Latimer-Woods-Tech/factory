## How to Use This Dashboard

1. **Weekly Update** (Monday AM) — Champion updates metrics from issue tracker
2. **Team Review** — Shared in Slack #accessibility channel
3. **Monthly Sync** — Presented in company all-hands or team meeting
4. **Quarterly Review** — Trend analysis + retrospective

---

## Data Sources

- **Compliance %:** Calculated from audit report + closed issues
- **Issue Count:** GitHub issue tracker (labeled `a11y`, prioritized)
- **PRs Reviewed:** GitHub PR analytics
- **Team Performance:** Internal review tracking
- **Testing Data:** Axe CI reports + manual test logs

