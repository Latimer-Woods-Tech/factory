## Risks & Mitigation

| Risk | Impact | Likelihood | Mitigation |
|------|--------|-----------|-----------|
| Keyboard fixes introduce regressions | Re-test entire app | Medium | Extensive QA in W17 |
| Color contrast conflicts with brand | Design rework needed | Low | Champion + design sign-off |
| Screen reader tool not working | Blockers on testing | Low | Test tools in W17 setup |
| Team burnout from tight timeline | Quality issues | Medium | Realistic scope per sprint |

