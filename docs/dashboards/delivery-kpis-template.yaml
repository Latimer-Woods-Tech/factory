## Quarterly Review Process

**Every Q1, Q2, Q3, Q4:**
1. Review metrics vs. targets
2. Celebrate wins ("Deployment frequency is now 7 days, down from 10; great work!")
3. Identify top 2–3 bottlenecks
4. Set new targets (based on business priorities)
5. Assign owners to bottleneck improvements

**Example (Q2 2026 Review):**
```
Q1 Results:
  • Lead Time: 16.2 days (target: <14) → MISS, but improving from 18 days
  • Deployment Frequency: 9.1 days (target: 7) → MISS
  • Change Failure Rate: 6.7% (target: <5%) → MISS
  • MTTR: 28 min (target: <30) → HIT ✅

Q2 Priorities (set by eng + product leadership):
  1. Get deployment frequency to weekly (7 days)
     → Blocker: 2 features waiting for flag approval (product review latency)
     → Action: Daily syncs with product + marketing to unblock
  
  2. Reduce failure rate to <5%
     → Root cause: Payment module has low test coverage
     → Action: Dedicate sprint to payment testing + security audit
  
  3. Keep MTTR <30 min (maintain current level)
     → Action: Monthly incident drills + runbook review

Q2 Targets:
  • Lead Time: <14 days
  • Deployment Frequency: 7 days (weekly)
  • Change Failure Rate: <5%
  • MTTR: <30 min (P1), <90 min (P2)
```

