## Tracking & Reporting

### Weekly Report (Every Monday 10:00 UTC)

Generated by automation script `scripts/track-delivery-metrics.mjs`:

```yaml
# Weekly Summary — Week of 2026-04-28

Lead Time:
  target: 14 days
  actual: 16.2 days (p95: 28 days)
  trend: ⬆️ +2 days (worse)
  reason: "2 reviews taking >24h each (reviewer latency)"

Deployment Frequency:
  target: 7 days between deploys
  actual: 9.1 days
  trend: ⬇️ −1.5 days (better)
  reason: "Merged 2 feature flags; enabled faster deploys"

Change Failure Rate:
  target: <5%
  actual: 6.7% (1 out of 15 deploys caused P2 incident)
  trend: ➡️ No change
  reason: "Payout validation bug (fixed in postmortem)"

MTTR:
  P1: actual 28 min (target <30) ✅
  P2: actual 73 min (target <120) ✅
  trend: ✅ All on target

Blockers:
  • Stripe integration latency added 2h to 3 PRs (external, not our fault)
  • Neon database maintenance window Feb 12 delayed 1 release (external)

Next Week Priorities:
  1. Reduce review latency (set Slack reminder for stale PRs)
  2. Increase deploy frequency (enable feature flags more; 2 pending)
  3. Improve test coverage for payment (to reduce failure rate)
```

