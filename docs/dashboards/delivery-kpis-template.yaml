## Team Targets

### By Role

| Role | Responsible For | Target |
|------|-----------------|--------|
| **Engineering Lead** | Lead Time, Change Failure Rate | <14 days, <5% failures |
| **Ops** | MTTR, Deployment Frequency | <30 min P1, weekly deploys |
| **QA** | Change Failure Rate | <5% via testing |
| **Product** | Deployment Frequency | Weekly releases via sprint cadence |

### Individual Contributors

| Metric | How You Impact |
|--------|-----------------|
| **Lead Time** | Review code quickly; don't let PRs stall >24h |
| **Deployment Frequency** | Merge to main regularly; use feature flags |
| **Change Failure Rate** | Write tests; test edge cases; leave no loose ends |
| **MTTR** | Run monthly incident drills; know the rollback procedure |

