## Anti-Patterns

❌ **Manually calculating metrics every Friday** — Automate via GitHub API / CI logs  
❌ **"Everything looks good; no action needed"** — Even if on target, ask: how can we improve?  
❌ **Ignoring failures as "external"** — Stripe was slow; we didn't compensate. Fix for next time.  
❌ **Changing targets every month** — Set for quarter; adjust only if business priority changes  
❌ **Only celebrating; never addressing misses** — Misses are learning opportunities  

