# Delivery KPIs Dashboard

**Last Updated:** April 28, 2026  
**Phase:** Phase D (T6.4)  
**Owner:** Delivery lead / EM

This dashboard tracks how well the delivery process is working. Use this to identify bottlenecks and drive continuous improvement.

---

## 4 Key Metrics

### 1. Lead Time (Deployment Frequency)

**Definition:** Time from issue creation to production deployment.

**Target:** <2 weeks median (p95: <4 weeks)

**Baseline (Current Month):** 1.8 weeks median, p95 3.2 weeks

**How to Calculate:**
```sql
SELECT 
  issue_created_at,
  (select min(deployed_at) from deployments d where d.related_issue_id = i.id) as deployed_at,
  EXTRACT(DAY FROM deployed_at - issue_created_at) as lead_time_days
FROM issues i
WHERE created_at > now() - interval '30 days'
  AND deployed_at IS NOT NULL
ORDER BY lead_time_days DESC;

-- Calculate percentiles:
-- Median (p50): 16 days
-- p95: 32 days
```

**Why This Matters:**
- Fast lead time = quick feedback to users
- Slow lead time = stale code, bugs accumulate, context switching

**Improvements to Try:**
- Reduce PR review time (set 24h SLA)
- Automate more tests (CI runs faster)
- Smaller PRs (deploy faster, less risk)

---

### 2. Deployment Frequency

**Definition:** How often we ship to production.

**Target:** Weekly (every 7 days on average)

**Baseline (Current Month):** Every 10.5 days

**How to Calculate:**
```sql
SELECT 
  COUNT(*) as deployments_this_month,
  (30.0 / COUNT(*)) as avg_days_between_deploys
FROM deployments
WHERE deployed_at > now() - interval '30 days'
  AND environment = 'production';

-- Expected result: 2–3 deploys per 30 days
```

**Why This Matters:**
- Frequent deploys = smaller changes = lower risk
- Infrequent deploys = big bang releases = higher risk

**Improvements to Try:**
- Longer feature branches block deploys; merge to main more often
- Feature flags bridge the gap (deploy code, flag it off, enable when ready)
- Scheduled releases (every Monday) instead of whenever ready

---

### 3. Change Failure Rate

**Definition:** % of releases that cause incidents (P1, P2) within 24 hours.

**Target:** <5% (at most 1 in 20 releases causes issues)

**Baseline (Current Month):** 8% (2 out of 25 releases)

**How to Calculate:**
```sql
SELECT 
  COUNT(DISTINCT d.id) as total_deploys,
  COUNT(DISTINCT CASE WHEN i.created_at > d.deployed_at - interval '1 day' 
                       AND i.created_at < d.deployed_at + interval '24 hours'
                       AND i.severity IN ('P1', 'P2')
                      THEN d.id END) as incident_deploys,
  ROUND(100.0 * COUNT(DISTINCT CASE WHEN i.created_at > d.deployed_at - interval '1 day' 
                                        AND i.created_at < d.deployed_at + interval '24 hours'
                                        AND i.severity IN ('P1', 'P2')
                                       THEN d.id END) / COUNT(DISTINCT d.id), 1) as failure_rate_pct
FROM deployments d
LEFT JOIN incidents i ON i.deployment_id = d.id
WHERE d.deployed_at > now() - interval '30 days'
  AND d.environment = 'production';

-- Expected result: failure_rate_pct should be <5
```

**Why This Matters:**
- High failure rate = releases are risky
- Low failure rate = testing/review is effective

**Improvements to Try:**
- Enforce pre-release checklist (see docs/templates/PRE_RELEASE_CHECKLIST.md)
- Automate staging verification (eliminate manual QA steps)
- Canary deployments (catch issues on 10% before 100%)
- Feature flags for risky changes

---

### 4. Mean Time to Recovery (MTTR)

**Definition:** Average time from incident detection to resolution (for P1/P2 only).

**Target:** <30 min for P1, <2 hours for P2

**Baseline (Current Month):** P1: 42 min, P2: 1h 15m

**How to Calculate:**
```sql
SELECT 
  severity,
  COUNT(*) as incident_count,
  ROUND(AVG(EXTRACT(EPOCH FROM (resolved_at - detected_at)) / 60), 1) as avg_mttr_min,
  ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY EXTRACT(EPOCH FROM (resolved_at - detected_at)) / 60), 1) as p95_mttr_min
FROM incidents
WHERE detected_at > now() - interval '30 days'
  AND severity IN ('P1', 'P2')
GROUP BY severity
ORDER BY severity DESC;

-- Expected result:
-- P1: avg 25–30 min
-- P2: avg <90 min
```

**Why This Matters:**
- Fast recovery = minimal user impact
- Slow recovery = revenue loss, support burden

**Improvements to Try:**
- Rollback runbook practiced monthly (get faster at rollbacks)
- Monitoring alerts tuned (detect issues earlier)
- On-call training (reduce decision time)
- Clear incident escalation path (don't waste 10 min deciding who to page)

