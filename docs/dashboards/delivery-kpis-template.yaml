Update `docs/dashboards/delivery-kpis-template.yaml` weekly:

```yaml
metrics:
  - name: Lead Time
    unit: days
    target: 14
    baseline: 10
    current: 16.2
    trend: "↑ degrading"
    this_week: 16.2
    this_month: 15.8
    
  - name: Deployment Frequency
    unit: "days between"
    target: 7
    baseline: 10.5
    current: 9.1
    trend: "↓ improving"
    
  - name: Change Failure Rate
    unit: "%"
    target: 5
    baseline: 8
    current: 6.7
    trend: "➡️ stable"
    
  - name: MTTR (P1)
    unit: "minutes"
    target: 30
    baseline: 42
    current: 28
    trend: "↓ improving"

alerts:
  - metric: Lead Time
    threshold: "> 21 days (3x target)"
    status: "⚠️ Warning"
    action: "Review bottlenecks; increase review capacity"
    
  - metric: Change Failure Rate
    threshold: "> 10%"
    status: "🟢 OK"
    action: "None"
```

