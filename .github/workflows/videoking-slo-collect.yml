name: VideoKing SLO Collection (Weekly)

on:
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  
  workflow_dispatch: # Allow manual runs for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  collect-slo-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Run SLO collection script
        env:
          # Sentry credentials
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: factory
          SENTRY_PROJECT: videoking
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          
          # Cloudflare credentials
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          
          # PostHog credentials
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          
          # Slack webhook
          SLACK_WEBHOOK_OPS: ${{ secrets.SLACK_WEBHOOK_OPS }}
        
        run: node scripts/videoking-slo-collect.js
      
      - name: Upload SLO report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slo-report-${{ github.run_id }}
          path: slo-report-latest.json
          retention-days: 90
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: 'ops-team',  // Post to ops channel
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **VideoKing SLO collection failed**\nCheck the workflow run for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
      
      - name: Summary
        if: always()
        run: |
          echo "## VideoKing SLO Collection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f slo-report-latest.json ]; then
            echo "**Report:** Created $(date)" >> $GITHUB_STEP_SUMMARY
            cat slo-report-latest.json >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** ⚠️ Report not generated" >> $GITHUB_STEP_SUMMARY
          fi
