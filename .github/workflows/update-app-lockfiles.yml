name: Update App Lockfiles

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  update-lockfiles:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - the-calling
          - wordis-bond
          - prime-self
          - neighbor-aid
          - cypher-healing
          - ijustus
      fail-fast: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@v4
        with:
          repository: Latimer-Woods-Tech/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'

      - name: Update neon to latest
        run: npm install @latimer-woods-tech/neon@0.2.1
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit and push lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet package-lock.json; then
            echo "No changes to lockfile"
          else
            git add package-lock.json
            git commit -m "chore: update lockfile [skip ci]"
            git push
          fi

