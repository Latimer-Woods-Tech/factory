name: _post-deploy-verify

on:
  workflow_call:
    inputs:
      health_url:
        type: string
        required: true
      max_attempts:
        type: number
        default: 5
      sleep_seconds:
        type: number
        default: 10
      rollback_on_failure:
        type: boolean
        default: false
      worker_name:
        type: string
        default: ''
      previous_version_id:
        type: string
        default: ''

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Probe health endpoint
        id: probe
        run: |
          for i in $(seq 1 ${{ inputs.max_attempts }}); do
            if curl -fsSL --max-time 10 "${{ inputs.health_url }}" > /tmp/health.txt; then
              echo "✓ Healthy on attempt $i"
              cat /tmp/health.txt
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i failed, sleeping ${{ inputs.sleep_seconds }}s..."
            sleep ${{ inputs.sleep_seconds }}
          done
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          exit 1
      - name: Auto-rollback
        if: failure() && inputs.rollback_on_failure && inputs.worker_name != '' && inputs.previous_version_id != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler@latest versions rollback --name "${{ inputs.worker_name }}" --version-id "${{ inputs.previous_version_id }}" --yes
          echo "✓ Rolled back to ${{ inputs.previous_version_id }}"
