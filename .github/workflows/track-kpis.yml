name: Track Delivery KPIs

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run delivery KPI reporter
        run: node scripts/track-delivery-metrics.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DELIVERY_KPIS }}
          INCIDENT_TRACKER_API: ${{ secrets.INCIDENT_TRACKER_API }}
          INCIDENT_TRACKER_TOKEN: ${{ secrets.INCIDENT_TRACKER_TOKEN }}
          KPI_REPO_OWNER: adrper79-dot
          KPI_REPO_NAME: factory
      - name: Persist KPI history if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add kpi-history.csv || true
          git diff --quiet --cached || git commit -m 'chore: update KPI history'
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
