name: Provision Stripe Webhook for admin-studio

# One-shot workflow: creates the Stripe webhook endpoint and pushes the
# signing secret directly to the admin-studio production (and optionally
# staging) Cloudflare Worker.
#
# Prerequisites:
#   - STRIPE_SECRET_KEY must be set in this repo's GitHub Secrets
#   - CF_API_TOKEN and CF_ACCOUNT_ID must be set in this repo's GitHub Secrets
#
# After this runs, set STRIPE_SUBSCRIPTION_WEBHOOK_SECRET in GitHub Secrets
# using the signing secret printed in the summary so future deploys also
# provision it automatically.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  provision:
    name: Create Stripe webhook & push signing secret
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Determine webhook URL
        id: url
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "base=https://api.apunlimited.com" >> "$GITHUB_OUTPUT"
            echo "worker_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "base=https://api-staging.apunlimited.com" >> "$GITHUB_OUTPUT"
            echo "worker_env=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or retrieve Stripe webhook endpoint
        id: stripe
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          WEBHOOK_URL="${{ steps.url.outputs.base }}/webhooks/studio-subscriptions"
          echo "Target webhook URL: $WEBHOOK_URL"

          # List existing endpoints and find a match
          EXISTING=$(curl -sf "https://api.stripe.com/v1/webhook_endpoints?limit=100" \
            -u "${STRIPE_SECRET_KEY}:" \
            -H "Stripe-Version: 2024-06-20" | jq -r \
            --arg url "$WEBHOOK_URL" \
            '.data[] | select(.url == $url) | .id' | head -1)

          if [ -n "$EXISTING" ]; then
            echo "Found existing webhook endpoint: $EXISTING"
            # Retrieve the endpoint — note: signing secret is only returned at creation
            # We need to roll the secret to get a new one
            echo "Rolling signing secret for existing endpoint..."
            RESPONSE=$(curl -sf -X POST \
              "https://api.stripe.com/v1/webhook_endpoints/${EXISTING}/secret" \
              -u "${STRIPE_SECRET_KEY}:" \
              -H "Stripe-Version: 2024-06-20")
            SIGNING_SECRET=$(echo "$RESPONSE" | jq -r '.secret')
          else
            echo "Creating new webhook endpoint..."
            RESPONSE=$(curl -sf -X POST "https://api.stripe.com/v1/webhook_endpoints" \
              -u "${STRIPE_SECRET_KEY}:" \
              -H "Stripe-Version: 2024-06-20" \
              -d "url=$WEBHOOK_URL" \
              -d "enabled_events[]=customer.subscription.created" \
              -d "enabled_events[]=customer.subscription.updated" \
              -d "enabled_events[]=customer.subscription.deleted" \
              -d "description=admin-studio ${{ github.event.inputs.environment }} subscription webhooks")
            SIGNING_SECRET=$(echo "$RESPONSE" | jq -r '.secret')
            ENDPOINT_ID=$(echo "$RESPONSE" | jq -r '.id')
            echo "Created webhook endpoint: $ENDPOINT_ID"
          fi

          if [ -z "$SIGNING_SECRET" ] || [ "$SIGNING_SECRET" = "null" ]; then
            echo "::error::Failed to retrieve signing secret from Stripe"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          # Mask the value in logs
          echo "::add-mask::$SIGNING_SECRET"
          echo "signing_secret=$SIGNING_SECRET" >> "$GITHUB_OUTPUT"
          echo "Signing secret obtained successfully."

      - name: Push signing secret to Cloudflare Worker
        working-directory: apps/admin-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "${{ steps.stripe.outputs.signing_secret }}" | \
            npx wrangler secret put STRIPE_SUBSCRIPTION_WEBHOOK_SECRET \
            --env "${{ steps.url.outputs.worker_env }}"
          echo "STRIPE_SUBSCRIPTION_WEBHOOK_SECRET set on admin-studio-${{ steps.url.outputs.worker_env }}"

      - name: Verify webhook endpoint is live
        run: |
          sleep 5
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" -X POST \
            "${{ steps.url.outputs.base }}/webhooks/studio-subscriptions" \
            -H "Stripe-Signature: t=1,v1=invalid" \
            -H "Content-Type: application/json" \
            -d '{}' || true)
          echo "Webhook endpoint status: $STATUS"
          if [ "$STATUS" = "400" ] || [ "$STATUS" = "401" ]; then
            echo "✅ Endpoint live and rejecting (expected for bad sig)"
          elif [ "$STATUS" = "503" ]; then
            echo "::error::Endpoint still returning 503 — secret may not have propagated yet"
            exit 1
          else
            echo "::warning::Unexpected status $STATUS — check manually"
          fi

      - name: Summary
        run: |
          echo "## Stripe Webhook Provisioned ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Webhook URL:** ${{ steps.url.outputs.base }}/webhooks/studio-subscriptions" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Next step" >> "$GITHUB_STEP_SUMMARY"
          echo "Add \`STRIPE_SUBSCRIPTION_WEBHOOK_SECRET\` to this repo's GitHub Secrets" >> "$GITHUB_STEP_SUMMARY"
          echo "so future deploys automatically keep it in sync." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run: \`wrangler secret list --env ${{ github.event.inputs.environment }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "to confirm the secret is present on the worker." >> "$GITHUB_STEP_SUMMARY"
