name: Deploy Synthetic Monitor

on:
  push:
    branches: [main]
    paths:
      - 'apps/synthetic-monitor/**'
      - '.github/workflows/deploy-synthetic-monitor.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

concurrency:
  group: deploy-synthetic-monitor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Deploy synthetic-monitor to Cloudflare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd apps/synthetic-monitor
          npm install

      - name: Typecheck
        run: |
          cd apps/synthetic-monitor
          npx tsc --noEmit

      - name: Test
        run: |
          cd apps/synthetic-monitor
          npx vitest run

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/synthetic-monitor
          command: deploy --env production
          environment: production

      - name: Verify deployment
        run: |
          echo "🚀 Deployment complete"
          echo "📍 Health endpoint: https://synthetic-monitor.adrper79.workers.dev/health"
          node scripts/verify-http-endpoint.mjs \
            --url https://synthetic-monitor.adrper79.workers.dev/health \
            --status 200 \
            --json-field status \
            --json-equals ok \
            --retries 8 \
            --delay-ms 5000
          echo "📍 On-demand run: https://synthetic-monitor.adrper79.workers.dev/checks/run"
