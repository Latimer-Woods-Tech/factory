name: Deploy admin-studio (Worker)

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-studio/**'
      - 'packages/studio-core/**'
      - '.github/workflows/deploy-admin-studio.yml'
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: admin-studio-${{ github.event.inputs.env || 'staging' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env || 'staging' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build dependency packages
        run: |
          set -euo pipefail
          for pkg in errors monitoring logger auth neon llm studio-core; do
            echo "=== Installing + building packages/${pkg} ==="
            cd "packages/${pkg}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install admin-studio
        run: npm ci
        working-directory: apps/admin-studio

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/admin-studio

      - name: Test studio-core
        run: npm test
        working-directory: packages/studio-core

      - name: Verify health pre-deploy (sanity)
        run: |
          target_env="${{ github.event.inputs.env || 'staging' }}"
          echo "Deploying admin-studio to $target_env"
          test -n "${{ secrets.CF_API_TOKEN }}" || (echo "::error::CF_API_TOKEN missing" && exit 1)

      - name: Deploy
        run: npx wrangler deploy --env ${{ github.event.inputs.env || 'staging' }}
        working-directory: apps/admin-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Verify health post-deploy
        run: |
          target_env="${{ github.event.inputs.env || 'staging' }}"
          if [ "$target_env" = "production" ]; then
            url="https://admin-studio-production.adrper79.workers.dev/health"
          else
            url="https://admin-studio-staging.adrper79.workers.dev/health"
          fi
          node scripts/verify-http-endpoint.mjs \
            --url "$url" \
            --status 200 \
            --json-field env \
            --json-equals "$target_env" \
            --retries 8 \
            --delay-ms 5000
