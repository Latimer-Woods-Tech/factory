name: Deploy admin-studio (Worker)

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-studio/**'
      - 'packages/studio-core/**'
      - '.github/workflows/deploy-admin-studio.yml'
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: admin-studio-${{ github.event.inputs.env || 'staging' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env || 'staging' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@adrper79-dot'

      - name: Install
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build studio-core
        run: npm run build --workspace=@adrper79-dot/studio-core

      - name: Typecheck
        run: npm run typecheck --workspace=@adrper79-dot/admin-studio

      - name: Test
        run: npm test --workspace=@adrper79-dot/studio-core

      - name: Verify health pre-deploy (sanity)
        run: |
          target_env="${{ github.event.inputs.env || 'staging' }}"
          echo "Deploying admin-studio to $target_env"
          test -n "${{ secrets.CF_API_TOKEN }}" || (echo "::error::CF_API_TOKEN missing" && exit 1)

      - name: Deploy
        run: npx wrangler deploy --env ${{ github.event.inputs.env || 'staging' }}
        working-directory: apps/admin-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Verify health post-deploy
        run: |
          target_env="${{ github.event.inputs.env || 'staging' }}"
          if [ "$target_env" = "production" ]; then
            url="https://admin-studio-production.adrper79.workers.dev/health"
          else
            url="https://admin-studio-staging.adrper79.workers.dev/health"
          fi
          echo "Curling $url"
          status=$(curl -s -o /tmp/health.json -w "%{http_code}" "$url")
          cat /tmp/health.json
          if [ "$status" != "200" ]; then
            echo "::error::Health check failed: HTTP $status"
            exit 1
          fi
          actual_env=$(jq -r .env /tmp/health.json)
          if [ "$actual_env" != "$target_env" ]; then
            echo "::error::Env mismatch — expected $target_env, got $actual_env"
            exit 1
          fi
