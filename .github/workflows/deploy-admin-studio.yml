name: Deploy admin-studio (Worker)

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-studio/**'
      - 'packages/studio-core/**'
      - '.github/workflows/deploy-admin-studio.yml'
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: admin-studio-${{ github.event.inputs.env || 'staging' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.event.inputs.env || 'staging' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build dependency packages
        run: |
          set -euo pipefail
          for pkg in errors monitoring logger auth neon llm studio-core; do
            echo "=== Installing + building packages/${pkg} ==="
            cd "packages/${pkg}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install admin-studio
        run: npm install --legacy-peer-deps
        working-directory: apps/admin-studio

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/admin-studio

      - name: Test studio-core
        run: npm test
        working-directory: packages/studio-core

      - name: Verify health pre-deploy (sanity)
        run: |
          target_env="${{ github.event.inputs.env || 'staging' }}"
          echo "Deploying admin-studio to $target_env"
          test -n "${{ secrets.CF_API_TOKEN }}" || (echo "::error::CF_API_TOKEN missing" && exit 1)

      - name: Provision webhook secret
        run: |
          target_env="${{ github.event.inputs.env || 'staging' }}"
          if [ -z "${{ secrets.STRIPE_SUBSCRIPTION_WEBHOOK_SECRET }}" ]; then
            echo "::warning::STRIPE_SUBSCRIPTION_WEBHOOK_SECRET missing; webhook endpoint will return 503 until configured"
            exit 0
          fi
          echo "Provisioning STRIPE_SUBSCRIPTION_WEBHOOK_SECRET for $target_env"
          echo "${{ secrets.STRIPE_SUBSCRIPTION_WEBHOOK_SECRET }}" | npx wrangler secret put STRIPE_SUBSCRIPTION_WEBHOOK_SECRET --env "$target_env"
        working-directory: apps/admin-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}


      - name: Push self-improvement secrets
        run: |
          target_env="${{ github.event.inputs.env || 'staging' }}"
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | npx wrangler secret put ANTHROPIC_API_KEY --env "$target_env"
          echo "${{ secrets.GH_PAT }}" | npx wrangler secret put GITHUB_TOKEN --env "$target_env"
          if [ -n "${{ secrets.WORKER_API_TOKEN }}" ]; then
            echo "${{ secrets.WORKER_API_TOKEN }}" | npx wrangler secret put WORKER_API_TOKEN --env "$target_env"
          fi
        working-directory: apps/admin-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Deploy
        run: npx wrangler deploy --env ${{ github.event.inputs.env || 'staging' }}
        working-directory: apps/admin-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Verify post-deploy endpoints
        run: |
          target_env="${{ github.event.inputs.env || 'staging' }}"
          if [ "$target_env" = "production" ]; then
            base_url="https://api.apunlimited.com"
          else
            base_url="https://api-staging.apunlimited.com"
          fi
          node apps/admin-studio/scripts/verify-deployment.mjs "$target_env" --base-url "$base_url"
