# =============================================================================
# Regenerate package-lock.json across consumer apps after a factory package
# release. Runs `npm install` per repo, opens a PR if the lockfile changed.
#
# Triggered manually via workflow_dispatch. Useful after bumping versions in
# any of the @latimer-woods-tech/* packages.
# =============================================================================

name: regenerate-app-lockfiles

on:
  workflow_dispatch:
    inputs:
      repos:
        description: 'Space-separated app repos (default: 6 known consumers)'
        required: false
        default: 'cypher-healing the-calling neighbor-aid xico-city factory-admin xpelevator'
      node_version:
        description: 'Node.js version'
        required: false
        default: '22'

permissions:
  contents: read

jobs:
  regen:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ['cypher-healing', 'the-calling', 'neighbor-aid', 'xico-city', 'factory-admin', 'xpelevator']
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: ${{ matrix.repo }}

      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@v4
        with:
          repository: Latimer-Woods-Tech/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: app
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://registry.npmjs.org'

      - name: Regenerate lockfile
        working-directory: app
        run: |
          set -e
          if [ ! -f package.json ]; then
            echo "No package.json at root, skipping"
            exit 0
          fi
          rm -f package-lock.json
          npm install --package-lock-only --no-audit --no-fund

      - name: Open PR if changed
        working-directory: app
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e
          if git diff --quiet package-lock.json 2>/dev/null; then
            echo "No lockfile changes for ${{ matrix.repo }}"
            exit 0
          fi
          BRANCH="chore/refresh-lockfile-$(date -u +%Y%m%d-%H%M%S)"
          git config user.email "factory-cross-repo[bot]@users.noreply.github.com"
          git config user.name "factory-cross-repo[bot]"
          git checkout -b "$BRANCH"
          git add package-lock.json
          git commit -m "chore: refresh package-lock.json against npmjs.org @latimer-woods-tech/* packages"
          git push origin "$BRANCH"
          gh pr create \
            --repo "Latimer-Woods-Tech/${{ matrix.repo }}" \
            --base main \
            --head "$BRANCH" \
            --title "chore: refresh package-lock.json (npmjs.org migration)" \
            --body "Automated lockfile refresh after migrating @latimer-woods-tech/* packages from GitHub Packages (private) to npmjs.org (public).

Triggered by factory's regenerate-app-lockfiles workflow. Merging unblocks CI.

If CI passes on this PR, the migration is complete for this repo."
