name: Regenerate App Lockfiles
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  regen:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - cypher-healing
          - the-calling
          - neighbor-aid
          - xico-city
          - factory-admin
          - xpelevator
      fail-fast: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@v4
        with:
          repository: Latimer-Woods-Tech/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Regenerate package-lock.json
        run: |
          rm -f package-lock.json
          npm install --package-lock-only --no-audit --no-fund
      - name: Open PR if changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e
          if git diff --quiet package-lock.json 2>/dev/null; then
            echo "No lockfile changes"
            exit 0
          fi
          BR="chore/refresh-lockfile-npmjs-$(date -u +%Y%m%d-%H%M%S)"
          git config user.email "factory-cross-repo[bot]@users.noreply.github.com"
          git config user.name "factory-cross-repo[bot]"
          git checkout -b "$BR"
          git add package-lock.json
          git commit -m "chore: refresh package-lock.json (npmjs.org migration)"
          git push origin "$BR"
          gh pr create --repo "Latimer-Woods-Tech/${{ matrix.repo }}" --base main --head "$BR" --title "chore: refresh package-lock.json (npmjs.org migration)" --body "Automated lockfile refresh after migrating @latimer-woods-tech/* packages to public npmjs.org. Merging unblocks CI."
