name: Set NEON_URL for prime-self

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  set-neon-url:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Set NEON_URL secret on prime-self Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEON_URL: ${{ secrets.SELFPRIME_CONNECTION_STRING }}
        run: echo "$NEON_URL" | wrangler secret put NEON_URL --name prime-self-api
