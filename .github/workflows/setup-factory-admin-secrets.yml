name: Setup factory-admin Secrets (Phase 8)

on:
  workflow_dispatch:

# Reads secrets from this (Factory) repo and copies them to factory-admin.
# Also generates ADMIN_JWT_SECRET and sets it via wrangler.
#
# Required secrets in this repo:
#   GH_PAT                — PAT with repo + packages:read
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare Account ID

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4

      - name: Set GitHub Actions secrets on factory-admin
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PAT_VALUE: ${{ steps.app-token.outputs.token }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # PACKAGES_READ_TOKEN = GH_PAT value (has packages:read scope)
          gh secret set PACKAGES_READ_TOKEN \
            --repo adrper79-dot/factory-admin \
            --body "$PAT_VALUE"
          echo "✅ PACKAGES_READ_TOKEN set"

          gh secret set CF_API_TOKEN \
            --repo adrper79-dot/factory-admin \
            --body "$CF_API_TOKEN"
          echo "✅ CF_API_TOKEN set"

          gh secret set CF_ACCOUNT_ID \
            --repo adrper79-dot/factory-admin \
            --body "$CF_ACCOUNT_ID"
          echo "✅ CF_ACCOUNT_ID set"

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Generate and set ADMIN_JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ADMIN_JWT_SECRET=$(openssl rand -hex 32)
          echo "$ADMIN_JWT_SECRET" | wrangler secret put ADMIN_JWT_SECRET \
            --name factory-admin
          echo "✅ ADMIN_JWT_SECRET set on factory-admin Worker"
