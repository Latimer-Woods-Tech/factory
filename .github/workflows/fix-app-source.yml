name: Fix App Source Issues

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  fix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [wordis-bond, cypher-healing, prime-self, ijustus, the-calling, neighbor-aid]
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Latimer-Woods-Tech/${{ matrix.app }}
          token: ${{ secrets.GH_PAT }}
          path: app

      - name: Apply source fixes
        working-directory: app
        run: |
          node << 'NODEEOF'
          const fs = require('fs');

          // 1. Fix tsconfig.json — add skipLibCheck
          const tsc = JSON.parse(fs.readFileSync('tsconfig.json', 'utf8'));
          if (!tsc.compilerOptions.skipLibCheck) {
            tsc.compilerOptions.skipLibCheck = true;
            fs.writeFileSync('tsconfig.json', JSON.stringify(tsc, null, 2) + '\n');
            console.log('tsconfig.json: added skipLibCheck');
          }

          // 2. Fix src/db/schema.ts — timestamptz → timestamp with timezone
          if (fs.existsSync('src/db/schema.ts')) {
            let schema = fs.readFileSync('src/db/schema.ts', 'utf8');
            if (schema.includes('timestamptz')) {
              const hasStandaloneTimestamp = /\btimestamp\b(?!z)/.test(schema);

              // Replace all timestamptz('col') column calls
              schema = schema.replace(/timestamptz\('([^']+)'\)/g, (_, col) => {
                return `timestamp('${col}', { withTimezone: true })`;
              });

              // Remove timestamptz from the import line
              // Handle: ",\n  timestamptz," / "  timestamptz,\n" / ", timestamptz"
              schema = schema.replace(/,\s*\n(\s*)timestamptz,\s*\n/g, ',\n');
              schema = schema.replace(/\s*timestamptz,\s*\n/g, '\n');
              schema = schema.replace(/,\s*timestamptz\b/g, '');

              // Add timestamp to the drizzle-orm/pg-core import if not already there
              if (!hasStandaloneTimestamp) {
                schema = schema.replace(/(}\s*from ['"]drizzle-orm\/pg-core['"])/, '  timestamp,\n$1');
              }

              fs.writeFileSync('src/db/schema.ts', schema);
              console.log('src/db/schema.ts: fixed timestamptz');
            }
          }

          // 3. Fix src/index.ts — jwtPayload → user
          if (fs.existsSync('src/index.ts')) {
            let idx = fs.readFileSync('src/index.ts', 'utf8');
            if (idx.includes('jwtPayload')) {
              idx = idx.replace(/c\.get\('jwtPayload'\)/g, "c.get('user')");
              idx = idx.replace(/jwtPayload/g, 'user');
              fs.writeFileSync('src/index.ts', idx);
              console.log('src/index.ts: fixed jwtPayload → user');
            }
          }
          NODEEOF

      - name: Commit and push fixes
        working-directory: app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tsconfig.json src/db/schema.ts src/index.ts
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "fix: add skipLibCheck, fix timestamptz import, fix jwtPayload key"
          git push
