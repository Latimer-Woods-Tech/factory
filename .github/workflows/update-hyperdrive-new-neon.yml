name: Update Hyperdrive to New Neon Projects

on:
  workflow_dispatch:

env:
  CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CF_TOKEN: ${{ secrets.CF_API_TOKEN }}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update wordis-bond Hyperdrive
        env:
          CONN: ${{ secrets.WORDISBOND_CONNECTION_STRING }}
        run: |
          PASSWORD=$(echo "$CONN" | sed 's|.*://[^:]*:\([^@]*\)@.*|\1|')
          BODY=$(jq -n \
            --arg host "ep-blue-mud-amytw2js.c-5.us-east-1.aws.neon.tech" \
            --arg db "neondb" --arg user "neondb_owner" --arg pw "$PASSWORD" \
            '{name:"wordis-bond-db",origin:{host:$host,port:5432,database:$db,user:$user,password:$pw,scheme:"postgresql"}}')
          curl -sf -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/hyperdrive/configs/1b281136e0fa456099507a51664e2591" \
            -H "Authorization: Bearer ${CF_TOKEN}" -H "Content-Type: application/json" \
            -d "$BODY" | jq -r '"wordis-bond: success=\(.success) errors=\(.errors)"'

      - name: Update prime-self Hyperdrive
        env:
          CONN: ${{ secrets.SELFPRIME_CONNECTION_STRING }}
        run: |
          PASSWORD=$(echo "$CONN" | sed 's|.*://[^:]*:\([^@]*\)@.*|\1|')
          BODY=$(jq -n \
            --arg host "ep-steep-rice-akr7f4kn.c-3.us-west-2.aws.neon.tech" \
            --arg db "neondb" --arg user "neondb_owner" --arg pw "$PASSWORD" \
            '{name:"prime-self-db",origin:{host:$host,port:5432,database:$db,user:$user,password:$pw,scheme:"postgresql"}}')
          curl -sf -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/hyperdrive/configs/78e47571fffb4a81ba12ee454507e006" \
            -H "Authorization: Bearer ${CF_TOKEN}" -H "Content-Type: application/json" \
            -d "$BODY" | jq -r '"prime-self: success=\(.success) errors=\(.errors)"'

      - name: Update the-calling Hyperdrive
        env:
          CONN: ${{ secrets.THECALLING_CONNECTION_STRING }}
        run: |
          PASSWORD=$(echo "$CONN" | sed 's|.*://[^:]*:\([^@]*\)@.*|\1|')
          BODY=$(jq -n \
            --arg host "ep-little-sound-ancy82bi.c-6.us-east-1.aws.neon.tech" \
            --arg db "neondb" --arg user "neondb_owner" --arg pw "$PASSWORD" \
            '{name:"the-calling-db",origin:{host:$host,port:5432,database:$db,user:$user,password:$pw,scheme:"postgresql"}}')
          curl -sf -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/hyperdrive/configs/db5fff63eae14cc980fa16a0e6c09d77" \
            -H "Authorization: Bearer ${CF_TOKEN}" -H "Content-Type: application/json" \
            -d "$BODY" | jq -r '"the-calling: success=\(.success) errors=\(.errors)"'
