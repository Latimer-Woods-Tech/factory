name: Smoke — Prime Self Production

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override base URL (default: https://selfprime.net)'
        required: false
        default: 'https://selfprime.net'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  smoke:
    name: Playwright smoke — ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        project: [chromium-desktop, mobile-chrome, mobile-safari]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            apps/prime-self-smoke/package-lock.json
            packages/testing/package-lock.json

      - name: Install testing package dependencies
        working-directory: packages/testing
        run: npm ci

      - name: Build testing package
        working-directory: packages/testing
        run: npm run build

      - name: Install dependencies
        working-directory: apps/prime-self-smoke
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/prime-self-smoke
        run: npx playwright install --with-deps ${{ matrix.project == 'chromium-desktop' && 'chromium' || matrix.project == 'mobile-chrome' && 'chromium' || 'webkit' }}

      - name: Validate smoke credentials
        env:
          SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
          SMOKE_PRACTITIONER_EMAIL: ${{ secrets.SMOKE_PRACTITIONER_EMAIL }}
          SMOKE_PRACTITIONER_PASSWORD: ${{ secrets.SMOKE_PRACTITIONER_PASSWORD }}
        run: |
          missing=()
          for v in SMOKE_USER_EMAIL SMOKE_USER_PASSWORD SMOKE_PRACTITIONER_EMAIL SMOKE_PRACTITIONER_PASSWORD; do
            if [ -z "${!v}" ]; then
              missing+=("$v")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required secrets for authenticated workspace smoke contract tests: ${missing[*]}"
            exit 1
          fi

      - name: Run Playwright tests (${{ matrix.project }})
        working-directory: apps/prime-self-smoke
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://selfprime.net' }}
          API_BASE_URL: 'https://api.selfprime.net'
          WORKER_URL: 'https://prime-self.adrper79.workers.dev'
          SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
          SMOKE_PRACTITIONER_EMAIL: ${{ secrets.SMOKE_PRACTITIONER_EMAIL }}
          SMOKE_PRACTITIONER_PASSWORD: ${{ secrets.SMOKE_PRACTITIONER_PASSWORD }}
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}-${{ github.run_id }}
          path: |
            apps/prime-self-smoke/playwright-report/
            apps/prime-self-smoke/test-results/
          retention-days: 7

  a11y:
    name: Accessibility gate (axe)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            apps/prime-self-smoke/package-lock.json
            packages/testing/package-lock.json

      - name: Install testing package dependencies
        working-directory: packages/testing
        run: npm ci

      - name: Build testing package
        working-directory: packages/testing
        run: npm run build

      - name: Install dependencies
        working-directory: apps/prime-self-smoke
        run: npm ci

      - name: Install Playwright browsers (chromium)
        working-directory: apps/prime-self-smoke
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        working-directory: apps/prime-self-smoke
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://selfprime.net' }}
        run: npx playwright test tests/accessibility.spec.ts --project=chromium-desktop

      - name: Upload a11y report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-report-${{ github.run_id }}
          path: |
            apps/prime-self-smoke/playwright-report/
            apps/prime-self-smoke/test-results/
          retention-days: 7
