name: Documentation Freshness Audit

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  # Allow manual trigger
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run documentation freshness audit
        id: audit
        run: node scripts/doc-freshness-audit.js > audit-report.md
        continue-on-error: true

      - name: Read audit report
        id: report
        run: cat audit-report.md >> $GITHUB_STEP_SUMMARY

      - name: Create issue if stale docs found
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit-report.md', 'utf8');

            // Check if we have any stale docs
            if (report.includes('Yellow Flags') || report.includes('Red Flags') || report.includes('Critical')) {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '📋 Documentation Freshness Alert — Stale Docs Detected',
                body: `## Stale Documentation Report\n\n${report}\n\n### Action Required\n\nPlease update stale docs according to their assigned cadence. See [DOCS_OWNERSHIP.md](docs/DOCS_OWNERSHIP.md) for owner assignments.`,
                labels: ['docs', 'maintenance'],
              });

              console.log(`Created issue #${issue.data.number}`);
            }

      - name: Publish audit report to workflow summary
        if: always()
        run: |
          echo "## 📋 Documentation Freshness Audit" >> $GITHUB_STEP_SUMMARY
          cat audit-report.md >> $GITHUB_STEP_SUMMARY
