name: Run App Migrations

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

concurrency:
  group: run-app-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app: [wordis-bond, cypher-healing, ijustus, the-calling, neighbor-aid]

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: Latimer-Woods-Tech/${{ matrix.app }}
          token: ${{ steps.app-token.outputs.token }}
          path: app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'

      - name: Configure npm auth for GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ steps.app-token.outputs.token }}" >> app/.npmrc

      - name: Install dependencies
        run: npm ci
        working-directory: app
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Generate Drizzle migration
        run: npx drizzle-kit generate
        working-directory: app

      - name: Apply migration to Neon
        run: |
          case "${{ matrix.app }}" in
            wordis-bond)    export DATABASE_URL="${{ secrets.WORDISBOND_CONNECTION_STRING }}" ;;
            cypher-healing) export DATABASE_URL="${{ secrets.CYPHEROFHEALING_CONNECTION_STRING }}" ;;
            prime-self)     export DATABASE_URL="${{ secrets.SELFPRIME_CONNECTION_STRING }}" ;;
            ijustus)        export DATABASE_URL="${{ secrets.KAIROSCOUNCIL_CONNECTION_STRING }}" ;;
            the-calling)    export DATABASE_URL="${{ secrets.THECALLING_CONNECTION_STRING }}" ;;
            neighbor-aid)   export DATABASE_URL="${{ secrets.NICHESTREAM_CONNECTION_STRING }}" ;;
          esac
          npx drizzle-kit migrate
        working-directory: app

      - name: Commit generated migration files
        run: |
          cd app
          git config user.email "ci@factory.dev"
          git config user.name "Factory CI"
          git add src/db/migrations/
          git diff --staged --quiet && echo "No migration changes" || \
            git commit -m "chore(db): generate initial drizzle migration [skip ci]"
          git push
