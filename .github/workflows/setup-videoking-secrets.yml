name: Setup videoking Secrets (VK-5)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print commands without executing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Sets GitHub Actions secrets on the Latimer-Woods-Tech/videoking repo and
# Wrangler (Cloudflare Worker) secrets on the nichestream-api worker.
#
# Worker secrets pushed via `wrangler secret bulk` (encrypted at rest):
#   BETTER_AUTH_SECRET, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
#   STREAM_API_TOKEN, SENTRY_DSN, EMAIL_API_KEY, POSTHOG_KEY
#
# Plain-text vars (STREAM_ACCOUNT_ID, APP_BASE_URL, Stripe price IDs) are
# set via wrangler.toml [vars] on the next `wrangler deploy` (VK-7).
# The Cloudflare REST API PATCH endpoint silently ignores plain_text value
# updates, so those are NOT pushed here.
#
# Prerequisites:
#   - FACTORY_APP_ID / FACTORY_APP_PRIVATE_KEY: GitHub App (repo + packages:read)
#   - CF_API_TOKEN: Cloudflare API token with Workers:Edit permission
#   - CLOUDFLARE_ACCOUNT_ID: Cloudflare account ID
#   - BETTER_AUTH_SECRET_VIDEOKING, STRIPE_WEBHOOK_SECRET_VIDEOKING,
#     SENTRY_DSN_VIDEOKING: set in Factory repo secrets before running
#   - Worker must already be deployed (nichestream-api must exist in CF account)

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  HEALTH_URL: 'https://api.itsjusus.com/health'

jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Set GitHub repo secrets on videoking
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set_secret() {
            local name="$1" val="$2"
            if [ -z "$val" ]; then
              echo "SKIP $name (empty)"
              return
            fi
            echo "$val" | gh secret set "$name" --repo Latimer-Woods-Tech/videoking
            echo "Set GitHub secret: $name"
          }
          set_secret PACKAGES_READ_TOKEN  "${{ steps.app-token.outputs.token }}"
          set_secret CF_API_TOKEN         "${{ secrets.CF_API_TOKEN }}"
          set_secret CLOUDFLARE_API_TOKEN "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          set_secret CF_ACCOUNT_ID        "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          set_secret SENTRY_DSN           "${{ secrets.SENTRY_DSN_VIDEOKING }}"
          echo "GitHub secrets complete."

      - name: Bulk-push Worker secrets to nichestream-api
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET_VIDEOKING }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_VIDEOKING }}
          STREAM_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          # ^ STREAM_API_TOKEN reuses CF_API_TOKEN (Stream:Edit is included in the Worker token).
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_VIDEOKING }}
          EMAIL_API_KEY: ${{ secrets.RESEND_API_KEY }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
        run: |
          jq -n \
            --arg a "$BETTER_AUTH_SECRET" \
            --arg b "$STRIPE_SECRET_KEY" \
            --arg c "$STRIPE_WEBHOOK_SECRET" \
            --arg d "$STREAM_API_TOKEN" \
            --arg e "$SENTRY_DSN" \
            --arg f "$EMAIL_API_KEY" \
            --arg g "$POSTHOG_KEY" \
            '{
              BETTER_AUTH_SECRET:    $a,
              STRIPE_SECRET_KEY:     $b,
              STRIPE_WEBHOOK_SECRET: $c,
              STREAM_API_TOKEN:      $d,
              SENTRY_DSN:            $e,
              EMAIL_API_KEY:         $f,
              POSTHOG_KEY:           $g
            }' > /tmp/videoking-secrets.json
          wrangler secret bulk /tmp/videoking-secrets.json --name nichestream-api
          echo "Worker secrets complete."

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "DRY RUN — would set the following:"
          echo ""
          echo "GitHub repo secrets (Latimer-Woods-Tech/videoking):"
          echo "  PACKAGES_READ_TOKEN, CF_API_TOKEN, CLOUDFLARE_API_TOKEN, CF_ACCOUNT_ID, SENTRY_DSN"
          echo ""
          echo "Wrangler Worker secrets (nichestream-api):"
          echo "  BETTER_AUTH_SECRET, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,"
          echo "  STREAM_API_TOKEN, SENTRY_DSN, EMAIL_API_KEY, POSTHOG_KEY"
          echo ""
          echo "NOTE: Plain-text vars (STREAM_ACCOUNT_ID, APP_BASE_URL, Stripe price IDs)"
          echo "  are set via wrangler.toml [vars] on next wrangler deploy (VK-7)."

      - name: Verify /health (informational — non-blocking)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          # Non-blocking: /health returns 503 until plain-text vars are deployed via VK-7.
          code=$(curl -s -o /tmp/body -w '%{http_code}' --max-time 15 "$HEALTH_URL" || echo "000")
          body=$(cat /tmp/body 2>/dev/null | head -c 200)
          echo "Health check: HTTP $code | $body"
          if [ "$code" = "200" ]; then
            echo "✅ /health returned 200 — Worker is healthy."
          else
            echo "INFO: /health returned $code (expected until VK-7 deploys plain-text vars)."
            echo "  Secrets now set: BETTER_AUTH_SECRET, STRIPE_*, STREAM_API_TOKEN, SENTRY_DSN, EMAIL_API_KEY, POSTHOG_KEY"
            echo "  Remaining 503 cause: STREAM_ACCOUNT_ID, APP_BASE_URL, Stripe price IDs"
            echo "  Resolution: merge VK-7 (wrangler deploy from updated wrangler.toml)."
          fi
