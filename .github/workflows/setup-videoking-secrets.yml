name: Setup videoking Secrets

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print commands without executing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Sets GitHub Actions secrets on the videoking repo and
# Wrangler (Cloudflare Worker) secrets on the nichestream-api worker.
#
# Prerequisites:
#   - FACTORY_APP_ID, FACTORY_APP_PRIVATE_KEY: GitHub App for cross-repo auth
#   - CF_API_TOKEN: Cloudflare token with Workers:Edit permission
#   - CLOUDFLARE_ACCOUNT_ID set in Factory secrets
#   - JWT_SECRET_VIDEOKING, SENTRY_DSN_VIDEOKING set in Factory secrets
#   - BETTER_AUTH_SECRET_VIDEOKING, STRIPE_WEBHOOK_SECRET_VIDEOKING in Factory secrets
#   - Worker must already be deployed (nichestream-api)
#
# Note: plain_text Worker vars (Stripe price IDs, Stream identifiers) are
# managed separately by push-videoking-worker-secrets.yml.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Set GitHub repo secrets on videoking
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set_secret() {
            local name="$1" val="$2"
            if [ -z "$val" ]; then
              echo "SKIP $name (empty)"
              return
            fi
            echo "$val" | gh secret set "$name" --repo Latimer-Woods-Tech/videoking
            echo "Set GitHub secret: $name"
          }
          set_secret PACKAGES_READ_TOKEN   "${{ steps.app-token.outputs.token }}"
          set_secret CF_API_TOKEN          "${{ secrets.CF_API_TOKEN }}"
          set_secret CF_ACCOUNT_ID         "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          set_secret SENTRY_DSN            "${{ secrets.SENTRY_DSN_VIDEOKING }}"
          echo "GitHub secrets complete."

      - name: Set Wrangler worker secrets on nichestream-api
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set_wrangler() {
            local name="$1" val="$2"
            if [ -z "$val" ]; then
              echo "SKIP $name (empty)"
              return
            fi
            echo "$val" | wrangler secret put "$name" --name nichestream-api
            echo "Set Wrangler secret: $name"
          }
          set_wrangler JWT_SECRET            "${{ secrets.JWT_SECRET_VIDEOKING }}"
          set_wrangler BETTER_AUTH_SECRET    "${{ secrets.BETTER_AUTH_SECRET_VIDEOKING }}"
          set_wrangler STRIPE_SECRET_KEY     "${{ secrets.STRIPE_SECRET_KEY }}"
          set_wrangler STRIPE_WEBHOOK_SECRET "${{ secrets.STRIPE_WEBHOOK_SECRET_VIDEOKING }}"
          set_wrangler STREAM_API_TOKEN      "${{ secrets.CF_API_TOKEN }}"
          set_wrangler SENTRY_DSN            "${{ secrets.SENTRY_DSN_VIDEOKING }}"
          set_wrangler EMAIL_API_KEY         "${{ secrets.RESEND_API_KEY }}"
          set_wrangler POSTHOG_KEY           "${{ secrets.POSTHOG_PROJECT_TOKEN }}"
          echo "Wrangler secrets complete."

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "DRY RUN — would set the following:"
          echo ""
          echo "GitHub repo secrets (Latimer-Woods-Tech/videoking):"
          echo "  PACKAGES_READ_TOKEN, CF_API_TOKEN, CF_ACCOUNT_ID, SENTRY_DSN"
          echo ""
          echo "Wrangler worker secrets (nichestream-api worker):"
          echo "  JWT_SECRET, BETTER_AUTH_SECRET, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET"
          echo "  STREAM_API_TOKEN, SENTRY_DSN, EMAIL_API_KEY, POSTHOG_KEY"
          echo ""
          echo "Note: plain_text Worker vars (Stripe prices, Stream IDs) are set by push-videoking-worker-secrets.yml"
