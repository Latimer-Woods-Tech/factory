name: Render Video

# ---------------------------------------------------------------------------
# World-class content quality pipeline for Prime Self video automation.
# All LLM calls use the Prime Self SYSTEM_CONTEXT.md + optional content brief
# for brand-accurate, hallucination-resistant script generation.
# ---------------------------------------------------------------------------

on:
  # Manual dispatch — also called programmatically by the cron Worker
  workflow_dispatch:
    inputs:
      job_id:
        description: 'video_calendar UUID (used as idempotency key)'
        required: true
        type: string
      composition_id:
        description: 'Remotion composition to render'
        required: true
        type: choice
        options:
          - MarketingVideo
          - TrainingVideo
          - WalkthroughVideo
      app_id:
        description: 'Factory application identifier (e.g. prime_self)'
        required: true
        type: string
      topic:
        description: 'Short topic label (used when brief_key is not provided)'
        required: true
        type: string
      brief_key:
        description: 'Content brief filename key (e.g. getting-started-first-week). Loads from apps/video-studio/content-briefs/{app_id}/{key}.json'
        required: false
        default: ''
        type: string
      brand_color:
        description: 'Primary brand hex colour — defaults to Prime Self purple'
        required: false
        default: '#8B5CF6'
        type: string
      brand_accent:
        description: 'Accent hex colour — defaults to Prime Self green'
        required: false
        default: '#10B981'
        type: string
      logo_url:
        description: 'Logo image URL (leave blank to use APP_LOGO_URL env default)'
        required: false
        default: ''
        type: string

concurrency:
  group: render-${{ github.event.inputs.job_id }}
  cancel-in-progress: false

jobs:
  render:
    name: Generate narration + render MP4
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      real_job_id: ${{ steps.register_job.outputs.real_job_id }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Node.js + npm auth
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@adrper79-dot'

      - name: Install video-studio dependencies
        working-directory: apps/video-studio
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}

      # -----------------------------------------------------------------------
      # 3. Register job in database (idempotent — cron pre-creates; manual dispatch creates here)
      # -----------------------------------------------------------------------
      - name: Register job in database
        id: register_job
        run: |
          # Map composition_id → schedule-worker type string
          case "$COMPOSITION_ID" in
            MarketingVideo)   TYPE="marketing" ;;
            TrainingVideo)    TYPE="training" ;;
            WalkthroughVideo) TYPE="walkthrough" ;;
            *)                TYPE="marketing" ;;
          esac

          RESPONSE=$(curl -s -X POST "${SCHEDULE_WORKER_URL}/jobs" \
            -H "Authorization: Bearer ${WORKER_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"appId\":         \"${APP_ID}\",
              \"type\":          \"${TYPE}\",
              \"topic\":         \"${TOPIC}\",
              \"triggerSource\": \"manual\",
              \"idempotencyKey\": \"wf-${{ github.event.inputs.job_id }}\"
            }")

          REAL_JOB_ID=$(echo "$RESPONSE" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.parse(d).data?.id ?? '')")
          if [ -z "$REAL_JOB_ID" ]; then
            echo "Failed to register job: $RESPONSE"
            exit 1
          fi
          echo "real_job_id=$REAL_JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Registered DB job: $REAL_JOB_ID"
        env:
          SCHEDULE_WORKER_URL: ${{ secrets.SCHEDULE_WORKER_URL }}
          WORKER_API_TOKEN: ${{ secrets.WORKER_API_TOKEN }}
          APP_ID: ${{ github.event.inputs.app_id }}
          TOPIC: ${{ github.event.inputs.topic }}
          COMPOSITION_ID: ${{ github.event.inputs.composition_id }}

      # -----------------------------------------------------------------------
      # 4. System dependencies (ffmpeg + Chrome for Remotion)
      # -----------------------------------------------------------------------
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # -----------------------------------------------------------------------
      # 5. Load content brief (optional — enriches LLM with approved keyPoints)
      # If brief_key is provided, reads from apps/video-studio/content-briefs/{app_id}/{brief_key}.json
      # Outputs: brief_topic, brief_learning_goal, brief_key_points, brief_forbidden_claims, brief_tone_notes
      # -----------------------------------------------------------------------
      - name: Load content brief
        id: load_brief
        run: |
          BRIEF_KEY="${{ github.event.inputs.brief_key }}"
          APP_ID="${{ github.event.inputs.app_id }}"
          TOPIC="${{ github.event.inputs.topic }}"

          if [ -z "$BRIEF_KEY" ]; then
            echo "No brief_key provided — using free-form topic."
            echo "brief_topic=$TOPIC" >> "$GITHUB_OUTPUT"
            echo "brief_learning_goal=" >> "$GITHUB_OUTPUT"
            echo "brief_key_points=[]" >> "$GITHUB_OUTPUT"
            echo "brief_forbidden_claims=[]" >> "$GITHUB_OUTPUT"
            echo "brief_tone_notes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRIEF_PATH="apps/video-studio/content-briefs/${APP_ID}/${BRIEF_KEY}.json"
          if [ ! -f "$BRIEF_PATH" ]; then
            echo "Brief file not found: $BRIEF_PATH — falling back to free-form topic."
            echo "brief_topic=$TOPIC" >> "$GITHUB_OUTPUT"
            echo "brief_learning_goal=" >> "$GITHUB_OUTPUT"
            echo "brief_key_points=[]" >> "$GITHUB_OUTPUT"
            echo "brief_forbidden_claims=[]" >> "$GITHUB_OUTPUT"
            echo "brief_tone_notes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRIEF=$(cat "$BRIEF_PATH")
          BRIEF_TOPIC=$(echo "$BRIEF" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.parse(d).topic ?? '')")
          LEARNING_GOAL=$(echo "$BRIEF" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.parse(d).learningGoal ?? '')")
          KEY_POINTS=$(echo "$BRIEF" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.stringify(JSON.parse(d).keyPoints ?? []))")
          FORBIDDEN=$(echo "$BRIEF" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.stringify(JSON.parse(d).forbiddenClaims ?? []))")
          TONE=$(echo "$BRIEF" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.parse(d).toneNotes ?? '')")

          echo "brief_topic=$BRIEF_TOPIC" >> "$GITHUB_OUTPUT"
          echo "brief_learning_goal=$LEARNING_GOAL" >> "$GITHUB_OUTPUT"
          echo "brief_key_points=$KEY_POINTS" >> "$GITHUB_OUTPUT"
          echo "brief_forbidden_claims=$FORBIDDEN" >> "$GITHUB_OUTPUT"
          echo "brief_tone_notes=$TONE" >> "$GITHUB_OUTPUT"
          echo "Loaded brief: $BRIEF_PATH (topic: $BRIEF_TOPIC)"

      # -----------------------------------------------------------------------
      # 6. Generate narration script via Anthropic Claude
      #    — System context: Prime Self methodology + brand voice (SYSTEM_CONTEXT.md)
      #    — Brief context: approved keyPoints, learningGoal, forbiddenClaims
      #    — Output: script (plain text narration) + steps (JSON array, TrainingVideo only)
      # -----------------------------------------------------------------------
      - name: Generate narration script
        id: generate_script
        run: |
          SYSTEM_CONTEXT=$(cat apps/video-studio/content-briefs/prime-self/SYSTEM_CONTEXT.md)

          # NOTE: RESOLVED_TOPIC is already set correctly by the env block
          # (steps.load_brief.outputs.brief_topic, or raw topic if no brief loaded)

          # Build the key points block if available
          KEY_POINTS_BLOCK=""
          if [ "$BRIEF_KEY_POINTS" != "[]" ] && [ -n "$BRIEF_KEY_POINTS" ]; then
            KEY_POINTS_BLOCK=$(node -e "
              const pts = JSON.parse(process.env.BRIEF_KEY_POINTS);
              const block = pts.map((p, i) => \`\${i+1}. \${p}\`).join('\n');
              process.stdout.write('APPROVED KEY POINTS (use these as the ground truth — rephrase into your script voice but do not add facts beyond these):\n' + block);
            ")
          fi

          FORBIDDEN_BLOCK=""
          if [ "$BRIEF_FORBIDDEN_CLAIMS" != "[]" ] && [ -n "$BRIEF_FORBIDDEN_CLAIMS" ]; then
            FORBIDDEN_BLOCK=$(node -e "
              const f = JSON.parse(process.env.BRIEF_FORBIDDEN_CLAIMS);
              process.stdout.write('FORBIDDEN CLAIMS (never imply any of these):\n' + f.map(x => '- ' + x).join('\n'));
            ")
          fi

          TONE_BLOCK=""
          if [ -n "$BRIEF_TONE_NOTES" ]; then
            TONE_BLOCK="TONE DIRECTION: ${BRIEF_TONE_NOTES}"
          fi

          if [ "$COMPOSITION_TYPE" = "TrainingVideo" ]; then

            RESULT=$(node --input-type=module << 'SCRIPT_EOF'
          const systemCtx    = process.env.SYSTEM_CONTEXT;
          const topic        = process.env.RESOLVED_TOPIC;
          const keyPts       = process.env.KEY_POINTS_BLOCK;
          const forbidden    = process.env.FORBIDDEN_BLOCK;
          const tone         = process.env.TONE_BLOCK;
          const learningGoal = process.env.BRIEF_LEARNING_GOAL;

          const numSteps = JSON.parse(process.env.BRIEF_KEY_POINTS || '[]').length || 4;

          // Build system prompt: brand context first, then task-specific constraints
          const contextSection = systemCtx;

          const taskSection = [
            '---',
            `## TASK: Write a TrainingVideo script for topic: "${topic}"`,
            '',
            `LEARNING GOAL: ${learningGoal || 'Viewer understands the topic and knows their immediate next action.'}`,
            '',
            keyPts ? ('GROUND TRUTH — use ONLY these approved facts:\n' + keyPts) : '',
            forbidden ? ('DO NOT state or imply:\n' + forbidden) : '',
            tone ? tone : '',
            '',
            '## WORD COUNT RULE — CRITICAL',
            'The "script" field in your JSON output MUST contain between 68 and 80 words.',
            'Count every word. If your script is fewer than 68 words, add more detail.',
            'If your script is more than 80 words, cut the least important phrase.',
            '68 words is approximately this many sentences: "You just signed in for the first time. Your Free Energy Blueprint is already calculated and waiting. In this video you will see exactly how to find your Energy Type, read your AI Synthesis, and set your first aligned goal. This process takes less than ten minutes. By the end you will know the single most important insight about how your energy works."',
            '',
            '## OUTPUT — STRICT JSON ONLY',
            'Return ONLY a valid JSON object. No markdown. No code fences. No explanation before or after.',
            '{',
            '  "script": "<write 68 to 80 words of continuous narration here — what Eric says aloud>",',
            `  "steps": ["<${numSteps}-word imperative step 1>", "<step 2>", ... (${numSteps} steps total)]`,
            '}',
            '',
            'Script style: direct second-person, max 18 words per sentence, no em dashes, no ellipses.',
          ].filter(Boolean).join('\n');

          const systemPrompt = contextSection + '\n\n' + taskSection;
          const userPrompt   = `Topic: "${topic}"\n\nWrite the JSON now. Remember: the "script" field must be 68 to 80 words.`;

          const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${process.env.GROQ_API_KEY}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              model: 'llama-3.3-70b-versatile',
              max_tokens: 800,
              temperature: 0.3,
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user',   content: userPrompt   },
              ],
            }),
          });

          if (!resp.ok) {
            const err = await resp.text().catch(() => '(unreadable)');
            throw new Error('Groq call failed: ' + resp.status + ' — ' + err);
          }

          const data = await resp.json();
          const raw = data.choices?.[0]?.message?.content?.trim() ?? '{}';

          // Strip markdown code fences if the model wraps output
          const cleaned = raw.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '');
          const parsed = JSON.parse(cleaned);
          const script = (parsed.script ?? '').replace(/\n/g, ' ').trim();
          const steps  = Array.isArray(parsed.steps) ? parsed.steps : [];

          process.stdout.write(JSON.stringify({ script, steps }));
          SCRIPT_EOF
            )

            SCRIPT=$(echo "$RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.parse(d).script)")
            STEPS=$(echo  "$RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.stringify(JSON.parse(d).steps))")

          elif [ "$COMPOSITION_TYPE" = "WalkthroughVideo" ]; then

            SCRIPT=$(node --input-type=module << 'SCRIPT_EOF'
          const systemCtx = process.env.SYSTEM_CONTEXT;
          const topic     = process.env.RESOLVED_TOPIC;
          const keyPts    = process.env.KEY_POINTS_BLOCK;
          const forbidden = process.env.FORBIDDEN_BLOCK;
          const tone      = process.env.TONE_BLOCK;

          const systemPrompt = [
            systemCtx,
            '',
            '## Current Task',
            'You are generating a WalkthroughVideo narration for Prime Self. Duration: 40 seconds. Word count: 90 to 110 words.',
            keyPts,
            forbidden,
            tone,
            '',
            'Output ONLY the narration text. No labels, no JSON, no formatting markers.',
            'Write exactly what Eric will say. Sentences max 18 words. No em dashes. No ellipses.',
          ].filter(Boolean).join('\n');

          const userPrompt = `Topic: "${topic}"\n\nWrite the 40-second WalkthroughVideo narration now.`;

          const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${process.env.GROQ_API_KEY}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              model: 'llama-3.3-70b-versatile',
              max_tokens: 400,
              temperature: 0.3,
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user',   content: userPrompt   },
              ],
            }),
          });

          if (!resp.ok) {
            const err = await resp.text().catch(() => '(unreadable)');
            throw new Error('Groq call failed: ' + resp.status + ' — ' + err);
          }

          const data = await resp.json();
          const text = (data.choices?.[0]?.message?.content ?? '').replace(/\n/g, ' ').trim();
          process.stdout.write(text);
          SCRIPT_EOF
            )
            STEPS='[]'

          else

            # MarketingVideo — 15 seconds, 35-42 words
            SCRIPT=$(node --input-type=module << 'SCRIPT_EOF'
          const systemCtx = process.env.SYSTEM_CONTEXT;
          const topic     = process.env.RESOLVED_TOPIC;
          const keyPts    = process.env.KEY_POINTS_BLOCK;
          const forbidden = process.env.FORBIDDEN_BLOCK;
          const tone      = process.env.TONE_BLOCK;

          const systemPrompt = [
            systemCtx,
            '',
            '## Current Task',
            'You are generating a MarketingVideo narration for Prime Self. Duration: 15 seconds. Word count: 35 to 42 words.',
            keyPts,
            forbidden,
            tone,
            '',
            'Output ONLY the narration text. No labels, no JSON, no formatting markers.',
            'This is a punchy, high-impact marketing script. Lead with the outcome. End with a clear directive.',
            'Write exactly what Eric will say. Sentences max 18 words. No em dashes.',
          ].filter(Boolean).join('\n');

          const userPrompt = `Topic: "${topic}"\n\nWrite the 15-second MarketingVideo narration now.`;

          const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${process.env.GROQ_API_KEY}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              model: 'llama-3.3-70b-versatile',
              max_tokens: 200,
              temperature: 0.3,
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user',   content: userPrompt   },
              ],
            }),
          });

          if (!resp.ok) {
            const err = await resp.text().catch(() => '(unreadable)');
            throw new Error('Groq call failed: ' + resp.status + ' — ' + err);
          }

          const data = await resp.json();
          const text = (data.choices?.[0]?.message?.content ?? '').replace(/\n/g, ' ').trim();
          process.stdout.write(text);
          SCRIPT_EOF
            )
            STEPS='[]'
          fi

          echo "script=$SCRIPT" >> "$GITHUB_OUTPUT"
          echo "steps=$STEPS"   >> "$GITHUB_OUTPUT"
          echo "Script word count: $(echo "$SCRIPT" | wc -w) words"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOPIC: ${{ github.event.inputs.topic }}
          RESOLVED_TOPIC: ${{ steps.load_brief.outputs.brief_topic }}
          APP_ID: ${{ github.event.inputs.app_id }}
          COMPOSITION_TYPE: ${{ github.event.inputs.composition_id }}
          SYSTEM_CONTEXT: ''
          BRIEF_KEY_POINTS: ${{ steps.load_brief.outputs.brief_key_points }}
          BRIEF_FORBIDDEN_CLAIMS: ${{ steps.load_brief.outputs.brief_forbidden_claims }}
          BRIEF_LEARNING_GOAL: ${{ steps.load_brief.outputs.brief_learning_goal }}
          BRIEF_TONE_NOTES: ${{ steps.load_brief.outputs.brief_tone_notes }}
          KEY_POINTS_BLOCK: ''
          FORBIDDEN_BLOCK: ''
          TONE_BLOCK: ''

      # -----------------------------------------------------------------------
      # 7. Validate script word count — ensures pacing matches video duration
      # MarketingVideo: 35-42 words (15s at 150 WPM)
      # TrainingVideo:  68-80 words (30s at 150 WPM)
      # WalkthroughVideo: 90-110 words (40s at 150 WPM)
      # -----------------------------------------------------------------------
      - name: Validate script length
        run: |
          WORD_COUNT=$(echo "$SCRIPT" | wc -w | tr -d ' ')
          echo "Script word count: $WORD_COUNT"

          case "$COMPOSITION_TYPE" in
            MarketingVideo)
              MIN=30; MAX=48
              ;;
            TrainingVideo)
              MIN=60; MAX=90
              ;;
            WalkthroughVideo)
              MIN=80; MAX=120
              ;;
            *)
              MIN=30; MAX=120
              ;;
          esac

          if [ "$WORD_COUNT" -lt "$MIN" ] || [ "$WORD_COUNT" -gt "$MAX" ]; then
            echo "::error::Script word count $WORD_COUNT is out of range [$MIN, $MAX] for $COMPOSITION_TYPE."
            echo "Script: $SCRIPT"
            exit 1
          fi

          echo "Word count $WORD_COUNT is within acceptable range [$MIN, $MAX]. Proceeding."
        env:
          SCRIPT: ${{ steps.generate_script.outputs.script }}
          COMPOSITION_TYPE: ${{ github.event.inputs.composition_id }}

      # -----------------------------------------------------------------------
      # 8. Generate narration audio via ElevenLabs
      # -----------------------------------------------------------------------
      - name: Generate narration audio (ElevenLabs)
        id: generate_narration
        run: |
          # Select voice ID based on app_id
          case "$APP_ID" in
            prime_self)     VOICE_ID="$ELEVENLABS_VOICE_PRIME_SELF" ;;
            cypher_healing) VOICE_ID="$ELEVENLABS_VOICE_CYPHER" ;;
            *)              VOICE_ID="$ELEVENLABS_VOICE_DEFAULT" ;;
          esac

          NARRATION_PATH="/tmp/narration_${{ github.event.inputs.job_id }}.mp3"

          curl -s -X POST \
            "https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}" \
            -H "xi-api-key: ${ELEVENLABS_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"$SCRIPT\",
              \"model_id\": \"eleven_turbo_v2_5\",
              \"voice_settings\": {
                \"stability\": 0.5,
                \"similarity_boost\": 0.75,
                \"style\": 0.3,
                \"use_speaker_boost\": true
              }
            }" \
            --output "$NARRATION_PATH"

          # Verify file was created and has content
          if [ ! -s "$NARRATION_PATH" ]; then
            echo "ERROR: narration file empty or not created"
            exit 1
          fi

          echo "narration_path=$NARRATION_PATH" >> "$GITHUB_OUTPUT"
          echo "Narration generated: $(du -h "$NARRATION_PATH" | cut -f1)"
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_PRIME_SELF: ${{ secrets.ELEVENLABS_VOICE_PRIME_SELF }}
          ELEVENLABS_VOICE_CYPHER: ${{ secrets.ELEVENLABS_VOICE_CYPHER }}
          ELEVENLABS_VOICE_DEFAULT: ${{ secrets.ELEVENLABS_VOICE_DEFAULT }}
          APP_ID: ${{ github.event.inputs.app_id }}
          SCRIPT: ${{ steps.generate_script.outputs.script }}

      # -----------------------------------------------------------------------
      # 9. Upload narration audio to Cloudflare R2
      # -----------------------------------------------------------------------
      - name: Upload narration to R2
        id: upload_narration
        run: |
          NARRATION_KEY="narration/${{ github.event.inputs.job_id }}.mp3"
          NARRATION_PATH="${{ steps.generate_narration.outputs.narration_path }}"

          # R2 uses Cloudflare API token for S3-compatible access
          aws s3 cp "$NARRATION_PATH" "s3://${R2_BUCKET_NAME}/${NARRATION_KEY}" \
            --endpoint-url "https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region "auto"

          # Generate a presigned URL (1 hour) so Remotion can fetch the private object
          NARRATION_URL=$(aws s3 presign "s3://${R2_BUCKET_NAME}/${NARRATION_KEY}" \
            --endpoint-url "https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region "auto" \
            --expires-in 3600)
          echo "narration_url=$NARRATION_URL" >> "$GITHUB_OUTPUT"
          echo "narration_key=$NARRATION_KEY" >> "$GITHUB_OUTPUT"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.FACTORY_R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.FACTORY_R2_SECRET_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

      # -----------------------------------------------------------------------
      # 10. Render MP4 via Remotion
      # -----------------------------------------------------------------------
      - name: Build composition props JSON
        id: build_props
        run: |
          PROPS=$(node -e "
            // Resolve logo: explicit input → app-specific secret default → empty
            const logoUrl = process.env.LOGO_URL_INPUT
              || (process.env.APP_ID === 'prime_self' ? (process.env.PRIME_SELF_LOGO_URL || '') : '');

            const props = JSON.stringify({
              appId:          process.env.APP_ID,
              topic:          process.env.RESOLVED_TOPIC,
              script:         process.env.SCRIPT,
              narrationUrl:   process.env.NARRATION_URL,
              brandColor:     process.env.BRAND_COLOR,
              brandAccent:    process.env.BRAND_ACCENT,
              logoUrl:        logoUrl,
              steps:          JSON.parse(process.env.STEPS || '[]'),
              screenshotUrls: [],
            });
            process.stdout.write(props);
          ")

          echo "props=$PROPS" >> "$GITHUB_OUTPUT"
        env:
          APP_ID: ${{ github.event.inputs.app_id }}
          RESOLVED_TOPIC: ${{ steps.load_brief.outputs.brief_topic }}
          SCRIPT: ${{ steps.generate_script.outputs.script }}
          STEPS: ${{ steps.generate_script.outputs.steps }}
          NARRATION_URL: ${{ steps.upload_narration.outputs.narration_url }}
          BRAND_COLOR: ${{ github.event.inputs.brand_color }}
          BRAND_ACCENT: ${{ github.event.inputs.brand_accent }}
          LOGO_URL_INPUT: ${{ github.event.inputs.logo_url }}
          PRIME_SELF_LOGO_URL: ${{ secrets.PRIME_SELF_LOGO_URL }}

      - name: Render MP4
        id: render
        working-directory: apps/video-studio
        run: |
          OUTPUT_PATH="/tmp/video_${{ github.event.inputs.job_id }}.mp4"

          PUPPETEER_EXECUTABLE_PATH=$(which google-chrome-stable || which google-chrome || which chromium) \
          node -r ts-node/register src/render.ts \
            --composition "$COMPOSITION_ID" \
            --props "$PROPS_JSON" \
            --output "$OUTPUT_PATH"

          if [ ! -s "$OUTPUT_PATH" ]; then
            echo "ERROR: render output empty or not created"
            exit 1
          fi

          echo "video_path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"
          echo "Rendered: $(du -h "$OUTPUT_PATH" | cut -f1)"
        env:
          COMPOSITION_ID: ${{ github.event.inputs.composition_id }}
          PROPS_JSON: ${{ steps.build_props.outputs.props }}

      # -----------------------------------------------------------------------
      # 8. Encode with ffmpeg (normalise audio, H.264 baseline for max compat)
      # -----------------------------------------------------------------------
      - name: Encode final MP4 with ffmpeg
        id: encode
        run: |
          INPUT="${{ steps.render.outputs.video_path }}"
          OUTPUT="/tmp/encoded_${{ github.event.inputs.job_id }}.mp4"

          ffmpeg -i "$INPUT" \
            -c:v libx264 -profile:v baseline -level 3.1 \
            -preset slow -crf 22 \
            -c:a aac -b:a 128k -ar 44100 \
            -movflags +faststart \
            -y "$OUTPUT"

          echo "encoded_path=$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "Encoded: $(du -h "$OUTPUT" | cut -f1)"

      # -----------------------------------------------------------------------
      # 9. Upload MP4 to Cloudflare R2
      # -----------------------------------------------------------------------
      - name: Upload MP4 to R2
        id: upload_video
        run: |
          VIDEO_KEY="renders/${{ github.event.inputs.job_id }}.mp4"
          aws s3 cp "${{ steps.encode.outputs.encoded_path }}" \
            "s3://${R2_BUCKET_NAME}/${VIDEO_KEY}" \
            --endpoint-url "https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region "auto" \
            --content-type "video/mp4"

          # Generate a presigned URL (1 hour) so Cloudflare Stream can copy from private R2
          VIDEO_URL=$(aws s3 presign "s3://${R2_BUCKET_NAME}/${VIDEO_KEY}" \
            --endpoint-url "https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region "auto" \
            --expires-in 3600)
          echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
          echo "video_key=$VIDEO_KEY" >> "$GITHUB_OUTPUT"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.FACTORY_R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.FACTORY_R2_SECRET_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

      # -----------------------------------------------------------------------
      # 10. Register with Cloudflare Stream
      # -----------------------------------------------------------------------
      - name: Register video with Cloudflare Stream
        id: register_stream
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/stream/copy" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"url\": \"${VIDEO_URL}\",
              \"meta\": {
                \"jobId\": \"${{ github.event.inputs.job_id }}\",
                \"appId\": \"${{ github.event.inputs.app_id }}\",
                \"topic\": \"${{ github.event.inputs.topic }}\"
              }
            }")

          SUCCESS=$(echo "$RESPONSE" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.parse(d).success ? 'true' : 'false')")
          if [ "$SUCCESS" != "true" ]; then
            echo "Stream registration failed: $RESPONSE"
            exit 1
          fi

          STREAM_UID=$(echo "$RESPONSE" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.parse(d).result?.uid ?? '')")
          echo "stream_uid=$STREAM_UID" >> "$GITHUB_OUTPUT"
          echo "Registered Stream UID: $STREAM_UID"
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          VIDEO_URL: ${{ steps.upload_video.outputs.video_url }}

      # -----------------------------------------------------------------------
      # 11. Update video_calendar via the schedule Worker
      # -----------------------------------------------------------------------
      - name: Update job status in database
        if: always()
        run: |
          curl -s -X PATCH \
            "${SCHEDULE_WORKER_URL}/jobs/${REAL_JOB_ID}" \
            -H "Authorization: Bearer ${WORKER_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"done\",
              \"streamUid\": \"${STREAM_UID}\",
              \"videoUrl\": \"${VIDEO_URL}\",
              \"narrationUrl\": \"${NARRATION_URL}\"
            }" \
            --fail-with-body
        env:
          SCHEDULE_WORKER_URL: ${{ secrets.SCHEDULE_WORKER_URL }}
          WORKER_API_TOKEN: ${{ secrets.WORKER_API_TOKEN }}
          REAL_JOB_ID: ${{ steps.register_job.outputs.real_job_id }}
          STREAM_UID: ${{ steps.register_stream.outputs.stream_uid }}
          VIDEO_URL: ${{ steps.upload_video.outputs.video_url }}
          NARRATION_URL: ${{ steps.upload_narration.outputs.narration_url }}

      # -----------------------------------------------------------------------
      # 12. Summary
      # -----------------------------------------------------------------------
      - name: Render summary
        if: always()
        run: |
          echo "### Video Render Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workflow Job ID | \`${{ github.event.inputs.job_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| DB Job ID | \`${{ steps.register_job.outputs.real_job_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Composition | \`${{ github.event.inputs.composition_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | \`${{ github.event.inputs.app_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stream UID | \`${{ steps.register_stream.outputs.stream_uid }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Embed URL | https://iframe.videodelivery.net/${{ steps.register_stream.outputs.stream_uid }} |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Failure handler — marks the job as failed in the database
  # ---------------------------------------------------------------------------
  on_failure:
    name: Mark job as failed
    needs: render
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Update job status to failed
        run: |
          curl -s -X PATCH \
            "${SCHEDULE_WORKER_URL}/jobs/${REAL_JOB_ID}" \
            -H "Authorization: Bearer ${WORKER_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"failed\",
              \"error\": \"GitHub Actions render workflow failed — check run ${{ github.run_id }}\"
            }" \
            --fail-with-body || true
        env:
          SCHEDULE_WORKER_URL: ${{ secrets.SCHEDULE_WORKER_URL }}
          WORKER_API_TOKEN: ${{ secrets.WORKER_API_TOKEN }}
          REAL_JOB_ID: ${{ needs.render.outputs.real_job_id }}
