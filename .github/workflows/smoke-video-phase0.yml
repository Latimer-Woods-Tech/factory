name: Smoke Video Phase 0

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    name: Smoke schedule-worker and video-cron
    env:
      SCHEDULE_WORKER_URL: https://schedule-worker.adrper79.workers.dev
      VIDEO_CRON_URL: https://video-cron.adrper79.workers.dev
      WORKER_API_TOKEN: ${{ secrets.WORKER_API_TOKEN }}
    steps:
      - name: Verify public health endpoints
        run: |
          set -euo pipefail
          curl -fsS "$SCHEDULE_WORKER_URL/health"
          curl -fsS "$VIDEO_CRON_URL/health"

      - name: Verify protected endpoints reject anonymous calls
        run: |
          set -euo pipefail
          schedule_code=$(curl -s -o /dev/null -w '%{http_code}' "$SCHEDULE_WORKER_URL/jobs/pending")
          cron_code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$VIDEO_CRON_URL/trigger")
          test "$schedule_code" = "401"
          test "$cron_code" = "401"

      - name: Apply idempotent schedule-worker migration
        run: |
          set -euo pipefail
          curl -fsS -X POST "$SCHEDULE_WORKER_URL/migrate" \
            -H "Authorization: Bearer $WORKER_API_TOKEN"

      - name: Verify synthetic schedule-to-failed audit flow
        run: |
          set -euo pipefail
          idempotency_key="factory-phase0-smoke:${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}"
          payload=$(cat <<JSON
          {
            "appId": "factory-smoke",
            "type": "walkthrough",
            "topic": "Phase 0 synthetic smoke job",
            "triggerSource": "manual",
            "idempotencyKey": "$idempotency_key"
          }
          JSON
          )

          response=$(curl -fsS -X POST "$SCHEDULE_WORKER_URL/jobs" \
            -H "Authorization: Bearer $WORKER_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload")
          echo "$response"
          job_id=$(RESPONSE="$response" node -e "const r=JSON.parse(process.env.RESPONSE); console.log(r.data.id)")
          test -n "$job_id"

          curl -fsS "$SCHEDULE_WORKER_URL/jobs/$job_id" \
            -H "Authorization: Bearer $WORKER_API_TOKEN"

          failed=$(curl -fsS -X PATCH "$SCHEDULE_WORKER_URL/jobs/$job_id" \
            -H "Authorization: Bearer $WORKER_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"failed","script":"phase0 smoke audit trail: intentionally failed after schedule verification"}')
          echo "$failed"
          STATUS_PAYLOAD="$failed" node -e "const r=JSON.parse(process.env.STATUS_PAYLOAD); if (r.data.status !== 'failed') throw new Error('job did not reach failed status')"

      - name: Verify video-cron authenticated trigger path
        run: |
          set -euo pipefail
          curl -fsS -X POST "$VIDEO_CRON_URL/trigger" \
            -H "Authorization: Bearer $WORKER_API_TOKEN"
