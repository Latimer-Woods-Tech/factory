# =============================================================================
# Reusable CI workflow for Latimer-Woods-Tech apps.
#
# WHAT IT DOES
#   Runs typecheck, lint, test, and build against an app's source.
#   Authenticates to GitHub Packages so private @latimer-woods-tech/* deps resolve.
#
# WHO CALLS IT
#   Every app repo's `.github/workflows/ci.yml` should call this on push and PR.
#
# HOW TO CALL
#   jobs:
#     ci:
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_app-ci.yml@main
#       secrets: inherit
#
# REQUIRED SECRETS (passed via `secrets: inherit` from org-level vault)
#   FACTORY_APP_ID            - GitHub App ID for `factory-cross-repo`
#   FACTORY_APP_PRIVATE_KEY   - PEM private key for the same App
#
# OPTIONAL INPUTS
#   node_version       - Node.js major version (default '22')
#   working_directory  - Subdir to run in if app is in a monorepo (default '.')
#   run_lint           - Skip with false to disable lint step (default true)
#   run_typecheck      - Skip with false to disable typecheck (default true)
#   run_test           - Skip with false to disable tests (default true)
#   run_build          - Skip with false to disable build (default true)
#
# CONVENTIONS
#   App package.json must define scripts: typecheck, lint, test, build.
#   Missing scripts are skipped (--if-present), so partial coverage is fine.
#   Node 22 is required for wrangler@latest. Don't downgrade unless you know why.
#
# RELATED
#   _app-deploy.yml          - Production/staging deploy
#   _post-deploy-verify.yml  - Health check + auto-rollback after deploy
#   docs/CI_CD.md            - Full architecture reference
# =============================================================================

name: _app-ci

concurrency:
  group: ci-${{ inputs.working_directory }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: '22'
      working_directory:
        type: string
        default: '.'
      run_lint:
        type: boolean
        default: true
      run_typecheck:
        type: boolean
        default: true
      run_test:
        type: boolean
        default: true
      run_build:
        type: boolean
        default: true

permissions:
  contents: read
  packages: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
      - name: Configure npm auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ steps.app-token.outputs.token }}" >> .npmrc
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}
      - if: ${{ inputs.run_typecheck }}
        run: npm run typecheck --if-present
      - if: ${{ inputs.run_lint }}
        run: npm run lint --if-present
      - if: ${{ inputs.run_test }}
        run: npm test --if-present
      - if: ${{ inputs.run_build }}
        run: npm run build --if-present
