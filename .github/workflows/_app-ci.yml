name: _app-ci

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: '22'
      working_directory:
        type: string
        default: '.'
      run_lint:
        type: boolean
        default: true
      run_typecheck:
        type: boolean
        default: true
      run_test:
        type: boolean
        default: true
      run_build:
        type: boolean
        default: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
      - name: Configure npm auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ steps.app-token.outputs.token }}" >> .npmrc
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}
      - if: ${{ inputs.run_typecheck }}
        run: npm run typecheck --if-present
      - if: ${{ inputs.run_lint }}
        run: npm run lint --if-present
      - if: ${{ inputs.run_test }}
        run: npm test --if-present
      - if: ${{ inputs.run_build }}
        run: npm run build --if-present
