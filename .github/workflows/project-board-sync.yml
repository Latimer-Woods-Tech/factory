name: Project Board Sync

on:
  issues:
    types: [labeled, unlabeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]

jobs:
  sync-agent-field:
    if: github.event_name == 'issues' && startsWith(github.event.label.name, 'agent:claimed:')
    runs-on: ubuntu-latest
    steps:
      - name: Update Agent field on project
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          LABEL_NAME: ${{ github.event.label.name }}
          ACTION: ${{ github.event.action }}
        run: |
          AGENT_NAME=""
          if [ "$ACTION" = "labeled" ]; then
            AGENT_NAME="${LABEL_NAME#agent:claimed:}"
          fi
          PROJECT_ID="PVT_kwDOEL0sNc4BWWtg"
          AGENT_FIELD_ID=$(gh api graphql -f query='query($id: ID!) { node(id: $id) { ... on ProjectV2 { fields(first: 30) { nodes { ... on ProjectV2Field { id name } } } } } }' -f id="$PROJECT_ID" --jq '.data.node.fields.nodes[] | select(.name=="Agent") | .id')
          ITEM_ID=$(gh api graphql -f query='query($projectId: ID!, $contentId: ID!) { node(id: $projectId) { ... on ProjectV2 { items(first: 100) { nodes { id content { ... on Issue { id } } } } } } }' -f projectId="$PROJECT_ID" -f contentId="$ISSUE_NODE_ID" --jq ".data.node.items.nodes[] | select(.content.id==\"$ISSUE_NODE_ID\") | .id")
          if [ -z "$ITEM_ID" ]; then echo "item not on board, skipping"; exit 0; fi
          gh api graphql -f query='mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) { updateProjectV2ItemFieldValue(input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { text: $value } }) { projectV2Item { id } } }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$AGENT_FIELD_ID" -f value="$AGENT_NAME"

  sync-status-from-comment:
    if: github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/status')
    runs-on: ubuntu-latest
    steps:
      - name: Parse /status and update Status field
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          STATE=$(echo "$COMMENT_BODY" | grep -oE 'state:[[:space:]]*[a-z_]+' | head -1 | sed 's/state:[[:space:]]*//')
          if [ -z "$STATE" ]; then echo "no state in /status comment"; exit 0; fi
          case "$STATE" in
            in_progress) STATUS_NAME="In Progress" ;;
            blocked)     STATUS_NAME="In Progress" ;;
            done)        STATUS_NAME="Done" ;;
            abandoned)   STATUS_NAME="Done" ;;
            *)           echo "unknown state $STATE"; exit 0 ;;
          esac
          PROJECT_ID="PVT_kwDOEL0sNc4BWWtg"
          FIELDS=$(gh api graphql -f query='query($id: ID!) { node(id: $id) { ... on ProjectV2 { fields(first: 30) { nodes { __typename ... on ProjectV2SingleSelectField { id name options { id name } } } } } } }' -f id="$PROJECT_ID")
          STATUS_FIELD_ID=$(echo "$FIELDS" | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .id')
          OPTION_ID=$(echo "$FIELDS" | jq -r --arg n "$STATUS_NAME" '.data.node.fields.nodes[] | select(.name=="Status") | .options[] | select(.name==$n) | .id')
          ITEM_ID=$(gh api graphql -f query='query($projectId: ID!) { node(id: $projectId) { ... on ProjectV2 { items(first: 100) { nodes { id content { ... on Issue { id } } } } } } }' -f projectId="$PROJECT_ID" --jq ".data.node.items.nodes[] | select(.content.id==\"$ISSUE_NODE_ID\") | .id")
          if [ -z "$ITEM_ID" ] || [ -z "$OPTION_ID" ]; then echo "missing item or option"; exit 0; fi
          gh api graphql -f query='mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) { updateProjectV2ItemFieldValue(input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { singleSelectOptionId: $optionId } }) { projectV2Item { id } } }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$STATUS_FIELD_ID" -f optionId="$OPTION_ID"

  sync-deploy-sha-on-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Update Deploy SHA on linked issues
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          PROJECT_ID="PVT_kwDOEL0sNc4BWWtg"
          PR_NODE_ID=${{ github.event.pull_request.node_id }}
          LINKED_ISSUES=$(gh api graphql -f query='query($id: ID!) { node(id: $id) { ... on PullRequest { closingIssuesReferences(first: 10) { nodes { id number } } } } }' -f id="$PR_NODE_ID" --jq '.data.node.closingIssuesReferences.nodes[].id')
          DEPLOY_FIELD_ID=$(gh api graphql -f query='query($id: ID!) { node(id: $id) { ... on ProjectV2 { fields(first: 30) { nodes { ... on ProjectV2Field { id name } } } } } }' -f id="$PROJECT_ID" --jq '.data.node.fields.nodes[] | select(.name=="Deploy SHA") | .id')
          for ISSUE_ID in $LINKED_ISSUES; do
            ITEM_ID=$(gh api graphql -f query='query($projectId: ID!) { node(id: $projectId) { ... on ProjectV2 { items(first: 200) { nodes { id content { ... on Issue { id } } } } } } }' -f projectId="$PROJECT_ID" --jq ".data.node.items.nodes[] | select(.content.id==\"$ISSUE_ID\") | .id")
            if [ -z "$ITEM_ID" ]; then continue; fi
            gh api graphql -f query='mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) { updateProjectV2ItemFieldValue(input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { text: $value } }) { projectV2Item { id } } }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$DEPLOY_FIELD_ID" -f value="$MERGE_SHA"
          done
