name: Fix factory-admin CI (generate lock file)

on:
  workflow_dispatch:

# One-time fixup:
# 1. Rewrites CI/deploy workflows to use npm install (not npm ci)
# 2. Runs npm install to generate package-lock.json
# 3. Commits both changes to factory-admin

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@adrper79-dot'

      - name: Fix workflows and generate lock file
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: node packages/deploy/scripts/fix-factory-admin-ci.mjs

