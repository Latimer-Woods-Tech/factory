name: Create Sentry Projects

on:
  workflow_dispatch:

jobs:
  create-projects:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Discover Sentry org slug
        id: org
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.FACTORY_SENTRY_API }}
        run: |
          RAW=$(curl -s \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            "https://sentry.io/api/0/organizations/")
          echo "Raw API response: $RAW"
          SLUG=$(echo "$RAW" | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            const parsed = JSON.parse(d);
            if (!Array.isArray(parsed) || parsed.length === 0) { console.error('No orgs found:', JSON.stringify(parsed)); process.exit(1); }
            console.log(parsed[0].slug);
          ")
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Org slug: $SLUG"

      - name: Create Sentry projects and collect DSNs
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.FACTORY_SENTRY_API }}
          SENTRY_ORG: ${{ steps.org.outputs.slug }}
        run: |
          echo "=== All existing projects in org ==="
          curl -s \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            "https://sentry.io/api/0/organizations/$SENTRY_ORG/projects/" \
            | node -e "
              const d=require('fs').readFileSync('/dev/stdin','utf8');
              const projects = JSON.parse(d);
              if (!Array.isArray(projects)) { console.log('Response:', JSON.stringify(projects)); } else {
                projects.forEach(p => console.log(p.slug, '|', p.name));
              }
            "
          echo "==="
          node packages/deploy/scripts/create-sentry-projects.mjs
          echo "--- .env.sentry output ---"
          cat .env.sentry

      - name: Upload DSNs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentry-dsns
          path: .env.sentry
          retention-days: 1
