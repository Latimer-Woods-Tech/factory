name: Provision R2 Infrastructure

on:
  workflow_dispatch:
    inputs:
      bucket_name:
        description: 'R2 bucket name'
        required: false
        default: 'factory-videos'
        type: string

jobs:
  provision:
    name: Create R2 bucket and generate credentials
    runs-on: ubuntu-latest
    
    steps:
      - name: Create R2 bucket
        id: create_bucket
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/r2/buckets" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"${{ github.event.inputs.bucket_name }}\"}")
          
          echo "Response: $RESPONSE"
          
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            ERROR=$(echo "$RESPONSE" | jq -r '.errors[0].message // "Unknown error"')
            if echo "$ERROR" | grep -q "already exists"; then
              echo "✅ Bucket already exists"
              echo "bucket_exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "❌ Failed to create bucket: $ERROR"
              exit 1
            fi
          else
            echo "✅ Bucket created successfully"
            echo "bucket_exists=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Generate R2 API token
        id: generate_token
        run: |
          # Create R2 API token via Cloudflare API
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/user/tokens" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "factory-video-workflow-'$(date +%s)'",
              "policies": [
                {
                  "effect": "allow",
                  "resources": {
                    "com.cloudflare.edge.r2.bucket.*": "*"
                  },
                  "permission_groups": [
                    {
                      "id": "c8fed203ed3043cba015a93ad1616f1f",
                      "name": "Workers R2 Storage Write"
                    },
                    {
                      "id": "f7f0eda5697f475c90846e879bab8666",
                      "name": "Workers R2 Storage Read"
                    }
                  ]
                }
              ]
            }')
          
          echo "Token Response: $RESPONSE"
          
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            ERROR=$(echo "$RESPONSE" | jq -r '.errors[0].message // "Unknown error"')
            echo "❌ Failed to generate token: $ERROR"
            echo "Note: R2 API tokens cannot be created via API. Using CF_API_TOKEN directly."
            echo "use_main_token=true" >> "$GITHUB_OUTPUT"
          else
            TOKEN_VALUE=$(echo "$RESPONSE" | jq -r '.result.value')
            echo "✅ Token generated successfully"
            echo "::add-mask::$TOKEN_VALUE"
            echo "token_value=$TOKEN_VALUE" >> "$GITHUB_OUTPUT"
            echo "use_main_token=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Get R2 public domain
        id: get_domain
        run: |
          # R2 public domains follow pattern: pub-{hash}.r2.dev or custom domain
          # For now, use account-based pattern
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          
          # Check if bucket has public access configured
          BUCKET_INFO=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/r2/buckets/${{ github.event.inputs.bucket_name }}" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}")
          
          echo "Bucket Info: $BUCKET_INFO"
          
          # R2 public URL format: https://pub-{bucket-id}.r2.dev
          # For S3-compatible access: https://{account-id}.r2.cloudflarestorage.com
          PUBLIC_DOMAIN="${ACCOUNT_ID}.r2.cloudflarestorage.com"
          
          echo "public_domain=$PUBLIC_DOMAIN" >> "$GITHUB_OUTPUT"
          echo "✅ Public domain: $PUBLIC_DOMAIN"
      
      - name: Configure S3 credentials for R2
        id: configure_s3
        run: |
          # For R2, we can use the Cloudflare API token as both access key and secret
          # OR we generate proper S3-compatible credentials
          
          # Using CF_API_TOKEN as S3 credentials (Cloudflare supports this)
          echo "Using CF_API_TOKEN for S3-compatible access"
          echo "When using aws CLI with R2:"
          echo "  - AWS_ACCESS_KEY_ID: Any string (e.g., 'cloudflare')"
          echo "  - AWS_SECRET_ACCESS_KEY: CF_API_TOKEN value"
          echo "  - Endpoint: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          
          echo "access_key_pattern=cloudflare" >> "$GITHUB_OUTPUT"
          echo "use_cf_token_as_secret=true" >> "$GITHUB_OUTPUT"
      
      - name: Update GitHub Secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Update R2_PUBLIC_DOMAIN
          echo "${{ steps.get_domain.outputs.public_domain }}" \
            | gh secret set R2_PUBLIC_DOMAIN --repo ${{ github.repository }}
          
          # Update R2_ACCESS_KEY_ID (using 'cloudflare' as placeholder for CF token auth)
          echo "cloudflare" \
            | gh secret set R2_ACCESS_KEY_ID --repo ${{ github.repository }}
          
          # Update R2_SECRET_ACCESS_KEY (will use CF_API_TOKEN)
          # Note: We tell the workflow to use CF_API_TOKEN directly
          echo "USE_CF_API_TOKEN" \
            | gh secret set R2_SECRET_ACCESS_KEY --repo ${{ github.repository }}
          
          echo "✅ GitHub Secrets updated"
      
      - name: Summary
        run: |
          echo "### R2 Infrastructure Provisioned ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bucket | \`${{ github.event.inputs.bucket_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Account ID | \`${{ secrets.CLOUDFLARE_ACCOUNT_ID }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Public Domain | \`${{ steps.get_domain.outputs.public_domain }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| S3 Endpoint | \`https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**S3-Compatible Access:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- AWS_ACCESS_KEY_ID: \`cloudflare\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- AWS_SECRET_ACCESS_KEY: Use \`CF_API_TOKEN\` secret value" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next Steps:**" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Update render-video.yml to use CF_API_TOKEN for R2 authentication" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Run a test video render workflow" >> "$GITHUB_STEP_SUMMARY"
