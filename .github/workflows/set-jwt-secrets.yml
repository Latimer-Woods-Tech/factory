name: Set JWT Secrets (Phase 7.5)

on:
  workflow_dispatch: {}

# Generates a cryptographically random 64-hex JWT secret for each app and
# sets it via `wrangler secret put JWT_SECRET --name <app>`.
# Also stores the secrets in this repo for safe-keeping so they can be
# re-pushed if a worker is redeployed.
#
# Idempotent — wrangler secret put overwrites existing values.

jobs:
  set-jwt-secrets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - wordis-bond
          - cypher-healing
          - prime-self
          - ijustus
          - the-calling
          - neighbor-aid

    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Generate and set JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          APP="${{ matrix.app }}"

          # Generate 64 hex chars = 32 random bytes = 256-bit secret
          JWT_SECRET=$(openssl rand -hex 32)

          # Set on the Cloudflare Worker
          echo "$JWT_SECRET" | wrangler secret put JWT_SECRET --name "$APP"
          echo "✅ JWT_SECRET set on Worker: $APP"

          # Also store as a GitHub Actions secret on the app repo
          # so the app's CI can use it for integration tests
          echo "$JWT_SECRET" | gh secret set JWT_SECRET --repo "adrper79-dot/$APP"
          echo "✅ JWT_SECRET set on GitHub repo: $APP"
