name: Policy Drift Guard

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - name: Verify org allowed_actions = all
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/orgs/Latimer-Woods-Tech/actions/permissions"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$endpoint")

          if [ "$code" = "200" ]; then
            state=$(jq -r '.allowed_actions // "all"' "$body")
            enabled=$(jq -r '.enabled_repositories // "all"' "$body")
            echo "Org allowed_actions=$state, enabled_repositories=$enabled"
            if [ "$state" != "all" ]; then
              echo "::error::Org allowed_actions drifted from 'all' to '$state'. Cross-repo reusable workflows are now broken. Fix at https://github.com/organizations/Latimer-Woods-Tech/settings/actions"
              exit 1
            fi
            if [ "$enabled" != "all" ]; then
              echo "::warning::enabled_repositories=$enabled (expected all)"
            fi
          elif [ "$code" = "403" ]; then
            echo "::warning::Skipping org actions policy check: token lacks org-level access to $endpoint (HTTP 403)."
            echo "::warning::Grant org admin token access or keep this check informational."
          else
            echo "::error::Unexpected response from $endpoint (HTTP $code)."
            cat "$body"
            exit 1
          fi
      - name: Verify factory remains public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          vis=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/repos/${{ github.repository }} | jq -r '.visibility')
          echo "factory visibility=$vis"
          if [ "$vis" != "public" ]; then
            echo "::error::factory must remain public for cross-repo reusable workflow consumption on Team plan."
            exit 1
          fi

      - name: Verify The_Calling is archived (OPS-2.1)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/Latimer-Woods-Tech/The_Calling")

          if [ "$code" = "404" ]; then
            echo "The_Calling: repo not found (may have been deleted) — OK"
            exit 0
          fi
          if [ "$code" != "200" ]; then
            echo "::warning::Could not fetch The_Calling (HTTP $code) — skipping check"
            exit 0
          fi
          archived=$(jq -r '.archived' "$body")
          echo "The_Calling archived=$archived"
          if [ "$archived" != "true" ]; then
            echo "::error::The_Calling is not archived. Run the 'Align Legacy Repos (OPS-2.1)' workflow."
            exit 1
          fi

      - name: Verify legacy repos comply with Factory policy (OPS-2.1)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          failed=0

          check_repo() {
            local repo="$1"
            local body code
            body=$(mktemp)
            code=$(curl -sS -o "$body" -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/Latimer-Woods-Tech/${repo}")

            if [ "$code" = "404" ]; then
              echo "${repo}: not found — skipping"
              return
            fi
            if [ "$code" != "200" ]; then
              echo "::warning::Could not fetch ${repo} (HTTP $code) — skipping check"
              return
            fi

            local archived allow_rebase allow_merge_commit allow_squash delete_branch description
            archived=$(jq -r '.archived' "$body")
            if [ "$archived" = "true" ]; then
              echo "${repo}: archived — skipping policy check"
              return
            fi

            allow_rebase=$(jq -r '.allow_rebase_merge' "$body")
            allow_merge_commit=$(jq -r '.allow_merge_commit' "$body")
            allow_squash=$(jq -r '.allow_squash_merge' "$body")
            delete_branch=$(jq -r '.delete_branch_on_merge' "$body")
            description=$(jq -r '.description // ""' "$body")

            echo "${repo}: allow_rebase_merge=${allow_rebase} allow_merge_commit=${allow_merge_commit} allow_squash_merge=${allow_squash} delete_branch_on_merge=${delete_branch} description='${description}'"

            if [ "$allow_rebase" != "false" ]; then
              echo "::error::${repo}: allow_rebase_merge must be false (Factory squash-only policy). Run align-legacy-repos workflow."
              failed=1
            fi
            if [ "$allow_merge_commit" != "false" ]; then
              echo "::error::${repo}: allow_merge_commit must be false (Factory squash-only policy). Run align-legacy-repos workflow."
              failed=1
            fi
            if [ "$allow_squash" != "true" ]; then
              echo "::error::${repo}: allow_squash_merge must be true (Factory squash-only policy). Run align-legacy-repos workflow."
              failed=1
            fi
            if [ "$delete_branch" != "true" ]; then
              echo "::error::${repo}: delete_branch_on_merge must be true. Run align-legacy-repos workflow."
              failed=1
            fi
            if [ -z "$description" ]; then
              echo "::error::${repo}: description is empty. Run align-legacy-repos workflow."
              failed=1
            fi

            # Check SECURITY.md exists
            local sec_code
            sec_code=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/Latimer-Woods-Tech/${repo}/contents/SECURITY.md")
            if [ "$sec_code" = "404" ]; then
              echo "::error::${repo}: SECURITY.md missing. Run align-legacy-repos workflow."
              failed=1
            elif [ "$sec_code" != "200" ]; then
              echo "::warning::${repo}: Could not check SECURITY.md (HTTP ${sec_code})"
            else
              echo "${repo}: SECURITY.md present ✓"
            fi
          }

          check_repo "coh"
          check_repo "focusbro"

          exit $failed
