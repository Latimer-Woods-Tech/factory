name: Fix prime-self-ui Secrets + Redeploy

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Set CLOUDFLARE_API_TOKEN on prime-self-ui
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "$CF_TOKEN" | gh secret set CLOUDFLARE_API_TOKEN \
            --repo adrper79-dot/prime-self-ui

      - name: Set CLOUDFLARE_ACCOUNT_ID on prime-self-ui
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "$CF_ACCOUNT_ID" | gh secret set CLOUDFLARE_ACCOUNT_ID \
            --repo adrper79-dot/prime-self-ui

      - name: Trigger prime-self-ui deploy
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run deploy.yml \
            --repo adrper79-dot/prime-self-ui \
            --ref main
          echo "Deploy triggered. selfprime.net should be live within ~2 minutes."
