name: Fix prime-self-ui — Secrets, Custom Domain, and Redeploy

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Set CF_API_TOKEN on prime-self-ui
        run: echo "$CF_API_TOKEN" | gh secret set CF_API_TOKEN --repo adrper79-dot/prime-self-ui

      - name: Set CF_ACCOUNT_ID on prime-self-ui
        run: echo "$CF_ACCOUNT_ID" | gh secret set CF_ACCOUNT_ID --repo adrper79-dot/prime-self-ui

      - name: Check existing custom domains on prime-self-ui Pages project
        run: |
          echo "=== Current custom domains ==="
          curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/prime-self-ui/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" | jq '.'

      - name: Add selfprime.net custom domain if missing
        run: |
          EXISTING=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/prime-self-ui/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | jq -r '.result[]?.name // empty')

          if echo "$EXISTING" | grep -q "selfprime.net"; then
            echo "selfprime.net is already a custom domain — skipping."
          else
            echo "selfprime.net not found — adding it now..."
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/prime-self-ui/domains" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"name":"selfprime.net"}' | jq '.'
          fi

      - name: Trigger prime-self-ui deploy
        run: |
          gh workflow run deploy.yml --repo adrper79-dot/prime-self-ui --ref main
          echo "Deploy triggered."
