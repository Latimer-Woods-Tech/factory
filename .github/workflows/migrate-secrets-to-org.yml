name: Migrate Secrets To Org (one-shot)
on: workflow_dispatch
permissions: { contents: write }
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm i -g tweetsodium
      - name: Migrate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: Latimer-Woods-Tech
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_CYPHER: ${{ secrets.ELEVENLABS_VOICE_CYPHER }}
          ELEVENLABS_VOICE_DEFAULT: ${{ secrets.ELEVENLABS_VOICE_DEFAULT }}
          ELEVENLABS_VOICE_PRIME_SELF: ${{ secrets.ELEVENLABS_VOICE_PRIME_SELF }}
          FACTORY_R2_ACCESS_KEY: ${{ secrets.FACTORY_R2_ACCESS_KEY }}
          FACTORY_R2_SECRET_KEY: ${{ secrets.FACTORY_R2_SECRET_KEY }}
          FACTORY_R2_TOKEN: ${{ secrets.FACTORY_R2_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MINTLIFY_API: ${{ secrets.MINTLIFY_API }}
          NEON_CONNECTION_STRING: ${{ secrets.NEON_CONNECTION_STRING }}
          POSTHOG_ADMIN_URL: ${{ secrets.POSTHOG_ADMIN_URL }}
          POSTHOG_API: ${{ secrets.POSTHOG_API }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_PROJECT_TOKEN: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_SESSION_URL: ${{ secrets.POSTHOG_SESSION_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SCHEDULE_WORKER_URL: ${{ secrets.SCHEDULE_WORKER_URL }}
          SENTRY_DSN_CYPHER_HEALING: ${{ secrets.SENTRY_DSN_CYPHER_HEALING }}
          SENTRY_DSN_FACTORY_ADMIN: ${{ secrets.SENTRY_DSN_FACTORY_ADMIN }}
          SENTRY_DSN_IJUSTUS: ${{ secrets.SENTRY_DSN_IJUSTUS }}
          SENTRY_DSN_NEIGHBOR_AID: ${{ secrets.SENTRY_DSN_NEIGHBOR_AID }}
          SENTRY_DSN_PRIME_SELF: ${{ secrets.SENTRY_DSN_PRIME_SELF }}
          SENTRY_DSN_THE_CALLING: ${{ secrets.SENTRY_DSN_THE_CALLING }}
          SENTRY_DSN_WORDIS_BOND: ${{ secrets.SENTRY_DSN_WORDIS_BOND }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_PRACTITIONER_EMAIL: ${{ secrets.SMOKE_PRACTITIONER_EMAIL }}
          SMOKE_PRACTITIONER_PASSWORD: ${{ secrets.SMOKE_PRACTITIONER_PASSWORD }}
          SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
        run: |
          node -e '
            const sodium = require("tweetsodium");
            const https = require("https");
            const ORG = "placeholder";
            const TOKEN = "placeholder";
            const NAMES = [
            "ANTHROPIC_API_KEY",
            "CF_API_TOKEN",
            "CLOUDFLARE_API_TOKEN",
            "DEEPGRAM_API_KEY",
            "ELEVENLABS_API_KEY",
            "ELEVENLABS_VOICE_CYPHER",
            "ELEVENLABS_VOICE_DEFAULT",
            "ELEVENLABS_VOICE_PRIME_SELF",
            "FACTORY_R2_ACCESS_KEY",
            "FACTORY_R2_SECRET_KEY",
            "FACTORY_R2_TOKEN",
            "GH_PAT",
            "GROK_API_KEY",
            "GROQ_API_KEY",
            "MINTLIFY_API",
            "NEON_CONNECTION_STRING",
            "POSTHOG_ADMIN_URL",
            "POSTHOG_API",
            "POSTHOG_PROJECT_ID",
            "POSTHOG_PROJECT_TOKEN",
            "POSTHOG_SESSION_URL",
            "R2_ACCESS_KEY_ID",
            "R2_BUCKET_NAME",
            "R2_PUBLIC_DOMAIN",
            "R2_SECRET_ACCESS_KEY",
            "RESEND_API_KEY",
            "SCHEDULE_WORKER_URL",
            "SENTRY_DSN_CYPHER_HEALING",
            "SENTRY_DSN_FACTORY_ADMIN",
            "SENTRY_DSN_IJUSTUS",
            "SENTRY_DSN_NEIGHBOR_AID",
            "SENTRY_DSN_PRIME_SELF",
            "SENTRY_DSN_THE_CALLING",
            "SENTRY_DSN_WORDIS_BOND",
            "SMOKE_EMAIL",
            "SMOKE_PASSWORD",
            "SMOKE_PRACTITIONER_EMAIL",
            "SMOKE_PRACTITIONER_PASSWORD",
            "SMOKE_USER_EMAIL",
            "SMOKE_USER_PASSWORD",
            "STRIPE_PUBLISHABLE_KEY",
            "STRIPE_SECRET_KEY",
            "TELNYX_API_KEY"
            ];
            function api(method, path, body){
              return new Promise((res,rej)=>{
                const opts = { method, headers: { Authorization:"Bearer "+TOKEN, Accept:"application/vnd.github+json", "X-GitHub-Api-Version":"2022-11-28", "Content-Type":"application/json", "User-Agent":"factory-migrate" }};
                const req = https.request("https://api.github.com"+path, opts, r=>{ let d=""; r.on("data",c=>d+=c); r.on("end",()=>res({status:r.statusCode, body:d})); });
                req.on("error",rej); if (body) req.write(body); req.end();
              });
            }
            (async ()=>{
              const pk = JSON.parse((await api("GET","/orgs/"+ORG+"/actions/secrets/public-key")).body);
              for (const name of NAMES){
                const val = process.env[name];
                if (!val){ console.log("SKIP "+name+" (empty)"); continue; }
                const enc = Buffer.from(sodium.seal(Buffer.from(val), Buffer.from(pk.key,"base64"))).toString("base64");
                const body = JSON.stringify({ encrypted_value: enc, key_id: pk.key_id, visibility:"all" });
                const r = await api("PUT","/orgs/"+ORG+"/actions/secrets/"+name, body);
                console.log(name+": "+r.status);
              }
            })();
          '
      - name: Self-delete this workflow
        run: |
          curl -fsSL -X DELETE -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/Latimer-Woods-Tech/factory/contents/.github/workflows/migrate-secrets-to-org.yml" -d '{"message":"chore(ci): remove one-shot secrets migration workflow","sha":"PLACEHOLDER"}' || echo "Cleanup skipped — delete manually"
