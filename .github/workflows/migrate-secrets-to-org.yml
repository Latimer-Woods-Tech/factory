name: Migrate Secrets To Org (one-shot)
on: workflow_dispatch
permissions: { contents: write }
concurrency:
  group: migrate-secrets-to-org-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - run: pip install pynacl requests
      - name: Migrate to org-level
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: Latimer-Woods-Tech
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_CYPHER: ${{ secrets.ELEVENLABS_VOICE_CYPHER }}
          ELEVENLABS_VOICE_DEFAULT: ${{ secrets.ELEVENLABS_VOICE_DEFAULT }}
          ELEVENLABS_VOICE_PRIME_SELF: ${{ secrets.ELEVENLABS_VOICE_PRIME_SELF }}
          FACTORY_R2_ACCESS_KEY: ${{ secrets.FACTORY_R2_ACCESS_KEY }}
          FACTORY_R2_SECRET_KEY: ${{ secrets.FACTORY_R2_SECRET_KEY }}
          FACTORY_R2_TOKEN: ${{ secrets.FACTORY_R2_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MINTLIFY_API: ${{ secrets.MINTLIFY_API }}
          NEON_CONNECTION_STRING: ${{ secrets.NEON_CONNECTION_STRING }}
          POSTHOG_ADMIN_URL: ${{ secrets.POSTHOG_ADMIN_URL }}
          POSTHOG_API: ${{ secrets.POSTHOG_API }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_PROJECT_TOKEN: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_SESSION_URL: ${{ secrets.POSTHOG_SESSION_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SCHEDULE_WORKER_URL: ${{ secrets.SCHEDULE_WORKER_URL }}
          SENTRY_DSN_CYPHER_HEALING: ${{ secrets.SENTRY_DSN_CYPHER_HEALING }}
          SENTRY_DSN_FACTORY_ADMIN: ${{ secrets.SENTRY_DSN_FACTORY_ADMIN }}
          SENTRY_DSN_IJUSTUS: ${{ secrets.SENTRY_DSN_IJUSTUS }}
          SENTRY_DSN_NEIGHBOR_AID: ${{ secrets.SENTRY_DSN_NEIGHBOR_AID }}
          SENTRY_DSN_PRIME_SELF: ${{ secrets.SENTRY_DSN_PRIME_SELF }}
          SENTRY_DSN_THE_CALLING: ${{ secrets.SENTRY_DSN_THE_CALLING }}
          SENTRY_DSN_WORDIS_BOND: ${{ secrets.SENTRY_DSN_WORDIS_BOND }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_PRACTITIONER_EMAIL: ${{ secrets.SMOKE_PRACTITIONER_EMAIL }}
          SMOKE_PRACTITIONER_PASSWORD: ${{ secrets.SMOKE_PRACTITIONER_PASSWORD }}
          SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
        run: |
          python3 <<'PYEOF'
          import os, base64, json, sys
          import requests
          from nacl import encoding, public
          token = os.environ['GH_TOKEN']
          org = os.environ['ORG']
          names = ["ANTHROPIC_API_KEY","CF_API_TOKEN","CLOUDFLARE_API_TOKEN","DEEPGRAM_API_KEY","ELEVENLABS_API_KEY","ELEVENLABS_VOICE_CYPHER","ELEVENLABS_VOICE_DEFAULT","ELEVENLABS_VOICE_PRIME_SELF","FACTORY_R2_ACCESS_KEY","FACTORY_R2_SECRET_KEY","FACTORY_R2_TOKEN","GH_PAT","GROK_API_KEY","GROQ_API_KEY","MINTLIFY_API","NEON_CONNECTION_STRING","POSTHOG_ADMIN_URL","POSTHOG_API","POSTHOG_PROJECT_ID","POSTHOG_PROJECT_TOKEN","POSTHOG_SESSION_URL","R2_ACCESS_KEY_ID","R2_BUCKET_NAME","R2_PUBLIC_DOMAIN","R2_SECRET_ACCESS_KEY","RESEND_API_KEY","SCHEDULE_WORKER_URL","SENTRY_DSN_CYPHER_HEALING","SENTRY_DSN_FACTORY_ADMIN","SENTRY_DSN_IJUSTUS","SENTRY_DSN_NEIGHBOR_AID","SENTRY_DSN_PRIME_SELF","SENTRY_DSN_THE_CALLING","SENTRY_DSN_WORDIS_BOND","SMOKE_EMAIL","SMOKE_PASSWORD","SMOKE_PRACTITIONER_EMAIL","SMOKE_PRACTITIONER_PASSWORD","SMOKE_USER_EMAIL","SMOKE_USER_PASSWORD","STRIPE_PUBLISHABLE_KEY","STRIPE_SECRET_KEY","TELNYX_API_KEY"]
          h = {'Authorization': f'Bearer {token}', 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28'}
          pk_resp = requests.get(f'https://api.github.com/orgs/{org}/actions/secrets/public-key', headers=h).json()
          pk_obj = public.PublicKey(pk_resp['key'].encode('utf-8'), encoding.Base64Encoder())
          box = public.SealedBox(pk_obj)
          for name in names:
              val = os.environ.get(name)
              if not val:
                  print(f'SKIP {name} (empty)')
                  continue
              enc = base64.b64encode(box.encrypt(val.encode('utf-8'))).decode('utf-8')
              body = {'encrypted_value': enc, 'key_id': pk_resp['key_id'], 'visibility':'all'}
              r = requests.put(f'https://api.github.com/orgs/{org}/actions/secrets/{name}', headers=h, json=body)
              print(f'{name}: {r.status_code}')
          PYEOF
