name: Scaffold factory-admin (Phase 8)

on:
  workflow_dispatch:

# Hyperdrive IDs are stored as Factory repo secrets.
# Required secrets:
#   GH_PAT                         — PAT with repo + packages:read
#   HYPERDRIVE_FACTORY_CORE        — Hyperdrive ID for factory_core DB
#   HYPERDRIVE_WORDIS_BOND         — Hyperdrive ID for wordis-bond DB
#   HYPERDRIVE_CYPHER_HEALING      — Hyperdrive ID for cypher-healing DB
#   HYPERDRIVE_PRIME_SELF          — Hyperdrive ID for prime-self DB
#   HYPERDRIVE_IJUSTUS             — Hyperdrive ID for ijustus DB
#   HYPERDRIVE_THE_CALLING         — Hyperdrive ID for the-calling DB
#   HYPERDRIVE_NEIGHBOR_AID        — Hyperdrive ID for neighbor-aid DB

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scaffold factory-admin repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          HYPERDRIVE_FACTORY_CORE:  ${{ secrets.HYPERDRIVE_FACTORY_CORE }}
          HYPERDRIVE_WORDIS_BOND:   ${{ secrets.HYPERDRIVE_WORDIS_BOND }}
          HYPERDRIVE_CYPHER_HEALING: ${{ secrets.HYPERDRIVE_CYPHER_HEALING }}
          HYPERDRIVE_PRIME_SELF:    ${{ secrets.HYPERDRIVE_PRIME_SELF }}
          HYPERDRIVE_IJUSTUS:       ${{ secrets.HYPERDRIVE_IJUSTUS }}
          HYPERDRIVE_THE_CALLING:   ${{ secrets.HYPERDRIVE_THE_CALLING }}
          HYPERDRIVE_NEIGHBOR_AID:  ${{ secrets.HYPERDRIVE_NEIGHBOR_AID }}
        run: node packages/deploy/scripts/scaffold-factory-admin.mjs
