name: Studio — Test Dispatch

# Dispatched by the admin-studio Worker (POST /tests/runs).
# Inputs are signed by the dispatch flow; we only trust the run_id from
# inputs and post results back via HMAC-signed webhook to STUDIO_PUBLIC_URL.
#
# Required repo secrets:
#   STUDIO_WEBHOOK_SECRET — shared with the admin-studio Worker
#
# Inputs are also accepted via gh CLI for manual testing.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Studio run id (UUID)'
        required: true
      suites:
        description: 'Comma-separated suite ids, or "*" for all'
        required: false
        default: '*'
      filter:
        description: 'Optional vitest --testNamePattern'
        required: false
        default: ''
      callback_url:
        description: 'Studio webhook endpoint (e.g. https://admin-studio.adrper79.workers.dev/tests/webhook)'
        required: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  run-tests:
    name: Run vitest and report to Studio
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUN_ID: ${{ github.event.inputs.run_id }}
      SUITES: ${{ github.event.inputs.suites }}
      FILTER: ${{ github.event.inputs.filter }}
      CALLBACK_URL: ${{ github.event.inputs.callback_url }}
      STUDIO_WEBHOOK_SECRET: ${{ secrets.STUDIO_WEBHOOK_SECRET }}
      GH_RUN_ID: ${{ github.run_id }}
      GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Notify Studio — running
        run: node .github/scripts/studio-test-report.mjs running

      - name: Resolve suite paths
        id: resolve
        run: node .github/scripts/studio-resolve-suites.mjs

      - name: Run vitest
        id: vitest
        continue-on-error: true
        run: |
          mkdir -p test-output
          if [ -n "$FILTER" ]; then
            FILTER_FLAG="--testNamePattern=$FILTER"
          else
            FILTER_FLAG=""
          fi
          # shellcheck disable=SC2086
          npx vitest run \
            --reporter=json \
            --outputFile=test-output/results.json \
            $FILTER_FLAG \
            ${{ steps.resolve.outputs.paths }}

      - name: Notify Studio — finished
        if: always()
        run: node .github/scripts/studio-test-report.mjs finished
