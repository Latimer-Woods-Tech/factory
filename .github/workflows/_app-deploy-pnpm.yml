# =============================================================================
# Reusable deploy workflow for Latimer-Woods-Tech apps that install with pnpm.
#
# WHAT IT DOES
#   Installs deps from GitHub Packages with pnpm, runs `wrangler deploy`,
#   and optionally probes a health URL with retry.
#
# WHO CALLS IT
#   App repos with a pnpm lockfile that still want the standard factory deploy shape.
#
# HOW TO CALL
#   jobs:
#     deploy:
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_app-deploy-pnpm.yml@main
#       with:
#         environment: production
#         health_url: https://app.example.com/health
#       secrets: inherit
#
# REQUIRED SECRETS (passed via `secrets: inherit` from org-level vault)
#   FACTORY_APP_ID            - GitHub App ID for `factory-cross-repo`
#   FACTORY_APP_PRIVATE_KEY   - PEM private key for the same App
#   CF_API_TOKEN or CLOUDFLARE_API_TOKEN
#   CF_ACCOUNT_ID or CLOUDFLARE_ACCOUNT_ID
#
# RELATED
#   _app-deploy.yml          - npm variant
#   _app-ci-pnpm.yml         - pnpm CI variant
#   docs/CI_CD.md            - Full architecture reference
# =============================================================================

name: _app-deploy-pnpm

concurrency:
  group: deploy-pnpm-${{ inputs.environment }}-${{ github.repository }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: '22'
      pnpm_version:
        type: string
        default: '9'
      working_directory:
        type: string
        default: '.'
      environment:
        type: string
        default: 'production'
      wrangler_command:
        type: string
        default: 'deploy'
      health_url:
        type: string
        default: ''

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
          cache: pnpm
          cache-dependency-path: ${{ inputs.working_directory }}/pnpm-lock.yaml
      - name: Configure npm auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ steps.app-token.outputs.token }}" >> .npmrc
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          command: ${{ inputs.wrangler_command }}
      - name: Post-deploy health check
        if: ${{ inputs.health_url != '' }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsSL --max-time 10 "${{ inputs.health_url }}" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
