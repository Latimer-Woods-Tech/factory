# =============================================================================
# Reusable deploy workflow for Latimer-Woods-Tech apps — pnpm variant.
#
# WHAT IT DOES
#   Like _app-deploy.yml but uses pnpm instead of npm. Use this for apps that
#   manage their lockfile with pnpm (e.g. videoking).
#   Installs deps from GitHub Packages via pnpm, runs `wrangler deploy`,
#   optionally probes a health URL with retry. Targets either staging or
#   production GitHub Environment so required-reviewer gates apply automatically.
#
# WHO CALLS IT
#   App repos that use pnpm. Currently: videoking.
#   Chain with _post-deploy-verify.yml for production-grade auto-rollback.
#
# HOW TO CALL
#   jobs:
#     deploy:
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_app-deploy-pnpm.yml@main
#       with:
#         environment: production
#         health_url: https://app.example.com/healthz
#       secrets: inherit
#
# HOW TO CALL WITH POST-DEPLOY VERIFY (recommended for production)
#   jobs:
#     deploy:
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_app-deploy-pnpm.yml@main
#       with:
#         environment: production
#       secrets: inherit
#     verify:
#       needs: deploy
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_post-deploy-verify.yml@main
#       with:
#         health_url: https://app.example.com/healthz
#         rollback_on_failure: true
#         worker_name: my-app-production
#       secrets: inherit
#
# REQUIRED SECRETS (passed via `secrets: inherit` from org-level vault)
#   FACTORY_APP_ID            - GitHub App ID for `factory-cross-repo`
#   FACTORY_APP_PRIVATE_KEY   - PEM private key for the same App
#   CLOUDFLARE_API_TOKEN      - Token with Workers Scripts:Edit on this account
#   CLOUDFLARE_ACCOUNT_ID     - Cloudflare account ID
#
# REQUIRED REPO STATE
#   GitHub Environment named `production` and/or `staging` must exist on the
#   calling repo. Public repos get required-reviewer gates; private repos on
#   the Team plan get bare environments only (Enterprise needed for private
#   repo gates).
#
# OPTIONAL INPUTS
#   pnpm_version       - pnpm major version to install (default '9')
#   node_version       - Node.js major version (default '22')
#   working_directory  - Subdir to run wrangler in (default '.')
#   environment        - GitHub Environment name (default 'production')
#   wrangler_command   - Wrangler CLI command (default 'deploy')
#   health_url         - URL to probe post-deploy. Empty string skips the check.
#
# OUTPUT
#   No outputs. Failure exits non-zero. For auto-rollback, chain
#   `_post-deploy-verify.yml` with `rollback_on_failure: true`.
#
# RELATED
#   _app-deploy.yml          - npm variant (for most apps)
#   _app-ci-pnpm.yml         - Pre-deploy CI for pnpm apps
#   _post-deploy-verify.yml  - Stronger verify with auto-rollback
#   docs/CI_CD.md            - Full architecture reference
# =============================================================================

name: _app-deploy-pnpm

concurrency:
  group: deploy-${{ inputs.environment }}-${{ github.repository }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      pnpm_version:
        type: string
        default: '9'
      node_version:
        type: string
        default: '22'
      working_directory:
        type: string
        default: '.'
      environment:
        type: string
        default: 'production'
      wrangler_command:
        type: string
        default: 'deploy'
      health_url:
        type: string
        default: ''

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
          cache: 'pnpm'
      - name: Configure npm auth for GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: ${{ inputs.wrangler_command }}
          packageManager: pnpm
      - name: Post-deploy health check
        if: ${{ inputs.health_url != '' }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsSL --max-time 10 "${{ inputs.health_url }}" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
