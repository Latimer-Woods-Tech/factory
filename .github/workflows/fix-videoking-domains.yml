name: Fix videoking domains (VK-1)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  attach:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ZONE_NAME: itsjusus.com
    steps:
      - name: Resolve zone ID
        id: zone
        run: |
          ZONE_ID=$(curl -fsS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?account.id=$ACCOUNT_ID&name=$ZONE_NAME" \
            | jq -r '.result[0].id // empty')
          if [ -z "$ZONE_ID" ]; then
            echo "::error::Zone $ZONE_NAME not found under account $ACCOUNT_ID"
            exit 1
          fi
          echo "zone_id=$ZONE_ID" >> "$GITHUB_OUTPUT"

      - name: Delete legacy Worker route (if present)
        env:
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          ROUTE_ID=$(curl -fsS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes" \
            | jq -r '.result[]? | select(.pattern=="api.itsjusus.com/*") | .id')
          if [ -n "$ROUTE_ID" ]; then
            curl -fsS -X DELETE -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes/$ROUTE_ID"
          fi

      - name: Attach Workers Custom Domain api.itsjusus.com → nichestream-api
        env:
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          curl -fsS -X PUT -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/domains" \
            -d "{\"environment\":\"production\",\"hostname\":\"api.itsjusus.com\",\"service\":\"nichestream-api\",\"zone_id\":\"$ZONE_ID\"}"

      - name: Attach R2 Custom Domain assets.itsjusus.com → videoking-r2
        env:
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          curl -fsS -X POST -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/r2/buckets/videoking-r2/domains/custom" \
            -d "{\"domain\":\"assets.itsjusus.com\",\"enabled\":true,\"zoneId\":\"$ZONE_ID\"}"

      - name: Verify
        run: |
          sleep 10
          for url in https://api.itsjusus.com/health https://assets.itsjusus.com/ https://itsjusus.com/; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$url")
            echo "$code  $url"
            [ "$code" = "530" ] && exit 1 || true
          done
