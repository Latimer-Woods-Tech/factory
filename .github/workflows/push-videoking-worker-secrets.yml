name: Push videoking Worker secrets (VK-5)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@latest
      - name: Build secrets JSON
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET_VIDEOKING }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_VIDEOKING }}
          STREAM_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          STREAM_ACCOUNT_ID: ${{ secrets.STREAM_ACCOUNT_ID_VIDEOKING }}
          STREAM_CUSTOMER_DOMAIN: ${{ secrets.STREAM_CUSTOMER_DOMAIN_VIDEOKING }}
          APP_BASE_URL: https://itsjusus.com
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_VIDEOKING }}
          EMAIL_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STRIPE_CONNECT_CLIENT_ID: ${{ secrets.STRIPE_CONNECT_CLIENT_ID }}
          STRIPE_CITIZEN_MONTHLY_PRICE: ${{ secrets.STRIPE_PRICE_VIDEOKING_CITIZEN_MONTHLY }}
          STRIPE_CITIZEN_ANNUAL_PRICE: ${{ secrets.STRIPE_PRICE_VIDEOKING_CITIZEN_ANNUAL }}
          STRIPE_VIP_MONTHLY_PRICE: ${{ secrets.STRIPE_PRICE_VIDEOKING_VIP_MONTHLY }}
          STRIPE_VIP_ANNUAL_PRICE: ${{ secrets.STRIPE_PRICE_VIDEOKING_VIP_ANNUAL }}
        run: |
          jq -n \
            --arg a "$BETTER_AUTH_SECRET" --arg b "$STRIPE_SECRET_KEY" --arg c "$STRIPE_WEBHOOK_SECRET" \
            --arg d "$STREAM_API_TOKEN" --arg e "$STREAM_ACCOUNT_ID" --arg f "$STREAM_CUSTOMER_DOMAIN" \
            --arg g "$APP_BASE_URL" --arg h "$SENTRY_DSN" --arg i "${EMAIL_API_KEY:-placeholder}" \
            --arg j "${STRIPE_CONNECT_CLIENT_ID:-placeholder}" \
            --arg k "$STRIPE_CITIZEN_MONTHLY_PRICE" --arg l "$STRIPE_CITIZEN_ANNUAL_PRICE" \
            --arg m "$STRIPE_VIP_MONTHLY_PRICE" --arg n "$STRIPE_VIP_ANNUAL_PRICE" \
            '{BETTER_AUTH_SECRET:$a,STRIPE_SECRET_KEY:$b,STRIPE_WEBHOOK_SECRET:$c,STREAM_API_TOKEN:$d,STREAM_ACCOUNT_ID:$e,STREAM_CUSTOMER_DOMAIN:$f,APP_BASE_URL:$g,SENTRY_DSN:$h,EMAIL_API_KEY:$i,STRIPE_CONNECT_CLIENT_ID:$j,STRIPE_CITIZEN_MONTHLY_PRICE:$k,STRIPE_CITIZEN_ANNUAL_PRICE:$l,STRIPE_VIP_MONTHLY_PRICE:$m,STRIPE_VIP_ANNUAL_PRICE:$n}' > secrets.json
          echo "wrote $(jq 'keys|length' secrets.json) keys"
      - name: Push to nichestream-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler secret bulk secrets.json --name nichestream-api
      - name: Verify /health
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/body -w '%{http_code}' --max-time 10 https://api.itsjusus.com/health)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && { cat /tmp/body; exit 0; }
            sleep 5
          done
          cat /tmp/body
          exit 1
