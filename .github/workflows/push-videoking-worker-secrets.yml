name: Push videoking Worker secrets (VK-5)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g wrangler@latest

      - name: Update Worker vars via Cloudflare API (STRIPE price IDs, STREAM identifiers, APP_BASE_URL)
        env:
          STREAM_ACCOUNT_ID: ${{ secrets.STREAM_ACCOUNT_ID_VIDEOKING }}
          STREAM_CUSTOMER_DOMAIN: ${{ secrets.STREAM_CUSTOMER_DOMAIN_VIDEOKING }}
          CIT_M: ${{ secrets.STRIPE_PRICE_VIDEOKING_CITIZEN_MONTHLY }}
          CIT_A: ${{ secrets.STRIPE_PRICE_VIDEOKING_CITIZEN_ANNUAL }}
          VIP_M: ${{ secrets.STRIPE_PRICE_VIDEOKING_VIP_MONTHLY }}
          VIP_A: ${{ secrets.STRIPE_PRICE_VIDEOKING_VIP_ANNUAL }}
        run: |
          set -e
          # Fetch current bindings so we don't clobber durable_object/r2/hyperdrive bindings
          SETTINGS=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/nichestream-api/settings")
          # Build new bindings array: keep non-plain_text bindings, replace/add plain_text ones
          echo "$SETTINGS" | jq --arg aid "$STREAM_ACCOUNT_ID" --arg dom "$STREAM_CUSTOMER_DOMAIN" \
            --arg cm "$CIT_M" --arg ca "$CIT_A" --arg vm "$VIP_M" --arg va "$VIP_A" '
            .result.bindings |= (
              map(select(.type != "plain_text")) +
              [
                {type:"plain_text", name:"STREAM_ACCOUNT_ID", text:$aid},
                {type:"plain_text", name:"STREAM_CUSTOMER_DOMAIN", text:$dom},
                {type:"plain_text", name:"APP_BASE_URL", text:"https://itsjusus.com"},
                {type:"plain_text", name:"STRIPE_CITIZEN_MONTHLY_PRICE", text:$cm},
                {type:"plain_text", name:"STRIPE_CITIZEN_ANNUAL_PRICE", text:$ca},
                {type:"plain_text", name:"STRIPE_VIP_MONTHLY_PRICE", text:$vm},
                {type:"plain_text", name:"STRIPE_VIP_ANNUAL_PRICE", text:$va},
                {type:"plain_text", name:"PLATFORM_FEE_PERCENT", text:"20"},
                {type:"plain_text", name:"CHAT_RATE_LIMIT_FREE_MS", text:"10000"},
                {type:"plain_text", name:"CHAT_RATE_LIMIT_CITIZEN_MS", text:"1000"},
                {type:"plain_text", name:"CHAT_RATE_LIMIT_VIP_MS", text:"500"},
                {type:"plain_text", name:"TRIAL_PERIOD_DAYS", text:"14"},
                {type:"plain_text", name:"CONFERENCE_PROVIDER", text:"mock_sfu"}
              ]
            ) | .result
          ' > /tmp/new-settings.json
          # PATCH settings
          curl -fsS -X PATCH -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/nichestream-api/settings" \
            -d @/tmp/new-settings.json | jq '{success, errors}'

      - name: Push real secrets via wrangler secret bulk
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET_VIDEOKING }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_VIDEOKING }}
          STREAM_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_VIDEOKING }}
          EMAIL_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          jq -n \
            --arg a "$BETTER_AUTH_SECRET" --arg b "$STRIPE_SECRET_KEY" --arg c "$STRIPE_WEBHOOK_SECRET" \
            --arg d "$STREAM_API_TOKEN" --arg e "$SENTRY_DSN" --arg f "$EMAIL_API_KEY" \
            '{BETTER_AUTH_SECRET:$a,STRIPE_SECRET_KEY:$b,STRIPE_WEBHOOK_SECRET:$c,STREAM_API_TOKEN:$d,SENTRY_DSN:$e,EMAIL_API_KEY:$f}' > secrets.json
          wrangler secret bulk secrets.json --name nichestream-api

      - name: Verify /health
        run: |
          sleep 5
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /tmp/body -w '%{http_code}' --max-time 10 https://api.itsjusus.com/health)
            body=$(cat /tmp/body 2>/dev/null | head -c 200)
            echo "attempt $i: HTTP $code | $body"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          exit 1
