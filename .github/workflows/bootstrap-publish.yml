name: Bootstrap Publish All Packages

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@adrper79-dot'

      - name: Publish all packages in dependency order
        run: |
          set -euo pipefail

          PACKAGES=(errors monitoring logger auth neon stripe llm telephony analytics deploy testing email copy content social seo crm compliance admin)
          TARGET_VERSION="0.2.0"

          for pkg in "${PACKAGES[@]}"; do
            echo ""
            echo "=== Publishing @adrper79-dot/${pkg} ==="
            pushd "packages/${pkg}"

            # Replace file: internal deps with real npm version refs and pin version
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              const ver = process.env.TARGET_VERSION;
              const fix = (deps) => {
                if (!deps) return;
                for (const [k, v] of Object.entries(deps)) {
                  if (k.startsWith('@adrper79-dot/') && v.startsWith('file:')) {
                    deps[k] = '^' + ver;
                  }
                }
              };
              fix(p.dependencies);
              fix(p.devDependencies);
              if (p.version !== '0.2.1') p.version = ver;
              delete p.scripts.prepublish;
              fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
              console.log('package.json updated to v' + p.version);
            " TARGET_VERSION="${TARGET_VERSION}"

            # Regenerate lockfile with production npm refs
            npm install --package-lock-only --legacy-peer-deps

            # Install deps (no scripts to avoid circular prepublish issues)
            npm ci --ignore-scripts

            # Build dist
            npm run build

            # Publish (skip prepublish quality gate — CI has already validated)
            npm publish --ignore-scripts

            popd
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_VERSION: "0.2.0"
