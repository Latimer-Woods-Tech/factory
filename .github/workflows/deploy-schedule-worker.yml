name: Deploy Schedule Worker

on:
  push:
    branches: [main]
    paths:
      - 'apps/schedule-worker/**'
      - '.github/workflows/deploy-schedule-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy schedule-worker to Cloudflare
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd apps/schedule-worker
          echo "@adrper79-dot:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          npm install

      - name: Update wrangler.jsonc with Hyperdrive ID
        run: |
          cd apps/schedule-worker
          sed -i 's/REPLACE_WITH_HYPERDRIVE_ID/${{ secrets.HYPERDRIVE_FACTORY_CORE }}/g' wrangler.jsonc
          echo "✅ Updated wrangler.jsonc with Hyperdrive ID"
          cat wrangler.jsonc

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/schedule-worker
          command: deploy --env production
          secrets: |
            WORKER_API_TOKEN
          environment: production
        env:
          WORKER_API_TOKEN: ${{ secrets.WORKER_API_TOKEN }}

      - name: Verify deployment
        run: |
          echo "🚀 Deployment complete"
          echo "📍 Health check: https://schedule-worker.adrper79.workers.dev/health"
          node scripts/verify-http-endpoint.mjs \
            --url https://schedule-worker.adrper79.workers.dev/health \
            --status 200 \
            --json-field status \
            --json-equals ok \
            --retries 8 \
            --delay-ms 5000
