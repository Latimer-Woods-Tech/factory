name: Deploy Video Cron Worker

on:
  push:
    branches: [main]
    paths:
      - 'apps/video-cron/**'
      - '.github/workflows/deploy-video-cron.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy video-cron to Cloudflare
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd apps/video-cron
          echo "@adrper79-dot:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          npm install

      - name: Update wrangler.jsonc with Hyperdrive ID
        run: |
          cd apps/video-cron
          sed -i 's/REPLACE_WITH_HYPERDRIVE_ID/${{ secrets.HYPERDRIVE_FACTORY_CORE }}/g' wrangler.jsonc
          echo "✅ Updated wrangler.jsonc with Hyperdrive ID"
          cat wrangler.jsonc

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/video-cron
          command: deploy --env production
          secrets: |
            GITHUB_TOKEN
            WORKER_API_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          WORKER_API_TOKEN: ${{ secrets.WORKER_API_TOKEN }}

      - name: Verify deployment
        run: |
          echo "🚀 Deployment complete"
          echo "⏰ Cron job configured: hourly (0 * * * *)"
          echo "📋 Cron jobs are managed by Cloudflare and run automatically"
          node scripts/verify-http-endpoint.mjs \
            --url https://video-cron.adrper79.workers.dev/health \
            --status 200 \
            --json-field status \
            --json-equals ok \
            --retries 8 \
            --delay-ms 5000
