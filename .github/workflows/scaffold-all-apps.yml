name: Scaffold All Apps (Phase 7)

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Single app to scaffold (leave empty for all 6)'
        required: false
        default: ''

# Scaffolds all 6 app repos with wrangler.jsonc, tsconfig, src/index.ts,
# src/db/schema.ts, CI/deploy workflows, etc.
# Pushes directly to the Latimer-Woods-Tech/<app> repo main branch.
# Safe to re-run — checks if repo already has src/index.ts before pushing.
#
# npm install is intentionally skipped (--no-install) because @latimer-woods-tech/*
# packages are not yet published.  The app CI will run npm ci once they are.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  scaffold:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: wordis-bond
            hyperdrive_id: 1b281136e0fa456099507a51664e2591
            rate_limiter_id: "1001"
          - app: cypher-healing
            hyperdrive_id: e0fa92f0bf824ec7baac3726199b06b1
            rate_limiter_id: "1002"
          - app: prime-self
            hyperdrive_id: 78e47571fffb4a81ba12ee454507e006
            rate_limiter_id: "1003"
          - app: ijustus
            hyperdrive_id: 933b84184870481ab097a4506db5a675
            rate_limiter_id: "1004"
          - app: the-calling
            hyperdrive_id: db5fff63eae14cc980fa16a0e6c09d77
            rate_limiter_id: "1005"
          - app: neighbor-aid
            hyperdrive_id: f6197204a42a4fddae4bf22added1112
            rate_limiter_id: "1006"

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Skip if filter set and app doesn't match
        if: ${{ github.event.inputs.app != '' && github.event.inputs.app != matrix.app }}
        run: echo "Skipping ${{ matrix.app }} — filter is '${{ github.event.inputs.app }}'"

      - uses: actions/checkout@v6  # checks out Factory (this repo)
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}

      - uses: actions/setup-node@v6
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}
        with:
          node-version: '22'

      - name: Install wrangler (required by scaffold prerequisite check)
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}
        run: npm install -g wrangler@latest

      - name: Configure git
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}
        run: |
          git config --global user.email "ci@factory.dev"
          git config --global user.name "Factory CI"
          git config --global init.defaultBranch main

      - name: Check if already scaffolded
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}
        id: check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          APP="${{ matrix.app }}"
          # Use exit code only — gh api exits 0 on 200, non-zero on 404/409
          if gh api repos/Latimer-Woods-Tech/$APP/contents/src/index.ts > /dev/null 2>&1; then
            echo "⏭  $APP already has src/index.ts — skipping scaffold."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "$APP is not scaffolded — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scaffold.mjs (non-interactive, no install)
        if: ${{ (github.event.inputs.app == '' || github.event.inputs.app == matrix.app) && steps.check.outputs.skip == 'false' }}
        run: |
          # Echo empty lines to satisfy any remaining readline prompts (secrets=n, deploy skipped by --no-deploy)
          printf '\n\n\n\n\n\n\n\n' | node packages/deploy/scripts/scaffold.mjs "${{ matrix.app }}" \
            --hyperdrive-id "${{ matrix.hyperdrive_id }}" \
            --rate-limiter-id "${{ matrix.rate_limiter_id }}" \
            --no-deploy \
            --no-install

      - name: Write canonical schema
        if: ${{ (github.event.inputs.app == '' || github.event.inputs.app == matrix.app) && steps.check.outputs.skip == 'false' }}
        run: node packages/deploy/scripts/write-schema.mjs "${{ matrix.app }}"

      - name: Add app-specific deps to package.json
        if: ${{ (github.event.inputs.app == '' || github.event.inputs.app == matrix.app) && steps.check.outputs.skip == 'false' }}
        run: node packages/deploy/scripts/add-app-deps.mjs "${{ matrix.app }}"

      - name: Amend commit and push to app repo
        if: ${{ (github.event.inputs.app == '' || github.event.inputs.app == matrix.app) && steps.check.outputs.skip == 'false' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          APP="${{ matrix.app }}"
          cd "$APP"

          # Amend the initial scaffold commit to include schema + deps edits
          git add -A
          git commit --amend --no-edit

          # Push to existing empty repo (force in case a README exists)
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/Latimer-Woods-Tech/$APP.git"
          git push origin main --force
          echo "✅ $APP scaffolded and pushed."
