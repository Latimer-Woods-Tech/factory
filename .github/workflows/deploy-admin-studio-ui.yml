name: Deploy admin-studio-ui (Pages)

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-studio-ui/**'
      - 'packages/studio-core/**'
      - '.github/workflows/deploy-admin-studio-ui.yml'
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: admin-studio-ui-${{ github.event.inputs.env || 'staging' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env || 'staging' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install + build studio-core
        run: npm ci --ignore-scripts
        working-directory: packages/studio-core

      - name: Build studio-core
        run: npm run build
        working-directory: packages/studio-core

      - name: Install admin-studio-ui
        run: npm ci
        working-directory: apps/admin-studio-ui

      - name: Build UI
        run: npm run build
        working-directory: apps/admin-studio-ui
        env:
          VITE_API_BASE: ${{ github.event.inputs.env == 'production' && 'https://admin-studio-production.adrper79.workers.dev' || 'https://admin-studio-staging.adrper79.workers.dev' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/admin-studio-ui/dist --project-name=admin-studio-ui --branch=${{ github.event.inputs.env == 'production' && 'main' || 'staging' }}

      - name: Verify Pages deployment
        run: |
          target_env="${{ github.event.inputs.env || 'staging' }}"
          if [ "$target_env" = "production" ]; then
            url="https://apunlimited.com"
          else
            url="https://staging.admin-studio-ui.pages.dev"
          fi
          node scripts/verify-http-endpoint.mjs \
            --url "$url" \
            --status 200 \
            --body-contains "Factory Admin Studio" \
            --retries 8 \
            --delay-ms 5000
