name: Sync PR status to project board

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  contents: read

jobs:
  sync:
    name: Sync PR status
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Compute target status
        id: target
        run: |
          if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            echo "status=Done" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.action }}" = "closed" ]; then
            echo "status=Done" >> "$GITHUB_OUTPUT"
          else
            echo "status=In Progress" >> "$GITHUB_OUTPUT"
          fi
      - name: Move PR card on project board
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
          TARGET_STATUS: ${{ steps.target.outputs.status }}
        run: |
          set -euo pipefail
          PROJECT_ID="PVT_kwDOEL0sNc4BWWtg"
          STATUS_FIELD_ID=$(gh api graphql -f query='query{ node(id:"'"$PROJECT_ID"'"){ ... on ProjectV2 { fields(first:20){ nodes{ ... on ProjectV2SingleSelectField { id name options { id name } } } } } } }' -q '.data.node.fields.nodes[] | select(.name=="Status") | .id')
          OPTION_ID=$(gh api graphql -f query='query{ node(id:"'"$PROJECT_ID"'"){ ... on ProjectV2 { fields(first:20){ nodes{ ... on ProjectV2SingleSelectField { name options { id name } } } } } } }' -q '.data.node.fields.nodes[] | select(.name=="Status") | .options[] | select(.name=="'"$TARGET_STATUS"'") | .id')
          ITEM_ID=$(gh api graphql -f query='query{ node(id:"'"$PR_NODE_ID"'"){ ... on PullRequest { projectItems(first:10){ nodes{ id project { id } } } } } }' -q '.data.node.projectItems.nodes[] | select(.project.id=="'"$PROJECT_ID"'") | .id')
          if [ -z "$ITEM_ID" ]; then
            ITEM_ID=$(gh api graphql -f query='mutation{ addProjectV2ItemById(input:{projectId:"'"$PROJECT_ID"'", contentId:"'"$PR_NODE_ID"'"}){ item { id } } }' -q '.data.addProjectV2ItemById.item.id')
          fi
          gh api graphql -f query='mutation{ updateProjectV2ItemFieldValue(input:{projectId:"'"$PROJECT_ID"'", itemId:"'"$ITEM_ID"'", fieldId:"'"$STATUS_FIELD_ID"'", value:{singleSelectOptionId:"'"$OPTION_ID"'"}}){ projectV2Item { id } } }'
          echo "✓ PR → $TARGET_STATUS"

  # SUP-1.5: When a PR is opened/reopened, move linked issues to In Progress
  sync-linked-issues:
    name: Move linked issues to In Progress
    if: |
      github.event.action == 'opened' ||
      github.event.action == 'reopened' ||
      github.event.action == 'ready_for_review'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Move linked issues to In Progress
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_NUMS=$(echo "$PR_BODY" | grep -oiE '(clos(es|ed)|fix(es|ed)|resolv(es|ed))[[:space:]]+#[0-9]+' | grep -oE '[0-9]+' | sort -u)
          if [ -z "$ISSUE_NUMS" ]; then echo "no linked issues found"; exit 0; fi
          PROJECT_ID="PVT_kwDOEL0sNc4BWWtg"
          STATUS_FIELD_DATA=$(gh api graphql -f query='query($id: ID!) { node(id: $id) { ... on ProjectV2 { fields(first: 20) { nodes { ... on ProjectV2SingleSelectField { id name options { id name } } } } } } }' -f id="$PROJECT_ID")
          FIELD_ID=$(echo "$STATUS_FIELD_DATA" | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .id')
          IN_PROGRESS_OPT=$(echo "$STATUS_FIELD_DATA" | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .options[] | select(.name=="In Progress") | .id')
          for N in $ISSUE_NUMS; do
            ISSUE_NODE=$(gh api "/repos/$REPO/issues/$N" --jq .node_id 2>/dev/null || echo "")
            if [ -z "$ISSUE_NODE" ]; then echo "#$N not found, skipping"; continue; fi
            ITEM_ID=$(gh api graphql -f query='query($projectId: ID!) { node(id: $projectId) { ... on ProjectV2 { items(first: 100) { nodes { id content { ... on Issue { id } } } } } } }' -f projectId="$PROJECT_ID" --jq ".data.node.items.nodes[] | select(.content.id==\"$ISSUE_NODE\") | .id" 2>/dev/null || echo "")
            if [ -z "$ITEM_ID" ]; then echo "#$N not on board, skipping"; continue; fi
            gh api graphql -f query='mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) { updateProjectV2ItemFieldValue(input: { projectId: $p, itemId: $i, fieldId: $f, value: { singleSelectOptionId: $v } }) { projectV2Item { id } } }' -f p="$PROJECT_ID" -f i="$ITEM_ID" -f f="$FIELD_ID" -f v="$IN_PROGRESS_OPT"
            echo "✓ #$N → In Progress"
          done
