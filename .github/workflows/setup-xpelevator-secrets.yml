name: Setup xpelevator Secrets

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print commands without executing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Sets GitHub Actions secrets on the xpelevator repo and
# Wrangler (Cloudflare Worker) secrets on the xpelevator worker.
#
# Prerequisites:
#   - GH_PAT: classic PAT with repo + read:packages scopes
#   - CF_API_TOKEN: Cloudflare token with Workers:Edit permission
#   - CLOUDFLARE_ACCOUNT_ID, JWT_SECRET_XPELEVATOR set in Factory secrets
#   - Worker must already be deployed (scaffold-xpelevator first)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Set GitHub repo secrets on xpelevator
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set_secret() {
            local name="$1" val="$2"
            if [ -z "$val" ]; then
              echo "SKIP $name (empty)"
              return
            fi
            echo "$val" | gh secret set "$name" --repo Latimer-Woods-Tech/xpelevator
            echo "Set GitHub secret: $name"
          }
          set_secret PACKAGES_READ_TOKEN   "${{ steps.app-token.outputs.token }}"
          set_secret CF_API_TOKEN          "${{ secrets.CF_API_TOKEN }}"
          set_secret CLOUDFLARE_API_TOKEN  "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          set_secret CF_ACCOUNT_ID         "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          set_secret SENTRY_DSN            "${{ secrets.SENTRY_DSN_XPELEVATOR }}"
          echo "GitHub secrets complete."

      - name: Set Wrangler worker secrets on xpelevator
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set_wrangler() {
            local name="$1" val="$2"
            if [ -z "$val" ]; then
              echo "SKIP $name (empty)"
              return
            fi
            echo "$val" | wrangler secret put "$name" --name xpelevator
            echo "Set Wrangler secret: $name"
          }
          set_wrangler JWT_SECRET        "${{ secrets.JWT_SECRET_XPELEVATOR }}"
          set_wrangler SENTRY_DSN        "${{ secrets.SENTRY_DSN_XPELEVATOR }}"
          set_wrangler POSTHOG_KEY       "${{ secrets.POSTHOG_PROJECT_TOKEN }}"
          set_wrangler STRIPE_SECRET_KEY "${{ secrets.STRIPE_SECRET_KEY }}"
          echo "Wrangler secrets complete."

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "DRY RUN — would set the following:"
          echo ""
          echo "GitHub repo secrets (Latimer-Woods-Tech/xpelevator):"
          echo "  PACKAGES_READ_TOKEN, CF_API_TOKEN, CLOUDFLARE_API_TOKEN, CF_ACCOUNT_ID, SENTRY_DSN"
          echo ""
          echo "Wrangler worker secrets (xpelevator worker):"
          echo "  JWT_SECRET, SENTRY_DSN, POSTHOG_KEY, STRIPE_SECRET_KEY"
