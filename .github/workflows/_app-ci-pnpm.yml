# =============================================================================
# Reusable CI workflow for Latimer-Woods-Tech apps that install with pnpm.
#
# WHAT IT DOES
#   Runs typecheck, lint, test, and build against an app's source.
#   Authenticates to GitHub Packages so private @latimer-woods-tech/* deps resolve.
#
# WHO CALLS IT
#   App repos using pnpm for lockfile/install parity.
#
# HOW TO CALL
#   jobs:
#     ci:
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_app-ci-pnpm.yml@main
#       secrets: inherit
#
# REQUIRED SECRETS (passed via `secrets: inherit` from org-level vault)
#   FACTORY_APP_ID            - GitHub App ID for `factory-cross-repo`
#   FACTORY_APP_PRIVATE_KEY   - PEM private key for the same App
#
# RELATED
#   _app-ci.yml              - npm variant
#   _app-deploy-pnpm.yml     - pnpm deploy variant
#   docs/CI_CD.md            - Full architecture reference
# =============================================================================

name: _app-ci-pnpm

concurrency:
  group: ci-pnpm-${{ inputs.working_directory }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: '22'
      pnpm_version:
        type: string
        default: '9'
      working_directory:
        type: string
        default: '.'
      run_lint:
        type: boolean
        default: true
      run_typecheck:
        type: boolean
        default: true
      run_test:
        type: boolean
        default: true
      run_build:
        type: boolean
        default: true

permissions:
  contents: read
  packages: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
          cache: pnpm
          cache-dependency-path: ${{ inputs.working_directory }}/pnpm-lock.yaml
      - name: Configure npm auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ steps.app-token.outputs.token }}" >> .npmrc
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}
      - if: ${{ inputs.run_typecheck }}
        run: pnpm run typecheck --if-present
      - if: ${{ inputs.run_lint }}
        run: pnpm run lint --if-present
      - if: ${{ inputs.run_test }}
        run: pnpm test --if-present
      - if: ${{ inputs.run_build }}
        run: pnpm run build --if-present
