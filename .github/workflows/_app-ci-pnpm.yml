# =============================================================================
# Reusable CI workflow for Latimer-Woods-Tech apps — pnpm variant.
#
# WHAT IT DOES
#   Like _app-ci.yml but uses pnpm instead of npm. Use this for apps that
#   manage their lockfile with pnpm (e.g. videoking).
#   Runs typecheck, lint, test, and build against an app's source.
#   Authenticates to GitHub Packages so private @latimer-woods-tech/* deps resolve.
#
# WHO CALLS IT
#   App repos that use pnpm. Currently: videoking.
#   Use _app-ci.yml for npm-based apps.
#
# HOW TO CALL
#   jobs:
#     ci:
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_app-ci-pnpm.yml@main
#       secrets: inherit
#
# REQUIRED SECRETS (passed via `secrets: inherit` from org-level vault)
#   FACTORY_APP_ID            - GitHub App ID for `factory-cross-repo`
#   FACTORY_APP_PRIVATE_KEY   - PEM private key for the same App
#
# OPTIONAL INPUTS
#   pnpm_version       - pnpm major version to install (default '9')
#   node_version       - Node.js major version (default '22')
#   working_directory  - Subdir to run in if app is in a monorepo (default '.')
#   run_lint           - Skip with false to disable lint step (default true)
#   run_typecheck      - Skip with false to disable typecheck (default true)
#   run_test           - Skip with false to disable tests (default true)
#   run_build          - Skip with false to disable build (default true)
#
# CONVENTIONS
#   App package.json must define scripts: typecheck, lint, test, build.
#   Missing scripts are skipped (--if-present), so partial coverage is fine.
#   pnpm-lock.yaml must be committed. --frozen-lockfile is enforced.
#   Node 22 is required for wrangler@latest. Don't downgrade unless you know why.
#
# RELATED
#   _app-ci.yml              - npm variant (for most apps)
#   _app-deploy-pnpm.yml     - Production/staging deploy for pnpm apps
#   _post-deploy-verify.yml  - Health check + auto-rollback after deploy
#   docs/CI_CD.md            - Full architecture reference
# =============================================================================

name: _app-ci-pnpm

concurrency:
  group: ci-${{ inputs.working_directory }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      pnpm_version:
        type: string
        default: '9'
      node_version:
        type: string
        default: '22'
      working_directory:
        type: string
        default: '.'
      run_lint:
        type: boolean
        default: true
      run_typecheck:
        type: boolean
        default: true
      run_test:
        type: boolean
        default: true
      run_build:
        type: boolean
        default: true

permissions:
  contents: read
  packages: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm_version }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
          cache: 'pnpm'
      - name: Validate Drizzle migration integrity
        run: |
          node --input-type=module <<'NODE'
          import { existsSync, readdirSync, readFileSync, statSync } from 'node:fs';
          import path from 'node:path';

          const root = path.resolve('.');
          const configFileNames = new Set([
            'drizzle.config.ts',
            'drizzle.config.js',
            'drizzle.config.mjs',
            'drizzle.config.cjs',
            'drizzle.config.mts',
            'drizzle.config.cts',
          ]);
          const visited = new Set();
          const drizzleConfigs = [];
          const violations = [];

          function walk(directory) {
            if (visited.has(directory)) {
              return;
            }
            visited.add(directory);

            for (const entry of readdirSync(directory, { withFileTypes: true })) {
              if (entry.name === 'node_modules' || entry.name === '.git') {
                continue;
              }

              const fullPath = path.join(directory, entry.name);
              if (entry.isDirectory()) {
                walk(fullPath);
                continue;
              }

              if (configFileNames.has(entry.name)) {
                drizzleConfigs.push(fullPath);
              }
            }
          }

          function findDuplicatePrefixes(sqlFiles) {
            const seen = new Map();
            for (const file of sqlFiles) {
              const prefix = file.match(/^(\d+)_/)?.[1];
              if (!prefix) {
                continue;
              }
              const existing = seen.get(prefix) ?? [];
              existing.push(file);
              seen.set(prefix, existing);
            }

            for (const [prefix, files] of seen.entries()) {
              if (files.length > 1) {
                violations.push(`duplicate Drizzle migration prefix ${prefix}: ${files.join(', ')}`);
              }
            }
          }

          function validateMigrations(configPath) {
            const config = readFileSync(configPath, 'utf8');
            const outMatch = config.match(/\bout\s*:\s*['"]([^'"]+)['"]/);

            if (!outMatch) {
              console.log(`Skipping ${path.relative(root, configPath)} (no static out directory found).`);
              return;
            }

            const migrationsDir = path.resolve(path.dirname(configPath), outMatch[1]);
            if (!existsSync(migrationsDir) || !statSync(migrationsDir).isDirectory()) {
              console.log(`Skipping ${path.relative(root, configPath)} (missing migrations directory ${path.relative(root, migrationsDir)}).`);
              return;
            }

            const sqlFiles = readdirSync(migrationsDir)
              .filter((name) => /^\d+_.*\.sql$/.test(name))
              .sort();

            findDuplicatePrefixes(sqlFiles);

            const metaDir = path.join(migrationsDir, 'meta');
            const journalPath = path.join(metaDir, '_journal.json');
            if (!existsSync(journalPath)) {
              return;
            }

            const journal = JSON.parse(readFileSync(journalPath, 'utf8'));
            const entries = Array.isArray(journal.entries) ? journal.entries : [];
            const sqlBasenames = new Set(sqlFiles.map((name) => name.replace(/\.sql$/, '')));
            const journalTags = new Set(entries.map((entry) => entry.tag).filter(Boolean));

            for (const tag of journalTags) {
              if (!sqlBasenames.has(tag)) {
                violations.push(`${path.relative(root, journalPath)} references missing migration ${tag}.sql`);
              }

              const prefix = tag.match(/^(\d+)_/)?.[1];
              if (!prefix) {
                continue;
              }

              const snapshotPath = path.join(metaDir, `${prefix}_snapshot.json`);
              if (!existsSync(snapshotPath)) {
                violations.push(`${path.relative(root, journalPath)} is missing snapshot ${path.relative(root, snapshotPath)}`);
              }
            }

            for (const sqlBase of sqlBasenames) {
              if (!journalTags.has(sqlBase)) {
                violations.push(`${path.relative(root, configPath)} has migration ${sqlBase}.sql without a matching meta/_journal.json entry`);
              }
            }
          }

          walk(root);

          if (drizzleConfigs.length === 0) {
            console.log('No Drizzle config files found.');
            process.exit(0);
          }

          for (const configPath of drizzleConfigs) {
            validateMigrations(configPath);
          }

          if (violations.length > 0) {
            console.error('Drizzle migration integrity check failed.');
            for (const violation of violations) {
              console.error(`- ${violation}`);
            }
            process.exit(1);
          }

          console.log(`Drizzle migration integrity check passed for ${drizzleConfigs.length} config file(s).`);
          NODE
      - name: Configure npm auth for GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - if: ${{ inputs.run_typecheck }}
        run: pnpm run --if-present typecheck
      - if: ${{ inputs.run_lint }}
        run: pnpm run --if-present lint
      - if: ${{ inputs.run_test }}
        run: pnpm run --if-present test
      - if: ${{ inputs.run_build }}
        run: pnpm run --if-present build
