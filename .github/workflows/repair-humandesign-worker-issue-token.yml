name: Repair HumanDesign Worker Issue Token

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repair:
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: Latimer-Woods-Tech/HumanDesign
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - name: Verify required secrets are available
        env:
          GH_TOKEN_ISSUE: ${{ secrets.GH_TOKEN_ISSUE }}
        run: |
          set -euo pipefail
          [ -n "${GH_TOKEN_ISSUE:-}" ] || (echo "::error::Missing GH_TOKEN_ISSUE in Factory secrets" && exit 1)

      - name: Set HumanDesign repository secret
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN_ISSUE: ${{ secrets.GH_TOKEN_ISSUE }}
        run: |
          set -euo pipefail
          # GitHub rejects secret names starting with GITHUB_; use GH_ISSUE_TOKEN instead
          printf '%s' "$GH_TOKEN_ISSUE" | gh secret set GH_ISSUE_TOKEN --repo "$TARGET_REPO"
          gh secret list --repo "$TARGET_REPO" | grep -q '^GH_ISSUE_TOKEN' || (echo "::error::Failed to verify GH_ISSUE_TOKEN in $TARGET_REPO" && exit 1)
          echo "✓ GH_ISSUE_TOKEN set in $TARGET_REPO"
          # Note: Cloudflare Worker secrets for HumanDesign must be set manually via the
          # Cloudflare dashboard or HumanDesign's own sync-worker-secrets.yml workflow,
          # as Factory's CF token does not have access to the HumanDesign CF account.
