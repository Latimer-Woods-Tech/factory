# =============================================================================
# Flaky Check Report — weekly issue summarising checks that fail then pass.
#
# WHAT IT DOES
#   Runs every Monday at 08:00 UTC. Calls scripts/detect-flaky-checks.mjs which
#   queries the GitHub API for workflow runs where run_attempt > 1 and the
#   latest attempt succeeded while an earlier attempt failed (flaky pattern).
#   Opens a GitHub Issue with the full markdown report so the team can triage
#   and remediate flaky checks each week.
#
# MANUAL TRIGGER
#   workflow_dispatch lets you run it on demand (e.g. mid-week spot checks).
#   Use the `lookback_days` input to widen or narrow the detection window.
#
# OUTPUTS
#   - A GitHub Issue labelled `reliability` + `flaky-checks` with the report.
#   - Workflow summary contains the same report.
#
# REQUIRED SECRETS
#   GITHUB_TOKEN (built-in) — read:actions scope to list workflow runs;
#                              issues:write scope to open the weekly issue.
#
# RELATED
#   factory#270 (parent reliability rollout)
# =============================================================================

name: Flaky Check Report (weekly)

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Number of days to look back for flaky runs'
        default: '7'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  detect:
    name: Detect flaky checks and publish report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Run flaky check detector
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLAKY_REPO_OWNER: ${{ github.repository_owner }}
          FLAKY_REPO_NAME: ${{ github.event.repository.name }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '7' }}
          REPORT_PATH: ${{ runner.temp }}/flaky-check-report.md
        run: node scripts/detect-flaky-checks.mjs

      - name: Publish report to workflow summary
        if: always()
        run: cat "${{ runner.temp }}/flaky-check-report.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Create weekly GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_PATH: ${{ runner.temp }}/flaky-check-report.md
        run: |
          set -euo pipefail

          REPORT=$(cat "$REPORT_PATH")
          WEEK=$(date -u +%Y-W%V)
          TITLE="🔬 Flaky Check Report — ${WEEK}"

          # Ensure the required labels exist (idempotent).
          gh label create "reliability" --color "e4e669" --description "Reliability and stability improvements" \
            --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create "flaky-checks" --color "d93f0b" --description "Flaky CI checks that need remediation" \
            --repo "${{ github.repository }}" 2>/dev/null || true

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --body "$REPORT" \
            --label "reliability,flaky-checks"
