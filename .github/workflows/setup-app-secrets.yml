name: Setup App Secrets (Phase 6.6)

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to set up (leave empty for all configured apps)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — print commands without executing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Prerequisites: add GH_PAT secret to this repo (factory).
# It must be a classic GitHub PAT with: repo + read:packages scopes
# under the adrper79-dot account (owner of all 6 app repos).

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Run setup-all-apps.mjs
        env:
          # ── Auth ─────────────────────────────────────────────────────────────
          # GH_PAT: classic PAT with repo + read:packages (cross-repo secret write)
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PACKAGES_READ_TOKEN: ${{ steps.app-token.outputs.token }}

          # ── Sentry DSNs ───────────────────────────────────────────────────────
          SENTRY_DSN_WORDIS_BOND: ${{ secrets.SENTRY_DSN_WORDIS_BOND }}
          SENTRY_DSN_CYPHER_HEALING: ${{ secrets.SENTRY_DSN_CYPHER_HEALING }}
          SENTRY_DSN_PRIME_SELF: ${{ secrets.SENTRY_DSN_PRIME_SELF }}
          SENTRY_DSN_IJUSTUS: ${{ secrets.SENTRY_DSN_IJUSTUS }}
          SENTRY_DSN_THE_CALLING: ${{ secrets.SENTRY_DSN_THE_CALLING }}
          SENTRY_DSN_NEIGHBOR_AID: ${{ secrets.SENTRY_DSN_NEIGHBOR_AID }}
          SENTRY_DSN_VIDEOKING: ${{ secrets.SENTRY_DSN_VIDEOKING }}

          # ── PostHog — shared project token for all apps ───────────────────────
          POSTHOG_KEY_WORDIS_BOND: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_KEY_CYPHER_HEALING: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_KEY_PRIME_SELF: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_KEY_IJUSTUS: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_KEY_THE_CALLING: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_KEY_NEIGHBOR_AID: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_KEY_VIDEOKING: ${{ secrets.POSTHOG_PROJECT_TOKEN }}

          # ── Stripe — shared key across all apps ───────────────────────────────
          STRIPE_SECRET_KEY_WORDIS_BOND: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_SECRET_KEY_CYPHER_HEALING: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_SECRET_KEY_PRIME_SELF: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_SECRET_KEY_IJUSTUS: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_SECRET_KEY_THE_CALLING: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_SECRET_KEY_NEIGHBOR_AID: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_SECRET_KEY_VIDEOKING: ${{ secrets.STRIPE_SECRET_KEY }}

          # ── App auth ───────────────────────────────────────────────────────────
          JWT_SECRET_VIDEOKING: ${{ secrets.JWT_SECRET_VIDEOKING }}
          BETTER_AUTH_SECRET_VIDEOKING: ${{ secrets.BETTER_AUTH_SECRET_VIDEOKING }}
          STRIPE_WEBHOOK_SECRET_VIDEOKING: ${{ secrets.STRIPE_WEBHOOK_SECRET_VIDEOKING }}
          EMAIL_API_KEY_VIDEOKING: ${{ secrets.RESEND_API_KEY }}

          # ── LLM keys ─────────────────────────────────────────────────────────
          ANTHROPIC_API_KEY_CYPHER_HEALING: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY_PRIME_SELF: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY_IJUSTUS: ${{ secrets.ANTHROPIC_API_KEY }}

          # ── Telephony ────────────────────────────────────────────────────────
          TELNYX_API_KEY_WORDIS_BOND: ${{ secrets.TELNYX_API_KEY }}
          TELNYX_API_KEY_IJUSTUS: ${{ secrets.TELNYX_API_KEY }}
          ELEVENLABS_API_KEY_CYPHER_HEALING: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_API_KEY_PRIME_SELF: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_API_KEY_IJUSTUS: ${{ secrets.ELEVENLABS_API_KEY }}
          DEEPGRAM_API_KEY_CYPHER_HEALING: ${{ secrets.DEEPGRAM_API_KEY }}
          DEEPGRAM_API_KEY_PRIME_SELF: ${{ secrets.DEEPGRAM_API_KEY }}
          DEEPGRAM_API_KEY_IJUSTUS: ${{ secrets.DEEPGRAM_API_KEY }}

          # ── Email ────────────────────────────────────────────────────────────
          RESEND_API_KEY_WORDIS_BOND: ${{ secrets.RESEND_API_KEY }}
          RESEND_API_KEY_CYPHER_HEALING: ${{ secrets.RESEND_API_KEY }}
          RESEND_API_KEY_PRIME_SELF: ${{ secrets.RESEND_API_KEY }}
          RESEND_API_KEY_THE_CALLING: ${{ secrets.RESEND_API_KEY }}
          RESEND_API_KEY_NEIGHBOR_AID: ${{ secrets.RESEND_API_KEY }}

        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.app }}" ]; then
            ARGS="--app ${{ github.event.inputs.app }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node packages/deploy/scripts/setup-all-apps.mjs $ARGS
