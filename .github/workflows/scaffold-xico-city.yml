name: Scaffold xico-city

on:
  workflow_dispatch:

# Scaffolds the Latimer-Woods-Tech/xico-city repo with a complete Cloudflare Worker
# that consumes @latimer-woods-tech/* packages.
#
# Prerequisites before running:
#   1. Run the "Create Cloudflare Hyperdrive" workflow — it sets HYPERDRIVE_XICO_CITY secret
#   2. Ensure GH_PAT secret has repo + read:packages scopes

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  scaffold:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Configure git
        run: |
          git config --global user.email "ci@factory.dev"
          git config --global user.name "Factory CI"
          git config --global init.defaultBranch main

      - name: Check if already scaffolded
        id: check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if gh api repos/Latimer-Woods-Tech/xico-city/contents/src/index.ts > /dev/null 2>&1; then
            echo "⏭  xico-city already has src/index.ts — skipping scaffold."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "xico-city is not scaffolded — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scaffold.mjs
        if: steps.check.outputs.skip == 'false'
        run: |
          printf '\n\n\n\n\n\n\n\n' | node packages/deploy/scripts/scaffold.mjs xico-city \
            --hyperdrive-id "0c15bc97978841f88a78da8253ea3d32" \
            --rate-limiter-id "1008" \
            --no-deploy \
            --no-install

      - name: Write canonical schema
        if: steps.check.outputs.skip == 'false'
        run: node packages/deploy/scripts/write-schema.mjs xico-city

      - name: Add app-specific deps (stripe)
        if: steps.check.outputs.skip == 'false'
        run: node packages/deploy/scripts/add-app-deps.mjs xico-city

      - name: Push to xico-city repo
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd xico-city
          git add -A
          git commit --amend --no-edit
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/Latimer-Woods-Tech/xico-city.git"
          git push origin main --force
          echo "✅ xico-city scaffolded and pushed."
