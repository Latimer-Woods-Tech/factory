name: Migrate schedule-worker DB (one-off)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run migration
        shell: bash
        env:
          WORKER_API_TOKEN: ${{ secrets.WORKER_API_TOKEN }}
        run: |
          RESULT=$(curl -sf -X POST https://schedule-worker.adrper79.workers.dev/migrate \
            -H "Authorization: Bearer $WORKER_API_TOKEN" \
            -H "Content-Type: application/json")
          echo "$RESULT"
          echo "$RESULT" | grep -q '"migrated":true' && echo "Migration OK" || exit 1

