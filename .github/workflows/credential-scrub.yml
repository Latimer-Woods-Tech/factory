# Credential scrub — block PRs introducing leaked credentials to docs/memory
# Reference: docs/supervisor/ARCHITECTURE.md §10 and docs/supervisor/FRIDGE.md rule 2
name: credential-scrub

on:
  pull_request:
    paths:
      - 'documents/**'
      - 'memory/**'
      - 'docs/**'
      - '*.md'
  push:
    branches: [main]
    paths:
      - 'documents/**'
      - 'memory/**'
      - 'docs/**'
      - '*.md'

jobs:
  scrub:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine scan scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            echo "files=$(git diff --name-only $BASE $HEAD -- 'documents/**' 'memory/**' 'docs/**' '*.md' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          else
            echo "files=$(git ls-files 'documents/**' 'memory/**' 'docs/**' '*.md' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          fi

      - name: Scan for credential patterns
        id: scan
        run: |
          FILES="${{ steps.scope.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No matching files changed."
            exit 0
          fi
          # Pattern set from ARCHITECTURE.md §10
          # Each pattern is designed to be specific to real credential shapes.
          # False positives go into an allowlist via '# credscan:ignore' on the line.
          PATTERNS=(
            'AKIA[0-9A-Z]{16}'
            '"private_key"[[:space:]]*:[[:space:]]*"-----BEGIN'
            'ghp_[A-Za-z0-9]{36,}'
            'github_pat_[A-Za-z0-9_]{82}'
            'sk-ant-api0[0-9]-[A-Za-z0-9_-]{93}'
            'sk-proj-[A-Za-z0-9_-]{48,}'
            '(rk|sk)_live_[A-Za-z0-9]{24,}'
            'xai-[A-Za-z0-9]{80,}'
            'gsk_[A-Za-z0-9]{52}'
          )
          FAILED=0
          for file in $FILES; do
            [ -f "$file" ] || continue
            for pattern in "${PATTERNS[@]}"; do
              if grep -nE "$pattern" "$file" | grep -v '# credscan:ignore' > /tmp/matches; then
                if [ -s /tmp/matches ]; then
                  echo "::error file=$file::Credential pattern matched"
                  echo "File: $file"
                  echo "Pattern: $pattern"
                  cat /tmp/matches | sed 's/^/  /'
                  FAILED=1
                fi
              fi
            done
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "❌ Credential-shaped strings detected in documentation."
            echo "If this is a false positive, append '# credscan:ignore' to the line."
            echo "If it is a real credential: rotate it immediately, do not just remove from git."
            exit 1
          fi
          echo "✅ Clean."
