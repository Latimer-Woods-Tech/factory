name: Generate Implementation Scorecard

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch: {}

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scorecard generator
        run: node scripts/generate-scorecard.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SCORECARD }}
          SCORECARD_REPO_OWNER: adrper79-dot
          SCORECARD_REPO_NAME: factory
      - name: Commit generated scorecard
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/IMPLEMENTATION_SCORECARD_AUTO.md
          git diff --quiet --cached || git commit -m 'chore: update implementation scorecard'
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
