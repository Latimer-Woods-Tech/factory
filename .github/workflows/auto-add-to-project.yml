# =============================================================================
# Auto Project Sync — adds new issues and PRs to the LatWood Operations board.
#
# WHAT IT DOES
#   Adds newly opened issues/PRs in this repo to the shared GitHub Project so
#   board automation can populate Agent / Status / Deploy SHA fields later.
#
# TOKENS
#   Uses the Factory GitHub App token, not a long-lived PAT or GH_PROJECT_TOKEN.
#   Projects automation should follow the repo-wide short-lived App-token pattern.
# =============================================================================
name: Auto Project Sync

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  add-to-project:
    name: Add to project
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/Latimer-Woods-Tech/projects/1
          github-token: ${{ steps.app-token.outputs.token }}
