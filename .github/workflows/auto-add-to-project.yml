name: Auto-add to LatWood Operations Project

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  add-to-project:
    name: Add to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/Latimer-Woods-Tech/projects/1
          github-token: ${{ secrets.GH_PAT }}
