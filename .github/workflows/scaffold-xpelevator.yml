name: Scaffold xpelevator

on:
  workflow_dispatch:

# Scaffolds the adrper79-dot/xpelevator repo with a complete Cloudflare Worker
# that consumes @adrper79-dot/* packages.
#
# Prerequisites before running:
#   1. Run the "Create Cloudflare Hyperdrive" workflow — it sets HYPERDRIVE_XPELEVATOR secret
#   2. Ensure GH_PAT secret has repo + read:packages scopes

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Configure git
        run: |
          git config --global user.email "ci@factory.dev"
          git config --global user.name "Factory CI"
          git config --global init.defaultBranch main

      - name: Check if already scaffolded
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if gh api repos/adrper79-dot/xpelevator/contents/src/index.ts > /dev/null 2>&1; then
            echo "⏭  xpelevator already has src/index.ts — skipping scaffold."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "xpelevator is not scaffolded — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scaffold.mjs
        if: steps.check.outputs.skip == 'false'
        run: |
          printf '\n\n\n\n\n\n\n\n' | node packages/deploy/scripts/scaffold.mjs xpelevator \
            --hyperdrive-id "5b62381d252c4c0abb0a24b2d7a27d87" \
            --rate-limiter-id "1007" \
            --no-deploy \
            --no-install

      - name: Write canonical schema
        if: steps.check.outputs.skip == 'false'
        run: node packages/deploy/scripts/write-schema.mjs xpelevator

      - name: Add app-specific deps (stripe)
        if: steps.check.outputs.skip == 'false'
        run: node packages/deploy/scripts/add-app-deps.mjs xpelevator

      - name: Push to xpelevator repo
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd xpelevator
          git add -A
          git commit --amend --no-edit
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/adrper79-dot/xpelevator.git"
          git push origin main --force
          echo "✅ xpelevator scaffolded and pushed."
