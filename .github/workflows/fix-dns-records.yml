name: Fix DNS Records (one-shot)

on:
  workflow_dispatch:

jobs:
  create-dns-records:
    runs-on: ubuntu-latest
    steps:
      - name: Create api.apunlimited.com DNS record
        run: |
          ZONE_ID="5a69e19ad57fb3055603cee457e25c9a"
          EXISTING=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?type=AAAA&name=api.apunlimited.com" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result | length')
          if [ "$EXISTING" -eq "0" ]; then
            echo "Creating api.apunlimited.com AAAA record..."
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '{"type":"AAAA","name":"api","content":"100::","ttl":1,"proxied":true,"comment":"Workers custom route placeholder"}' | jq '{success:.success, result:.result.name, errors:.errors}'
          else
            echo "api.apunlimited.com already has $EXISTING AAAA record(s), skipping"
          fi

      - name: Create api-staging.apunlimited.com DNS record
        run: |
          ZONE_ID="5a69e19ad57fb3055603cee457e25c9a"
          EXISTING=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?type=AAAA&name=api-staging.apunlimited.com" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result | length')
          if [ "$EXISTING" -eq "0" ]; then
            echo "Creating api-staging.apunlimited.com AAAA record..."
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '{"type":"AAAA","name":"api-staging","content":"100::","ttl":1,"proxied":true,"comment":"Workers custom route placeholder"}' | jq '{success:.success, result:.result.name, errors:.errors}'
          else
            echo "api-staging.apunlimited.com already has $EXISTING AAAA record(s), skipping"
          fi

      - name: Register Worker routes in zone
        run: |
          ZONE_ID="5a69e19ad57fb3055603cee457e25c9a"

          register_route() {
            local pattern="$1"
            local script="$2"
            local existing
            existing=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/workers/routes" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" | jq -r --arg p "$pattern" '[.result[]|select(.pattern==$p)]|length')
            if [ "$existing" -eq "0" ]; then
              echo "Registering route $pattern -> $script ..."
              curl -s -X POST \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/workers/routes" \
                -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                -H "Content-Type: application/json" \
                --data "{\"pattern\":\"$pattern\",\"script\":\"$script\"}" | jq '{success:.success, result:.result, errors:.errors}'
            else
              echo "Route $pattern already exists, skipping"
            fi
          }

          register_route "api-staging.apunlimited.com/*" "admin-studio-staging"
          register_route "api.apunlimited.com/*" "admin-studio-production"

      - name: Verify records and routes
        run: |
          sleep 5
          echo "=== DNS ==="
          dig api.apunlimited.com AAAA +short || true
          dig api-staging.apunlimited.com AAAA +short || true
          echo "=== Health checks ==="
          curl -s -o /dev/null -w "api-staging /health: %{http_code}\n" https://api-staging.apunlimited.com/health || true
          curl -s -o /dev/null -w "api /health: %{http_code}\n" https://api.apunlimited.com/health || true