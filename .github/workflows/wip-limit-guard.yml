name: WIP Limit Guard

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      max_in_progress:
        description: Max allowed cards in In Progress
        required: false
        default: '5'
      auto_rebalance:
        description: Automatically move oldest In Progress cards back to Todo when over limit
        required: false
        default: 'true'

permissions:
  contents: read
  issues: write

jobs:
  enforce-wip-limit:
    runs-on: ubuntu-latest
    env:
      PROJECT_OWNER: Latimer-Woods-Tech
      PROJECT_NUMBER: '1'
      MAX_IN_PROGRESS: ${{ github.event.inputs.max_in_progress || '5' }}
      AUTO_REBALANCE: ${{ github.event.inputs.auto_rebalance || 'true' }}
      ALERT_TITLE: 'Ops: In Progress WIP limit exceeded'
      ALERT_MARKER: '<!-- wip-limit-guard -->'
      REPO: ${{ github.repository }}
    steps:
      - name: Evaluate In Progress count
        env:
          ISSUE_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          export GH_TOKEN="$PROJECT_GH_TOKEN"
          project_json=$(gh project item-list "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --limit 200 --format json)

          in_progress_count=$(echo "$project_json" | jq '[.items[] | select(.status == "In Progress")] | length')
          original_in_progress_count="$in_progress_count"
          moved_count=0
          moved_items_md='- None'
          rebalance_failed=0
          rebalance_failure_reason=''

          if [ "$in_progress_count" -gt "$MAX_IN_PROGRESS" ] && [ "$AUTO_REBALANCE" = "true" ]; then
            overflow_count=$((in_progress_count - MAX_IN_PROGRESS))

            if ! project_id=$(gh project view "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --format json --jq '.id'); then
              rebalance_failed=1
              rebalance_failure_reason='Unable to read project metadata (token may lack project scope).'
            fi

            if [ "$rebalance_failed" -eq 0 ]; then
              if ! fields_json=$(gh project field-list "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --format json); then
                rebalance_failed=1
                rebalance_failure_reason='Unable to read project field metadata (token may lack project scope).'
              fi
            fi

            if [ "$rebalance_failed" -eq 0 ]; then
              status_field_id=$(echo "$fields_json" | jq -r '.fields[] | select(.name == "Status") | .id')
              todo_option_id=$(echo "$fields_json" | jq -r '.fields[] | select(.name == "Status") | .options[] | select(.name == "Todo") | .id')
            fi

            if [ "$rebalance_failed" -eq 1 ]; then
              echo "::warning::${rebalance_failure_reason}"
            elif [ -z "$status_field_id" ] || [ -z "$todo_option_id" ] || [ "$status_field_id" = "null" ] || [ "$todo_option_id" = "null" ]; then
              echo "::warning::Could not resolve Status/Todo field metadata for project rebalance."
              rebalance_failed=1
              rebalance_failure_reason='Could not resolve Status/Todo option IDs for rebalance.'
            else
              candidates=$(echo "$project_json" | jq -r '.items
                | map(select(.status == "In Progress"))
                | map({ id, title, updatedAt: (.content.updatedAt // "1970-01-01T00:00:00Z"), url: .content.url })
                | sort_by(.updatedAt)
                | .[]
                | @base64')

              moved_lines=()
              moved=0
              while IFS= read -r row; do
                [ -z "$row" ] && continue
                [ "$moved" -ge "$overflow_count" ] && break

                item_id=$(echo "$row" | base64 --decode | jq -r '.id')
                title=$(echo "$row" | base64 --decode | jq -r '.title')
                url=$(echo "$row" | base64 --decode | jq -r '.url')

                if ! gh project item-edit \
                  --project-id "$project_id" \
                  --id "$item_id" \
                  --field-id "$status_field_id" \
                  --single-select-option-id "$todo_option_id" >/dev/null; then
                  rebalance_failed=1
                  rebalance_failure_reason='Failed to move one or more cards to Todo (project write permission may be missing).'
                  echo "::warning::${rebalance_failure_reason}"
                  break
                fi

                moved=$((moved + 1))
                moved_lines+=("- [${title}](${url})")
              done <<< "$candidates"

              moved_count="$moved"
              if [ "$moved" -gt 0 ]; then
                moved_items_md=$(printf '%s\n' "${moved_lines[@]}")
              fi
            fi

            project_json=$(gh project item-list "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --limit 200 --format json)
            in_progress_count=$(echo "$project_json" | jq '[.items[] | select(.status == "In Progress")] | length')
          fi

          items_md=$(echo "$project_json" | jq -r '.items[] | select(.status == "In Progress") | "- [\(.title)](\(.content.url))"')
          if [ -z "$items_md" ]; then
            items_md='- None'
          fi

          now="$(date -u +%FT%TZ)"
          summary_file="${RUNNER_TEMP}/wip-summary.md"

          cat > "$summary_file" <<EOF
          ${ALERT_MARKER}
          # WIP Limit Guard

          - Checked at: ${now}
          - Project: ${PROJECT_OWNER} #${PROJECT_NUMBER}
          - In Progress count before rebalance: ${original_in_progress_count}
          - In Progress count now: ${in_progress_count}
          - Max allowed: ${MAX_IN_PROGRESS}
          - Auto rebalance enabled: ${AUTO_REBALANCE}
          - Cards moved back to Todo this run: ${moved_count}
          - Rebalance error: $(if [ "$rebalance_failed" -eq 1 ]; then echo "$rebalance_failure_reason"; else echo "none"; fi)

          ## Cards Moved To Todo
          ${moved_items_md}

          ## In Progress Items
          ${items_md}
          EOF

          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"

          export GH_TOKEN="$ISSUE_GH_TOKEN"
          existing_issue=$(gh issue list --repo "$REPO" --state open --search "\"${ALERT_TITLE}\" in:title" --json number --jq '.[0].number // empty')

          if [ "$in_progress_count" -gt "$MAX_IN_PROGRESS" ]; then
            if [ -n "$existing_issue" ]; then
              gh issue edit "$existing_issue" --repo "$REPO" --title "$ALERT_TITLE" --body-file "$summary_file"
            else
              gh issue create --repo "$REPO" --title "$ALERT_TITLE" --body-file "$summary_file"
            fi

            echo "WIP limit exceeded (${in_progress_count} > ${MAX_IN_PROGRESS}) after rebalance attempt."
            exit 1
          fi

          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --repo "$REPO" --body "WIP limit is back within bounds (${in_progress_count}/${MAX_IN_PROGRESS}) as of ${now}. Closing this alert."
            gh issue close "$existing_issue" --repo "$REPO"
          fi

          echo "WIP limit is within bounds (${in_progress_count}/${MAX_IN_PROGRESS})."
