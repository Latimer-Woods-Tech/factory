name: Auto Merge Bot PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: |
      !github.event.pull_request.draft &&
      (
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'renovate[bot]'
      ) &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'no-automerge') &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'needs-human')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for eligible bot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Enable auto-merge; GitHub will merge only after required checks/reviews pass.
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash --delete-branch