name: Create Cloudflare Hyperdrive

on:
  workflow_dispatch:

jobs:
  create-hyperdrive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Create Hyperdrive instances
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # factory_core (THE_FACTORY Neon project)
          FACTORY_CORE_CONN: postgresql://neondb_owner:npg_UpvNCGikeu21@ep-summer-night-anoa28o2-pooler.c-6.us-east-1.aws.neon.tech/neondb?channel_binding=require&sslmode=require
          # Per-app connection strings from GitHub secrets
          WORDIS_BOND_CONN: ${{ secrets.WORDISBOND_CONNECTION_STRING }}
          CYPHER_HEALING_CONN: ${{ secrets.CYPHEROFHEALING_CONNECTION_STRING }}
          PRIME_SELF_CONN: ${{ secrets.SELFPRIME_CONNECTION_STRING }}
          IJUSTUS_CONN: ${{ secrets.KAIROSCOUNCIL_CONNECTION_STRING }}
          THE_CALLING_CONN: ${{ secrets.THECALLING_CONNECTION_STRING }}
          NEIGHBOR_AID_CONN: ${{ secrets.NICHESTREAM_CONNECTION_STRING }}
        run: |
          set -e
          create_or_get() {
            local name="$1"
            local conn="$2"
            local existing
            existing=$(wrangler hyperdrive list --json 2>/dev/null | node -e "
              const d=require('fs').readFileSync('/dev/stdin','utf8').trim();
              if (!d) { process.exit(0); }
              const list = JSON.parse(d);
              const found = list.find(h => h.name === '$name');
              if (found) console.log(found.id);
            " 2>/dev/null || echo "")
            if [ -n "$existing" ]; then
              echo "[exists] $name ŌåÆ $existing"
              echo "$existing"
            else
              local id
              id=$(wrangler hyperdrive create "$name" \
                --connection-string "$conn" \
                --json 2>/dev/null | node -e "
                  const d=require('fs').readFileSync('/dev/stdin','utf8');
                  console.log(JSON.parse(d).id);
                ")
              echo "[created] $name ŌåÆ $id"
              echo "$id"
            fi
          }

          echo "Creating Hyperdrive instances..."
          FACTORY_CORE_ID=$(create_or_get "factory-core-db" "$FACTORY_CORE_CONN" | tail -1)
          WORDIS_BOND_ID=$(create_or_get "wordis-bond-db" "$WORDIS_BOND_CONN" | tail -1)
          CYPHER_HEALING_ID=$(create_or_get "cypher-healing-db" "$CYPHER_HEALING_CONN" | tail -1)
          PRIME_SELF_ID=$(create_or_get "prime-self-db" "$PRIME_SELF_CONN" | tail -1)
          IJUSTUS_ID=$(create_or_get "ijustus-db" "$IJUSTUS_CONN" | tail -1)
          THE_CALLING_ID=$(create_or_get "the-calling-db" "$THE_CALLING_CONN" | tail -1)
          NEIGHBOR_AID_ID=$(create_or_get "neighbor-aid-db" "$NEIGHBOR_AID_CONN" | tail -1)

          echo ""
          echo "ŌĢÉŌĢÉŌĢÉŌĢÉ Hyperdrive IDs ŌĢÉŌĢÉŌĢÉŌĢÉ"
          echo "HYPERDRIVE_FACTORY_CORE=$FACTORY_CORE_ID"
          echo "HYPERDRIVE_WORDIS_BOND=$WORDIS_BOND_ID"
          echo "HYPERDRIVE_CYPHER_HEALING=$CYPHER_HEALING_ID"
          echo "HYPERDRIVE_PRIME_SELF=$PRIME_SELF_ID"
          echo "HYPERDRIVE_IJUSTUS=$IJUSTUS_ID"
          echo "HYPERDRIVE_THE_CALLING=$THE_CALLING_ID"
          echo "HYPERDRIVE_NEIGHBOR_AID=$NEIGHBOR_AID_ID"

          # Write IDs to file for next steps
          cat > hyperdrive-ids.env << EOF
          HYPERDRIVE_FACTORY_CORE=$FACTORY_CORE_ID
          HYPERDRIVE_WORDIS_BOND=$WORDIS_BOND_ID
          HYPERDRIVE_CYPHER_HEALING=$CYPHER_HEALING_ID
          HYPERDRIVE_PRIME_SELF=$PRIME_SELF_ID
          HYPERDRIVE_IJUSTUS=$IJUSTUS_ID
          HYPERDRIVE_THE_CALLING=$THE_CALLING_ID
          HYPERDRIVE_NEIGHBOR_AID=$NEIGHBOR_AID_ID
          EOF

          # Store as GitHub output vars
          echo "FACTORY_CORE_ID=$FACTORY_CORE_ID" >> "$GITHUB_OUTPUT"
          echo "WORDIS_BOND_ID=$WORDIS_BOND_ID" >> "$GITHUB_OUTPUT"
          echo "CYPHER_HEALING_ID=$CYPHER_HEALING_ID" >> "$GITHUB_OUTPUT"
          echo "PRIME_SELF_ID=$PRIME_SELF_ID" >> "$GITHUB_OUTPUT"
          echo "IJUSTUS_ID=$IJUSTUS_ID" >> "$GITHUB_OUTPUT"
          echo "THE_CALLING_ID=$THE_CALLING_ID" >> "$GITHUB_OUTPUT"
          echo "NEIGHBOR_AID_ID=$NEIGHBOR_AID_ID" >> "$GITHUB_OUTPUT"
        id: hyperdrive

      - name: Store Hyperdrive IDs as GitHub secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          store() {
            local name="$1" val="$2"
            if [ -z "$val" ] || [ "$val" = "null" ]; then
              echo "SKIP $name (empty)"
              return
            fi
            echo "$val" | gh secret set "$name" --repo adrper79-dot/Factory
            echo "Set $name=$val"
          }
          store HYPERDRIVE_FACTORY_CORE "${{ steps.hyperdrive.outputs.FACTORY_CORE_ID }}"
          store HYPERDRIVE_WORDIS_BOND "${{ steps.hyperdrive.outputs.WORDIS_BOND_ID }}"
          store HYPERDRIVE_CYPHER_HEALING "${{ steps.hyperdrive.outputs.CYPHER_HEALING_ID }}"
          store HYPERDRIVE_PRIME_SELF "${{ steps.hyperdrive.outputs.PRIME_SELF_ID }}"
          store HYPERDRIVE_IJUSTUS "${{ steps.hyperdrive.outputs.IJUSTUS_ID }}"
          store HYPERDRIVE_THE_CALLING "${{ steps.hyperdrive.outputs.THE_CALLING_ID }}"
          store HYPERDRIVE_NEIGHBOR_AID "${{ steps.hyperdrive.outputs.NEIGHBOR_AID_ID }}"
          echo "All Hyperdrive IDs stored."
