name: CI
on: [push, pull_request]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validate packages in dependency order
        run: |
          set -euo pipefail
          packages=(
            errors
            monitoring
            logger
            design-tokens
            ui
            auth
            neon
            stripe
            llm
            telephony
            analytics
            deploy
            testing
            email
            copy
            content
            social
            seo
            crm
            compliance
            admin
            video
            schedule
            validation
          )

          for package in "${packages[@]}"; do
            echo "=== ${package} ==="
            cd "packages/${package}"
            npm ci --ignore-scripts
            npm run lint
            npm run typecheck
            npm run test
            npm run build
            cd ../..
          done

      - name: Enforce workers.dev URL policy
        run: node scripts/check-workers-url-policy.mjs

      - name: Enforce naming conventions
        run: node scripts/check-naming-conventions.mjs

      - name: Enforce smoke secret contract
        run: node scripts/check-smoke-secret-contract.mjs
