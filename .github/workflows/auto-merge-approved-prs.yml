name: Auto Merge Approved PRs

on:
  pull_request_review:
    types:
      - submitted
  pull_request:
    types:
      - labeled
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  enable-auto-merge:
    if: |
      !github.event.pull_request.draft &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'no-automerge') &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'needs-human')
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - name: Enable auto-merge after approval and checks
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          review_decision=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json reviewDecision --jq '.reviewDecision')
          if [ "$review_decision" != "APPROVED" ]; then
            echo "PR is not approved yet (reviewDecision=$review_decision), skipping."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash --delete-branch
